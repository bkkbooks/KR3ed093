body:
  text: 卷十方藥離合徐洄溪曰方之與藥似合而實離也得天地之氣成一物之性各有功能可以變易血氣以除疾病此藥之力也然草木之性與人殊體入人腸胃何以能如人之所欲以致其效聖人為之制方以調劑之或用以專攻或用以兼治或以相輔者或相反者或相用者或相制者故方之既成能使藥各全其性亦能使藥各失其性操縱之法有大權焉此方之妙也若夫按病用藥藥雖切中而立方無法謂之有藥無方或守一方以治病方雖良善而其藥有一二味與病不相關者謂之有方無藥譬之作書之法用筆已工而配合顛倒與夫字形俱備而點畫不成者皆不得謂之能書故善醫者分觀之而無藥弗切於病情合觀之而無方不本於古法然後用而弗效則病之故也非醫之罪也而不然者即偶取效隱害必多則亦同於殺人而已矣源流論按寇宗奭本草衍義曰嘗讀唐方技傳有云醫要在視脈唯用一物攻之氣盛而愈速一藥偶得他藥相制弗能專力此難愈之驗也今詳之病有大小新久虛實豈可止以一藥攻之若初受病小則庶幾若病大多日或虛或實豈得不以他藥佐使如人用硫黃皆知此物大熱然不性緩倉卒之間下咽不易便作效故智者又以附子乾薑桂之類相佐使以發之將併力攻疾庶幾速效若單用硫黃其可得乎故知許宗之言未可全信賢者當審度之又繆仲淳本草經疏曰上古之人病生於六淫者多發於七情者寡故其主治嘗以一藥治一病或一藥治數病今時則不然七情彌厚五欲彌深精氣既虧六淫易入內外膠固病情殊古則須合衆藥之所長而又善護其所短乃能蘇凋瘵而起沉疴其在良醫善知藥性劑量無差庶得參互旁通彼此兼濟以盡其才而無乖刺數壞之弊矣斯二説與洄溪之意相發故附之又按以古之成方治萬變之病其證其藥不能必一一相契蓋數味相合自有一種功用不可妄意增損者正是古方妙處如小柴胡之半夏本以治嘔而無嘔亦不妨用之類今云一二味與病不相關者謂之有方無病者殆立言之弊乎方劑古今張子剛曰近世醫者用藥治病多出新意不用古方不知古人方意有今人所不到者甚多如諸塞食散五石澤蘭元三石澤蘭元登仙酒之類其治療有意外不測之效觀其所用藥則皆尋常所用之物也但以相反相惡者並用之激之使為功效詳其妙意蓋出於今人之表經曰草生五色五色之變不可勝視草生五味五味之美不可勝極蓋言錯雜和合則其間必有爭效其能者故不可勝視勝極也孫真人亦云神物效靈不拘常制至理關感智莫能知其猶龍吟云起虎嘯風生戎鹽纍卵獺膽分杯撫掌成聲沃火生沸不知所以然也又如五色顏色和合其變化不可得而名焉出乎繩墨規矩之外然後能致顏色氣味之妙此非神智則孰能至此學者不可忽也雞峰普濟方按孫真人云云數語本於陶隱居説見於後徐洄溪曰説者曰古方不可以治今病執仲景之方以治今之病鮮效而多害此則尤足嘆者仲景之方猶百鈞之弩也如其中的一舉貫革如不中的弓徑矢疾去的彌遠乃射者不恨己之不能審的而恨弓強之不可以命中不亦異乎其有審病雖是藥稍加減又不驗者則古今之本草殊也詳本草惟神農本經為得藥之正惟古方用藥悉本於是晉唐以後諸人各以私意加入至張潔古輩出而影響依附互相辨駁反失本草之正傳後人遵用不易所以每投輒拒古方不可以治今病遂為信然嗟乎天地猶此天地人物猶此人物若人氣薄則物性亦薄豈有人今而藥獨古也故欲用仲景之方者必先學古窮經辨證知藥而後可以從事金匱心典序又曰後世之方已不知幾億萬矣此皆不足以名方者也昔者聖人之制方也推藥理之本原識藥性之專能察氣味之從逆審藏府之好惡合君臣之配耦而又探索病源推求經絡其思遠其義精味不過三四而其用變化不窮聖人之智真與天地同體非人之心思所能及也上古至今千聖相傳無敢失墜至張仲景先生復申明用法設為問難注明主治之證其傷寒論全匱要略集千聖之大成以承先而啓後萬世不能出其範圍此之謂古方與內經並垂不朽者其前後名家如倉公扁鵲華他孫思邈諸人各有師承而淵源又與仲景微別然猶自成一家但不能與靈素本草一線相傳為宗枝正脈耳既而積習相仍每著一書必自撰方千百唐時諸公用藥雖博已乏化機至於宋人並不知藥其方亦板實膚淺元時號稱極盛各立門庭徒騁私見逮乎有明蹈襲元人緒餘而已今之醫者動云古方不知古方之稱其指不一若謂上古之方則自仲景先生流傳以外無幾也如謂宋元所制之方則其可法可傳者絶少不合法而荒謬者甚多豈可奉為典章若謂自明人以前皆稱古方則其方不下數百萬夫常用之藥不過數百品而為方數百萬隨拈幾味皆已成方何必定云某方也嗟嗟古之方何其嚴今之方何其易其間亦有奇巧之法用藥之妙未必不能補古人之所未及可備參考者然其大經大法則萬不能及其中更有違經背法之方反足貽害安得有學之士為之擇而存之集其大成刪其無當實千古之盛舉余蓋有志而未遑矣源流論按乾隆四庫總目提要曰蓋古所謂專門禁方用之則神驗至求其理則和扁有所不能解出旅舍備急方條櫟蔭府君曰古經方如葛仙翁孫真人諸名醫之所撰也而以本草仲景律之則似不合繩墨者時以方士禁咒之術涉迂怪者雜出其間又有僻藥而不易辨者有凡品而不堪服者是以可用於今者若甚鮮矣豈立方之指深奧幽微非淺庸所能測也抑時世之變方域之殊情性之差使然邪然臨病對證而施之則效應如神其出於思慮之表者不暇枚舉乃與後世諸家執泥引經報使之説而所制迥別是古經方所以不可廢於今也醫略抄序俱與子剛意相發矣蓋唐人去古猶近具存典型如宋人亦能守古義故其諸方間有功效甚著而羽翼經方者今洄溪謂之乏化機謂之板實膚淺者過矣金元以來務樹旗幟稍趨別路然河間東垣固卓識士故其治病頗有發明特至丹溪則信羅太無説以為古方不治今病詳見格致餘論每對一人必立一方當時項彥章有疑於此見陸簡靜始晤古今方同一矩度見餘姚縣志如王節齋私淑丹溪者也然其著明醫雜著有曰近因東垣丹溪之書大行世醫見其不用古方也率皆效顰治病輒自制方然藥性不明處方之法莫究鹵莽亂雜反致生無甚有變證多端遂難識治此確言也而明清諸家猶仍丹溪之陋多不用古方臨病制方沿波不返遂為套習醫道陵夷職是之由是洄溪之論有自而發矣要之謂古方不治今病者不知古方之理者也自非善用古方何能得療危險之疾古方其可不恪遵乎但後世嗜欲日滋疴瘵日繁則又有不得不擇取諸家方法者然不敢背仲景之旨猶是為善用古方歟如此間專用古方者徒執文義不識變通此亦不能無弊云丹溪以前如石藏用張潔古輩皆有古方不治今病之説斯不繁引用方貴約陳若虛曰方不在多心契則靈證不在難意會則明方不心契證不意會如疏淡之交寡遊之地性情形勢不切何以便托用哉外科正宗程黃山曰方取簡練不求繁多蓋簡練熟歷則一莖草可化丈六金身繁多散漫則頭緒雜而莫知所從易簡方論李建齋曰與其方多而效少莫若方少而意深醫學入門按靈樞禁服篇曰黃帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱所謂方者非必方藥之謂然亦足以通其理矣蓋疾病萬端不可勝數則後世諸方亦不可不博採兼收以備其變然治病之法於虛實寒熱氣血上下之分透得其情對脈措劑則以治一病之法可以旁通治諸病故用方極貴圓熟圓熟之本在能約之約之方法專用古方又就家傳師授及自己精慮之所得間掇後世方劑而體驗數年心悟神會如扁之於輪丁之於牛而後可立殊功於人意表矣苟執一二脈證各各處措則用方繁雜白頭圭匕而遂無圓熟之日愚故有味於三家之言焉先君子遍觀聚方要補録方凡二千餘首然每年千餘人之病數十年間所用僅三四百方以加減出入此博採約用之模範爾倘約守而不備其失也隘博採而濫施其失也駁隘與駁其陋一也嗚呼博約之義難矣哉又按王安道溯洄集曰凡用藥治病其既效之後須要明其當然與偶然能明其當然與偶然則精微之地安有不至者乎惟其視偶然為當然所以循非踵弊莫之能悟而病者不幸矣蓋欲用方之熟必始於審當然與偶然故附其言於此古方加減徐洄溪曰古人制方之義微妙精詳不可思議蓋其審察病情辨別經絡參考藥性斟酌輕重其於所治之病不爽毫髮故不必有奇品異術而沉痼艱險之疾投之輒有神效此漢以前之方也但生民之疾病不可勝窮若必每病制一方是曷有盡期乎故古人即有加減之法其病大端相同而所現之證或不同則不必更立一方即於是方之內因其現證之異而為之加減如傷寒論中治太陽病用桂枝湯若見項背驗者則用桂枝加葛根湯喘者則用桂枝加厚朴杏子湯下後脈促胸滿者桂枝去芍藥湯更惡寒者去芍藥加附子湯此猶以藥為加減者也若桂枝麻黃各半湯則以兩方為加減矣若發奔豚者用桂枝為加桂枝湯則又以藥之輕重為加減矣然一二味加減雖不易本方之名而必明著其加減之藥若桂枝湯倍用芍藥而加飴糖則又不名桂枝加飴糖湯而為建中湯其藥雖同而義已別則立方亦異古法之嚴如此後之醫者不識此義而又欲託名用古取古方中一二味去其要藥雜以他藥而仍以其方目之用而不效不知自咎或則歸咎於病或則歸咎於藥以為古方不可治今病嗟乎即使果識其病而用古方支離零亂豈有效乎遂相戒以為古方難用不知全失古方之精義故與病毫無益而反有害也然則當何如曰能識病情與古方合者則全用之有別證則據古法加減之如不盡合則依古方之法將古方所用之藥而去取增益之必使無一藥之不對證自然不背於古人之法而所投必有神效矣源流論按趙以德金匱衍義曰凡仲景方多一味減一藥與分兩之更輕重則易其名異其治有如轉丸者此言為然詳仲景之於加減其旨不一有病本宜某湯而病長一層仍加味以添其力者有某湯之證更有所挾或有所阻仍加味以旁制之者有某湯之證藥偶有礙仍減去之者有某湯之證並有所挾所阻仍去彼加此者更至其至妙者則一味之出入表裡異其治矣後世諸家能達此義者不多如王德膚於竹葉石膏湯代石膏以附子名為既濟湯者最極其巧實所少見也蓋用方之妙莫如於加減用方之難亦莫如於加減苟不精仲景之旨藥性不諳配合不講見頭治頭濫為增損不徒失古方之趣亦使互相牽制坐愆事機者往往有之加減豈易言乎王海藏湯液本草序曰或以傷寒之劑改治雜病或以權宜之料更療常疾以湯為散以散為丸變易百端增一二味別作他名減一二味另為殊法云云此乃變通之極致非粗工所企知也又按學者欲精古方之趣尤要讀前輩注方之書而後熟思歷驗始得通其理焉考注方昉於成聊攝明理論而許弘有內臺方議吳鶴臯有醫方考汪訒庵有醫方集解王滄洲有古方選注吳遵程有成方切用乾隆御纂醫宗金鑑內有刪補名醫方論其他傷寒金匱各注及張石頑千金方衍義皆釋方意程志伊釋方一書唯釋名題不及配合如王求如小青囊施沛然祖劑張石頑醫通祖方亦足見諸家加減之略矣程黃山易簡方論亦謂注方之益今録於下曰著方者多注方者少著方者既不自注其方後人但依方而用之未必盡能明藥性功能有利有害恰當病情也即如傷寒論中所立之方未嘗不精妙入神用之不當昔賢比之操刃可不慎歟若使一方便可治一證昔賢早以預定何待後人費心耶蓋方猶仿也可仿法而已活變靈通顧在人用之如何耳若不注明昔賢著方之意方書徒設縱多奚為按程氏方字解非其本義宜參七方條方味多寡許培元曰或讀本草類方刻意求簡以為精專不知聖人初無從簡之心惟是合宜以治耳仲景東垣共稱醫聖而用多用寡兩不相侔故得其要者多亦不雜不得其要少亦不專不究確然之理而以品味多寡為衡是崇末而遺本已藥準俞守約曰今之人不識病源不辨脈理品數多每至十五六味攻補雜施弗能專力故治病難為功也韓天爵醫通云處方正不必多品但看仲景方何等簡甚丹溪謂東垣用藥如韓信用兵多多益善者蓋諱之也續醫説張景嶽曰觀仲景之方精簡不雜至多不過數味聖賢之心自可概見若必不得已而用行中之補補中之行是亦勢所當然如傷寒論之小柴胡湯以人參柴胡並用陶氏之黃龍湯以大黃人參並用此正精專妙處非若今醫之混用也能悟此理方是真見中活潑工夫至若東垣之方有十餘味及二十餘味者此其用多之道誠自有意學者欲效其法必須總會其一方之味總計其一方之性如某者多某者少某者為專主某者為佐使合其氣用自成一局之性使能會其一局之意斯得東垣之心矣若欲見頭治頭見腳治腳甚有執其三四端而一概混用以冀夫僥幸者尚敢曰我學東垣者哉雖然東垣之法非不善也然余則寧師仲景不敢宗東垣者正恐未得其精先得其隘其失也豈止一方劑也哉明者宜辨之全書鄧云侶曰大約古之方也其類少今之方也其類多古之方也其品寡今之方也其品繁古之方也其分數重今之方也其分數輕古之方也其氣味之性統而同今之方也其氣味之性支而散蓋氣味之行瞬息而至遍體也夫孰得而御其徑悍又可知制夫方藥其品數之簡且重者之為妙焉蓋邪氣入身橫行窈據即專力竭才猶恐其弗敵矣若品泛則氣輕數少則味淡又安能以孱弱之群兵而探渠魁之虎穴也哉醫經會解按褚氏遺書曰製劑獨味為上二味次之多品為下此概論也考華元化處劑不過數種然其術神奇固不得詳如仲景方則大抵從簡而又有柴胡加龍蠣湯烏梅丸鱉甲煎丸之類從繁者蓋急治之方多從於簡緩治之方多從於繁病寒熱虛實證候專一者多從於簡證候錯糅者多從於繁病之與方各有所適唯病當簡者多而當繁者少況至十餘味之多殊少見其可者俞張鄧三家之論可謂確矣單方徐洄溪曰單方者藥不過一二味治不過一二證而其效則甚捷用而不中亦能害人即世所謂海上方者是也其原起於本草蓋古之聖人辨藥物之性則必著其功用如逐風逐寒解毒定痛之類凡人所患之證止一二端則以一藥治之藥專則力厚自有奇效若病兼數證則必合數藥而成方至後世藥品日增單方日多有效有不效矣若夫內外之感其中自有傳變之道虛實之殊久暫之別深淺之分及夫人情各殊天時各異此非守經達權者不能治若皆以單方治之則藥性專而無制偏而不醇有利必有害故醫者不可以此嘗試此經方之所以為貴也然參考以廣識見且為急救之備或為專攻之方是亦不可不知也源流論按洄溪又論單方得藥之專能載在次卷藥性生成本原中又醫説引夷堅志有草藥不可妄用條蕭通隱軒岐救正論曰無知愚民每每擅一二單方草藥為能立奏殊功且復省費誰不悅從但此須村裡堅剛異稟別具一副耐毒腸胃者用之極驗若元氣稍虛誤服旋傾目擊者屢矣書此為戒考前哲既説此意宜參第一卷用藥有貴賤之別條七方劉河間曰方有七劑有十故方不七不足以盡方之變劑不十不足以盡劑之用方不對病非方也劑不蠲疾非劑也今列而論之七方者大小緩急奇偶復大方之説有二一則病有兼證而邪不專不可以一二味治之宜君一臣三佐九之類是也二則治腎肝在下而遠者宜分兩多而頓復服之是也小方之説有二一則病無兼證邪氣專一可以君一臣二小方之治也二則治心肺在上而迫者宜分兩微而頻頻少服之亦為小方之治也緩方之説有甘以緩之為緩方者為糖蜜甘草之類取其戀鬲也有丸以緩之為緩方者蓋丸之比湯散藥力宣行遲故也有品味群衆之緩方者蓋藥味衆多各不能騁其性也按儒門事親曰如萬病丸七八十味遞相拘制也有無毒治病之緩方者蓋藥性無毒則功自緩也有氣味薄之緩方者藥氣味薄則常補於上比至其下藥力既已衰為補上治上之法也急方之説者四有急病急攻之急方者如腹心暴痛前後閉塞之類是也有急風蕩滌之急方者謂中風不省口噤是也取湯劑蕩滌取其易散而施功速才是也按事親作有急病急攻之急方如心腹暴痛兩陰溲便閉寒不通借備急丹以攻之此藥用不宜恆蓋病不容俟也又如中風牙關緊急漿粥不入用急風散之屬亦是也有湯散蕩滌之急方蓋湯散之比丸下咽易散而施用速也有藥有毒之急方者如上湧下泄奪其病之大勢者是也有氣味厚之急方者藥之氣味厚者直趣於下而力不衰也謂補下治下之法也奇方之説有二有古之單行之奇方者為獨一物是也有病近而宜用奇方者為君一臣二君二臣三數合於陽也故宜下不宜汗也偶方之説有二有兩味相配而為偶方者蓋兩方相合者是也有病遠而宜用偶方者君二臣四君四臣六數合於陰也故宜汗不宜下也復方之説有二有二三方相合之為復方者如桂枝二越婢一湯之類是也按事親云如調胃承氣湯方芒硝甘草大黃外參以連翹薄荷黃芩梔子以為涼膈散是本方之外別加餘味者皆是也有分兩勻同之復方者如胃風湯各等分之類是也又曰重復之復二三方相合而用也反復之復謂奇之不去則偶之是也保命集張戴人曰以內經考之其奇偶四則反以味數奇者為奇方味數偶者為偶方下復云汗者不以奇下者不以偶及觀仲景之制方桂枝湯汗藥也反以三味為奇大承氣湯下藥也反以四味為偶何也豈臨事制宜復有增損者乎考其大旨王太僕所謂汗藥如不以偶則氣不足以外發下藥如不以奇則藥毒攻而致過必如此言是奇則單行偶則並行之謂也急者下本易行故宜單汗或難出故宜並蓋單行則力孤而微並行則力齊而大此王太僕之意也然太僕又以奇方為古之單方偶為復方今此七方之中已有偶又有復者何也豈有偶方者二方相合之謂也復方者二方四方相合之方歟不然何以偶方之外又有復方者歟此復字非重復之復乃反復之復何以言之蓋內經既言奇偶之方不言又有重復之方惟云奇之不去則偶之是為重方重方者即復方也下又云偶之不去則反佐以取之所謂寒熱溫涼反從其病也由是言之復之為方反復亦不遠內經之意也事親按至真要大論帝問治有緩急方有大小而岐伯有曰奇之制偶之制制以緩制以急又曰近而奇偶制小其服也遠而奇偶制大其服也云云如七方之目則始出於成聊攝明理藥方論序曰制方之體宣通補瀉輕重澀滑燥濕十劑是也制方之用大小緩急奇耦復七方是也是以制方之體欲成七方之用者必本於氣味生成而制方成焉自此説出而河間師弟更張皇之爾後諸家奉為圭臬無敢異議然本是運氣偽經之説不可以例仲景之方而聊攝附湊為一殆不免白圭之玷矣且方之為言道也所以示修治調劑之道也是以謂治有緩急則可謂方有緩急則恐不可也品數多者謂之大方品數少者謂之小方是古義也藥之異常者亦名云奇方則凡據理配合者皆宜謂之正方正與奇者俱寓於大小之中而所謂二方相合之復方者猶大方之屬耳至奇偶對稱則雖戴人巧為回護要是紙上迂拘之談施之實際何益之有其以復方為反復之復者亦失牽強矣蓋從前諸家徒沿襲舊説未有斥七方之非者故今舉二子之言敢贅僻見以俟有識論定十劑詳説載在次卷藥功用大體條又按景三陽嵩崖尊生書臆加四方曰重病輕方曰輕病重方曰反佐方曰顧忌方最覺無謂仍不具録君臣佐使帝曰方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也帝曰三品何謂岐伯曰所以明善惡之殊貫也王啓玄曰上藥為君中藥為臣下藥為佐使所以異善惡之名位服餌之道當從此為法治病之道不必皆然以主病者為君佐君者為臣應臣之用者為佐皆所以贊成方用也至真要大論並注岐伯曰有毒無毒所治為主適大小為制也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也同上按本草經所言君臣佐使者本自有二義運氣篇之辨當矣沉存中夢溪筆談曰舊説用藥有一君二臣三佐五使之説其意以謂藥雖衆主病者專在一物其他則節級相為用大略相統制如此為宜不必盡然也所謂君者主此一方固無定物也藥性論乃以衆藥之和厚者定為君其次為臣為佐其有毒者多為使此謬論也設若欲攻堅積則巴豆輩豈得不為君也此説稍是然未熟參經文者矣又按經曰藥有君臣佐使以相宣攝合和蔣乂園藥鏡曰宣者君行意也攝者臣行令而後攝佐使無不奉行君意乃始成其合和此解似是又莊子徐無鬼曰藥也其實堇也桔梗也雞壅也豕零也其時為帝者也成玄英疏曰帝君主也夫藥無貴賤愈病則良藥病相當故便為君主何柏齋曰大抵藥之治病各有所主主治者君也輔治者臣也與君相反而相助者佐也引經及引治病之藥至於病所者使也如治寒病用熱藥則熱藥君也凡溫熱之藥皆輔君者也臣也然或熱藥之過甚而有害也須少用寒涼藥以監製之使熱藥不至為害此則所謂佐也至於五藏六府及病之所在各須有引導之藥使藥與病相遇此則所謂使也余病準此醫學管見按柏齋以三品等差為用藥之經以合和之體為用藥之權今刪其冗語七情合和配合諸説藥有陰陽配合子母兄弟根莖華實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和時視之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也本草白字按是書之例本不欲以經文與後世諸説同伍且經人所素習固無須表出然如此條倘不首舉之則殊不便讀者故今特破例云又藥性陰陽詳見於素問中子母兄弟蜀本注所云若榆皮為母厚朴為子之類者無審其義盧不遠芷園日記載陳伯先説稱桃樹生子則桃樹是母桃子是子又稱若兄弟如榆有大葉小葉麥有小大禾稻亦自有數十種云云此説似有理宜考原書陶隱居曰舊方用藥亦有相惡相反者服之乃不為害或能為制持之者猶如寇賈輔漢程周佐吳大體既正不得以私情為害雖然恐不如不用今仙方甘草丸有防己細辛俗方玉石散用栝樓乾薑略舉大體如此半夏有毒用之必須生薑此是取其所畏以相制爾其相須相使者不必同類猶如和羹調食魚肉蔥豉各有所宜共相宣發也同上黑字又曰尋萬物之性皆有離合虎嘯風生龍吟云起磁石引針琥珀拾芥漆得蟹而散麻得漆而湧桂得蔥而軟樹得桂而枯戎鹽纍卵獺膽分杯其氣爽有相關感多如此類其理不可得而思之至於諸藥尤能遞為利害失聖既明有所説何可不詳而避之時人為方皆多漏略若舊方已有此病亦應改除假如兩種相當就其輕重擇而除之傷寒赤散吾常不用藜蘆斷下黃連丸亦去其乾薑而施之無不效何忽強以相憎苟令共事乎相反為害深於相惡相惡者謂彼雖惡我我無忿心猶如牛黃惡龍骨而龍骨得牛黃更良此有以制伏故也相反者則彼我交讎必不宜合今畫家用雌黃胡粉相近便自黯妒粉得黃即黑黃得粉亦變此蓋相反之證也同上按本草綱目引寇宗奭誤按七情本系於藥性之義然云合和時視之則實為立方之要故拈於此玉函經曰藥有相生相殺相惡相反相畏相得文異而意同隱居既云相惡相反者服之不為害而又稱相反者彼我交讎必不宜合似義相抵牾要當以前説為正蓋相惡相反古方往往合用前人有説見於後隱居以為恐不如不用者豈為庸工而發乎又隱居及諸家所敘每藥七情其理難得究詰然是古來相傳之説姑置不論而可也又沉存中良方序亦有説宜參看虞恆德曰或問藥性有相畏相惡相反而古方有同為一劑而用者其理何如曰若夫彼畏我者我必惡之我所惡者彼必畏我蓋我能制其毒而不得以自縱也且如一劑之中彼雖畏我而主治之能在彼故其分兩當彼重我輕略將以殺其毒耳設我重彼輕制之太過則盡奪其權而治病之功劣矣然藥性各有能毒其所畏者畏其能所惡者惡其毒耳如仲景制小柴胡湯用半夏黃芩生薑三物同劑其半夏黃芩畏生薑而生薑惡黃芩半夏因其分兩適中故但制其栗悍之毒而不減其退寒熱之能也其為性相反者各懷酷毒如兩讎相敵決不與之同隊也雖然外有大毒之疾必用大毒之藥以攻之又不可以常理論也如古方感應丸用巴豆牽牛同劑以為攻堅積藥四物湯加人參五靈脂輩以治血塊丹溪治尸瘵二十四味蓮心散以甘草芫花同劑而謂妙處在此是蓋賢者真知灼見方可用之昧者固不可妄試以殺人也醫學正傳陳月朋曰有單行者不與諸藥共劑而獨能攻補也如方書所載獨參湯獨桔湯之類是爾有相須者二藥相宜可兼用之也有相使者能為使卒引達諸經也此二者不必同類有相惡者彼有毒而我惡之也有相畏者我有能而彼畏之也此二者不深為害有相反者兩相讎隙必不可使和合也有相殺者中彼藥毒用此即能殺除也如中蛇虺毒必用雄黃中雄黃毒必用防己之類是爾凡此七情共劑可否一覽即瞭然也本草蒙筌李瀕湖曰藥有七情獨行者單方不用輔也相須者同類不可離也如人參甘草黃蘗知母之類相使者我之佐使也相惡者奪我之能也相畏者受彼之制也相反者兩不相合也相殺者制彼之毒也古方多有用相惡相反者蓋相須相使同用者帝道也相畏相殺同用者王道也相惡相反同用者霸道也有經有權在用者識悟爾本草綱目張隱菴曰藥之相須相使相惡相反出北齊徐之才藥對非上古之論也按此説誤聿考傷寒金匱千金諸方相畏相反者多並用有云相畏者如將之畏帥勇往直前不敢退卻相反者彼此相忌能各立其功圓機之士又何必膠執於時襲之固陋乎侶山堂類辨按恆德論頗精陳李張三説與隱居有異並存以備考又按合和之體雖非七情之理亦有不可不知者今牽聯而附之柯韻伯注十棗湯曰邪之所湊其氣已虛而毒藥攻邪脾胃必弱使無健脾調胃之品主宰其間邪氣盡而元氣亦隨之盡故選棗之大肥者為君預培脾土之虛且制水勢之橫又和諸藥之毒既不使邪氣之盛而不制又不使元氣之虛而不支此仲景立法之盡善也張子和制濬川禹攻神祐等方治水腫痰飲而不知君補劑以護本但知用毒藥以攻邪所以善全者鮮此論甚是蓋仲景方用峻藥必配和胃之品以監製之其最至妙者如白虎湯竹葉石膏湯桃花湯之粳米厚朴麻黃湯之小麥消石礬石散之大麥粥汁和服深推其理凡物不與胃相慣者莫如金石與胃甚相慣者莫如米穀今懼石藥之損胃故配米穀以制之也周慎齋曰用藥之要貴松不貴實立意在君臣而嚮導在佐使本草匯箋引豈仲景之方不皆松耶愚又嘗原寒熱並用之義凡藥寒熱溫涼性也補瀉汗吐用也但是涼瀉但是溫補即為性用兼取矣攻補同用而治虛實相錯寒溫並行而治冷熱不調亦即為性用兼取矣有病但冷但熱而寒溫並行者是一取其性一取其用性用適和自成一種方劑矣大青龍湯則麻桂得石膏之寒專存外發之用石膏得麻桂之發以達肌腠故相藉涼散表熱是麻桂取用而石膏取性也大黃附子湯則大黃得附子細辛但存蕩滌之用相藉以逐實寒是附子細辛取性而大黃取用如桂枝加大黃湯其揆一也越婢湯則石膏得麻黃之溫發但存逐水之用故相藉以驅水氣是麻黃性用兼取而石膏取用也石膏逐水本草不言然此湯及厚朴麻黃湯小青龍加石膏湯麻杏甘石湯文蛤湯木防己湯等皆用之則其義可知越婢加朮湯則麻石之功與前方同而術與麻黃相藉走外之力稍勝矣孫真人更加附子蓋附子與石膏相得特存達表驅濕之用以助麻術之力立方之意最巧此類不一當推而知徐洄溪所謂方之既成能使藥各全其性亦能使藥各失其性者此之謂也然此義極淵深身親試驗方悟其趣蓋方與病對則一性一用各呈其能聖法之妙非凡慮所思識者往往如此又按汪石山辨明醫雜著忌用參耆論曰藥之為用又無定體以補血佐之則補血以補氣佐之則補氣是以黃耆雖專補氣以當歸引之亦從而補血矣故東垣用黃耆六錢只以當歸一錢佐之即名曰補血湯可見黃耆功力雖大分兩雖多為當歸所引不得不從之補血矣矧人參功兼補血者邪又俞守約論當歸曰其功用但從人參黃耆則能補血從大黃牽牛則能破血從官桂附子茱萸則熱從大黃芒硝則寒此非無定性也奪於群衆之勢而不得不然耳此兩説為得理宜擴而充焉又程若水醫彀論方有監製忌宜之法許培元藥準有品味相扶論本於陶節庵用藥法則用藥須究臭味相得論本於吳仁齋俱不純茲不録也方劑分量陳延之曰凡病劇者人必弱人弱則不勝藥處方宜用分兩單省者也病輕者人則強勝於藥處方宜用分兩重復者也凡久病者日月已積必損於食力食力既弱亦不勝藥處方亦宜用分兩單省者也新病者日月既淺雖損於食其穀氣未虛猶勝於藥處方亦宜用分兩重復者也少壯者病雖重其人壯氣血盛勝於藥處方宜用分兩重復者也雖是優樂人其人驟病數服藥則難為藥勢處方亦宜如此也衰老者病雖輕其氣血衰不勝於藥處方亦宜用分兩單省者也雖是辛苦人其人希病不經服藥者則易為藥勢處方亦宜如此也夫人壯病輕而用少分兩方者人盛則勝藥勢方分兩單省者則不能制病雖積服之其勢隨消終不制病是以宜服分兩重復者也夫衰老虛人久病病重而用多分兩方者人虛衰氣力弱則不堪藥藥未能遣病而人氣力先疲人疲則病勝便不敢復服則不得力也是以服分兩單省者也醫心方引小品方孫真人曰小兒病與大人不殊惟用藥有多少為異千金方按上論分兩輕重各有其宜考仲景於四逆湯曰強人可大附子一枚乾薑一兩於白散曰強人半錢匕羸者減之於十棗湯曰強人服一錢匕羸人服半錢於小青龍加石膏湯曰強人服一升羸者減之是足以確陳氏之説矣然又有大虛大實不拘新久老小非分兩重復不能奏續者乃宜別論已如小兒分兩吳又可亦曰用藥與大人倣佛凡五六歲以上者藥當減半二三歲往來者四分之一可也殆為約當又第十二卷小兒服藥法宜互考李東垣曰用藥各定分兩為君者最多為臣者次之佐者又次之藥之於證所主同者則等分湯液本草東垣用藥心法吳茭山曰凡用藥銖分主病為君以十分為率臣用七八分輔佐五六分使以三四分加減外法數用輔佐如此用庶不差矣活人心統按上論多少配合之義孫季逑序中藏經曰古人配合藥物分量按五藏五味配以五行生成之數今俗醫任意增減不識君臣佐使是以古人有不服藥為中醫之嘆要知外科丸散率用古方分量故其效過於內科此即古方不可增減之明證蓋古方固不可苟增減然云配以五行之數則拘矣且考之經方一桂枝湯也而有加桂湯加芍藥湯一小承氣湯也而有厚朴三物湯厚朴大黃湯可知分量之多寡本從證之輕重亦不妨隨宜增減故吳又可於達原飲曰證有遲速輕重不等藥有多寡之分務在臨時斟酌所定分兩大約而已亦其意也如配合之旨則李吳二氏為得然大陷胸湯之甘遂君藥也而以其過峻僅用一錢匕五苓散之澤瀉佐藥也而以其甚慢至一兩六銖之多此類間有亦不可不辨又按馮楚瞻錦囊祕録論補曰奈何近用味藥者僅存其名體重之藥每同體輕者等分或用錢許幾分是有名而無實效今詳仲景用地黃炙甘草湯則一斤腎氣丸則八兩並重於他藥知馮氏之言可從矣陶隱居曰古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子谷秬黍之制從來均之已久正爾依此用之本草黑字按古方權制諸家所論考證粗謬無能得其真吾友小島學古尚質精究纍年一以陶氏為歸著經方權量考一書其説甚確實足祛從前之惑茲拈其要以使人知所標準曰古者以十黍為絫十絫為銖積之為兩為斤乃是時世通用之權而如醫方則用其十分之一本説雖子谷秬黍之制云云者言漢志雖有子谷秬黍中者百黍為一銖之制方家從來依此十黍為一銖之稱而用之故千金載本説有此則神農之稱也今依為定之言蓋本説一斤則三千八百四十黍今取本邦所産秬黍中者而稱之以定一斤之重實為五錢五分六釐八毫就求銖兩則一銖者一釐四毫五絲而一兩者三分四釐八毫也醫心方引範汪方云六十黍粟為一分此與本説同義又唐本注所論頗有訛舛且似不解本説説文解字云銖權十分黍之重也楊倞荀子注云十黍之重為銖是知十黍之銖古或有其説不啻醫方矣張仲景方云某藥幾銖某藥幾兩某藥一斤若半斤者皆當從神農之稱而為正矣特豬膚一斤世用之一斤也更取仲景方參之本説其劑稍輕今之所用勢必加重然千金云或曰古人用藥至少分兩亦輕瘥病極多觀君處方非不煩重分兩亦多而疾病不及古人者何也答曰古者日月長遠藥在土中自養經久氣味真實百姓少欲稟氣中和感病輕微易為醫療今時日月短促藥力輕虛人多巧詐感病厚重難以為醫病輕用藥須少病重用藥即多此則醫之一隅何足怪乎夫真人之時業已如此而今之距唐千有餘年則亦何怪用藥之彌多乎如後人據百黍之銖以律古方者則其劑甚大水少湯濁不中適用其謬不待辨也漢晉世用之一斤者當今之五十五錢六分八釐而迄於梁陳之時皆遵而用焉如合二斤以為一斤蓋創於吳時孫思邈云吳人以二兩為一兩葛洪云古稱金一斤於今為二斤所謂古稱乃吳稱耳唐本草注云古稱皆復今南稱是也唐時猶有用復稱者北魏之初又用復稱至孝文之時再復古制北齊一斤者古之一斤半周玉稱四兩當古稱四兩半隋開皇以古稱三斤為一斤則當今之百六十錢為一斤者乃是唐代之大稱大業中依復古稱乃唐代之小稱實居大稱三之一而醫藥則用之唐六典凡量以秬黍中者容一千二百為籥二籥為合十合為升十升為鬥三斗為大斗十斗為斛凡權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩十六兩為斤凡積秬黍為度量權衡者調鐘律測晷景合湯藥及冠冕之制則用之內外官司悉用大者及宋代析一兩為十錢遂立錢分釐毫之目聖惠方云方中凡言分者即二錢半為一分也此原於陶氏四分為一兩而析十錢之一兩為四故云二錢半也凡言兩者即四分為一兩也凡言斤者即十六兩為一斤也玉海云得十五斤為一稱之則元明以降迄於清朝沿用之稱不敢替易焉明清之方云分者分釐之分非二錢半之分也李時珍云今古異制古之一兩今用一錢可也誤矣又曰今方家所云等分者非分兩之分謂諸藥斤兩多少皆同爾先視病之大小輕重所須乃以意裁之凡此之類皆是丸散丸散竟依節度用之湯酒之中無等分也同上按補闕肘後方序録曰凡云分等即皆是丸散隨病所須多少無定銖兩三種五種皆分均之考仲景方其稱等分者皆是丸散湯中方無後稱等分者肘後序録又曰凡云丸散之若干分兩者是品諸藥宜多宜少之分兩非必止於若干分兩然則丸散之分兩不過大概言之耳素問病能論澤瀉術各十分麋銜五分張景嶽類經曰十分者倍之也五分者減半也腹中論四烏鰂魚骨一蘆茹謂用蘆茹取烏鰂魚骨四分之一也如仲景方間有稱幾分者亦必於丸散則可知素問仲景之分亦是以意裁之之謂而隱居云古無分名者信矣但後人不知經義或有以分銖之分易之銖兩者然斧鑿之痕可證而得焉麻黃升麻湯升麻當歸各一兩一分玉函千金翼並作一兩六銖防己黃耆湯黃耆一兩一分此方更用錢盞等字全是後人所肆改龜甲煎丸二十三味總以分稱是似裁分然鍛灶下灰與清酒自有定量則當充千金作鱉甲三兩而改以銖兩大黃蟅蟲丸大黃十分余藥皆以如兩如升如枚則當作二兩十二銖始順赤石脂丸烏頭一分宜從千金作六銖淡飲中五苓散宜準太陽篇改分為銖兩如排膿散柴胡飲子俱似後人所增須附之別論蓋湯酒煮服必有定劑故不得不以銖兩丸散則以粒之若干抄之多寡為之節度此所以約略裁量而不必須銖兩也外臺引古今録驗石斛萬病散方後曰隨病倍其分又曰凡散藥有云刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩則以升平之藥升方作上徑一寸下徑六分深八分內散藥勿按抑之正爾微動令平調爾今人分藥不復用此同上按學古曰補闕肘後方序録云刀圭準如兩大豆外臺引刪繁療眼車前子湯洗方云一刀圭者準丸如兩大豆大按下本説云如梧子者以二大豆準之以可互證焉千金方云凡言刀圭者以六粟為一刀圭一説云三小豆為一刀圭並與本説不同俞琰古文參同契注云所謂刀圭刀頭圭角些子爾尚質家藏齊刀一枚文曰齊吉化賞鑑家以為呂望舊物取抄散藥圭端所受不過一梧子許大而已又董谷碧里雜存有説欠當方寸匕按周漢之一尺當今曲尺七寸六分沉冠云雕周官祿田考載古尺圖云摹出宋秦熺鐘鼎款識册中底有篆文銘曰周尺漢志鎦歆銅尺後漢建武銅尺晉前尺並同校之即今曲尺七寸六分亡友狩谷望之據新莽大泉五十貨布貨泉起尺亦得今尺七寸六分其説精確詳明實足依據挂川松崎明後著尺準考亦三今之七寸六分一寸當今曲尺七分六釐今遵而造之以充藥室之用矣醫心方載本説注云今案蘇敬云正方一寸者四方一寸此作寸者周時尺八寸以此為方寸七蓋蘇敬不詳周尺之制就唐代常用大尺之八寸而概言之耳本説云方寸七散蜜和得如梧子十丸而蘇以為十六梧子足以證其尺之長焉醫心方又引範汪方云草黍粟為一簪頭三簪頭為一刀圭三刀圭為一撮三撮為一寸七此亦與本説不同又補闕肘後方序録云假令日服三方寸七須止是三五兩藥耳今稱三方寸七散僅不過一錢強亦足以知古時用藥之輕而張仲景方實屢稱之矣有八分一匕者見於蜘蛛散方後謂十分方寸七之八也又洪遵泉志有方寸七圖蓋後人所捏造不足徵也錢五線匕者乃半錢匕斯闕錢匕宜從肘後方序録補入云凡云錢匕者以大錢上全抄之若云半錢則是一錢抄取一邊爾並用五銖錢也考五銖錢漢元狩五年所行大者徑一寸建武十六年又鑄五銖錢中平三年又鑄五銖錢徑寸一分蓋古方所用必系前漢物以抄散藥約重三分徐大椿云半錢匕今稱約重三分可疑張仲景方所云者即此物也魏志華他傳云與君散兩錢乃與散二錢匕也一撮者四刀圭也者蓋是不過論量之所起而已孫子算經云量之所起起於粟六粟為一圭十圭為一撮十撮為一抄十抄為一勺十勺為一合又云十勺六萬粟為一合夏候陽算經引倉曹云十粟為一圭十圭為一撮十撮為一抄十抄為一勺十勺為一合後漢書注引説苑云十粟為圭應劭云圭者自然之形陰陽之始四圭為撮孟康云六十四黍為圭諸説各各不同如是孫子及五曹算經夏候陽並以一千六百二十寸為一斛之積則升合之積可推而知矣但如本説一勺乃算經之一抄一合乃算經之一勺猶神農稱十黍為一銖而漢志以百黍為一銖之類也今以漢斛一勺定為本説之一合則一合者當今之一撮一有奇也然此所説與刀圭者十分方寸七之一準如梧桐子大無相準的則別是一義不得湊合矣或疑四刀圭之刀字為衍似是李時珍載本説更補十合為一升五字其意蓋以一合為藥升十分之一謬矣靈樞邪客篇所云秫米一升治半夏五合者未知其升合果是何制否然以合名量實創於漢志合籥為合則不得取栗氏之量以充秫米半夏之準矣張仲景方無以刀圭撮勺者如半夏芒硝香豉人尿豬膽汁蜀椒其稱幾合者豫未能定何量姑俟後之識者藥升者本説稱今人不復用則其行用當在秦漢之際明沉萬鈳詩經類考云家語云黃帝設五量魏崔靈恩注云古者為升上徑一寸下徑六分其深八分蓋藥升行於秦漢之際故崔氏以為古升然固非常用之升也又唐書韋縚傳詔獻爵視藥升所容以合古尚質嘗據周尺制此器以為藥室之設矣考張仲景方如芒硝麥門冬半夏赤小豆生梓白皮甘李根白皮吳茱萸小麥杏仁麻仁虻蟲蠐螬蟅蟲五味子葦莖薏苡仁瓜瓣酸棗仁竹茹皆用藥升也如膠飴生地黃馬屎人乳汁泔紫蘇煮汁冬瓜汁人糞汁土漿硬糖鹽蜜清酒苦酒白酒並繫世用之量非此藥升也如粳米或稍幾合亦似涉世用之量矣又曰凡丸藥有云如細麻者即胡麻也不必扁扁但令較略大小相稱爾如黍粟亦然以十六黍為一大豆也如大麻子者準三細麻也如胡豆者即今青斑豆是也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以二小豆準之如梧子者以二大豆準之一方寸七散蜜和得如梧子準十丸如彈丸及雞子黃者以十梧子準之同上按學古曰唐本注云方寸七散為丸如梧子得十六丸如彈丸一枚若雞子黃者準四十丸今彈丸同雞子黃此甚不等斯説為是千金云青小豆一名麻纍一名胡豆李時珍以為豌豆然豌豆大於大豆且無斑文要不審何物又雷公炮炙論有丸比鯉目説今不復贅又按學古又曰內經載半夏湯用流水千里以外者八升云云及張仲景方用水斗升皆宜從漢代之制矣漢之一斗今量之一升一合零一撮強升合皆從此酌量焉半夏湯云飲汗一小杯張仲景有熱粥一杯酒一杯等語醫心方引小品方云服湯云一杯者以三合酒杯子為準陳延之晉人則當從晉時三合約略今之三四勺耳如華元化範東陽葛稚川陶隱居及諸家經方今僅散見於孫思邈王燾方中及醫心方者亦當從各代之製為之水率庶可以無失先賢制方之本旨矣隋唐以來量有大小然湯藥唯用小者唐令已言之故宋人每稱古之三升今一升而間有系大量者則往往注其下謂用大斗大升合和之際靡不分明矣林億等校千金方其凡例稱今之此書當用三升為一升之制然孫氏撰用前代經方者一依其舊文則其水率亦當詳勘諸前代之制而為之增損林億之言蓋約略論之而已龐安常用古方恣意減分或增其水其弊固出於不詳陶氏所謂古稱矣而昔人煮湯之法至於趙宋時而一變聖惠方言凡煮湯云用水一大盞者約一升也一中盞者約五合也一小盞者約三合也許叔微陳無擇嚴子禮之輩皆以盞為率或云一建盞建州盞今有傳者而大小不一本邦方書雲天目者乃建盞也皆未詳所謂一盞定是若干合也降及元明皆多因準此法固不能如昔人經方之明言升斗而為之節度也矣今一據狩谷望之量考節録漢以來斛法之沿革以俾後學有所稽考云漢書律曆志劉向説苑孫子夏侯陽算經等諸説不同黍粟大小亦異皆難依以起量矣考王莽嘉量銘及古算經皆曰斛法千六百二十寸又以漢尺求之則一斛者今量之一斗一升零一勺匕撮弱也趙杜夔造斛一仿周式其斛則今量之一斗二升一合九勺五撮六四也趙大司農斛稍近漢量其斛則今量之一斗一升二合七勺有奇北魏之量一倍於古量故左傳定公八年正義云魏齊鬥稱於古二而為一今以漢量倍之則得今量二斗二升零三勺四撮弱定為北魏之一斛矣隋志稱後魏孝文時一依漢志作鬥尺則知其量與漢量正同然民間猶未普行焉北齊之斛者今量之一斗七升零零一撮余後周玉斗之一斛則今量之一斗七升七合零六撮余後周官鬥之一斛則今量之一斗零三合二勺三撮余建德六年作鐵尺同律度量以頒天下是時作量蓋當用鐵尺以作一千六百二十寸之斛則其斛今量之一斗三升二合七勺有奇是隋唐小量之所由來也後復三倍此量則左傳正義所謂周隋斗升於古三而為一者是也其一斛者則今量之三斗九升八合一勻一撮有奇也是隋唐大量之所原也則知大小二量並行實創於後周焉隋代遵用迄大業三年依復古鬥蓋用建德量也李唐之代並行大小二量然湯藥之外率用大量也宋又從唐制云今斛方尺深一尺六寸二分景祐四年範鎮上表政和二年詔量權衡以大晟樂尺為度其量今不可詳知矣至南宋之末以二千七百寸為一斛之積則今量之四斗四升五合八勺匕撮弱也元時則以二千五百寸為一斛則今五斗七升四合七勺一撮余明量又依元制成化鐵斛之一石者今量之五斗八升一合七勺五撮余明董谷碧里雜存今官制五斗為一斛實當古斛之半也正字通云今制五斗曰斛十斗曰石清康熙量方八寸深五寸積三百二十寸其一石則今五斗九升零四勺三撮余也
