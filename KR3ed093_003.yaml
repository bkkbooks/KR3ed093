body:
  text: 卷三方法大綱程普明曰論病之原以內傷外感四字括之論病之情則以寒熱虛實表裡陰陽八字統之而論治病之方則又以汗和下消吐清溫補八法盡之蓋一法之中八法備焉八法之中百法備焉病變雖多而法歸於一此予數十年來心領神會歷試而不謬者盡見於八篇中矣學者誠熱讀而精思之於以救濟蒼生亦未必無小補云醫學心悟按方法分類諸說紛糅但程氏析為八法雖未能無疵然稍屬約確故茲舉其敘辭以存梗概如其詳義具列在後蓋陳藏器以藥之大體定為十種而後世目以十劑或更蛇足數劑詳第十一卷中宜參至徐思鶴醫學全書則又添調和解利寒溫暑火平奪安緩淡清併為二十四方煩雜最甚此佗劉河間立有輕清暑火解甘淡緩寒調奪濕補平榮澀和溫十八劑出朱好謙心印紺珠經又王損庵證治準繩李建齋醫學入門並引之張戴人謂汗吐下三法能兼眾法二家之見繁省失當者也吳雪窗醫學權衡以戴人三法而補之以利溫和方見徐思鶴古今醫統亦未為盡張景岳八陣列為補和攻散寒熱固因尤失新奇而張石頑增有兼方亦為冗設焉又汪訒庵撰醫方集解其部分頗佳今拈例言於左曰蓋以治病之道當治於未病故先補養及既受病則有汗吐下三法故次發表湧吐攻裡若表症未除里證復急者當表裡交治故次發表攻裡按此說甚謬辨見於次卷又有病在半表半裡及在表而不宜汗在裡而不宜下者法當和解故次和解然人之一身以氣血為主故次理氣理血若受病之因多本於六淫故次風寒暑濕燥火古云百病皆從痰起故次除痰若飲食不節能致積滯故次消導又滑則氣脫故次收澀蟲能作病故次殺蟲至於眼目癰瘍婦人各有專科每科略取數方以備採擇末附救急良方以應倉卒又按仲景治傷寒大要亦不過八法曰汗曰清曰下曰溫此為六病正證之治曰吐曰消曰補曰澀此為兼變諸證之治汗清下溫兼變亦施而吐消補澀在正證所不須矣如雜病之治究竟亦不出於此八者範圍之外耳但八法中細目頗多今論列於各款云又嘗考前輩所辨析有曰其治有四因其輕而揚之下者因而竭之中滿者泄之高者因而越之者劉河間保命集有曰大要無越乎汗吐下溫四法者戴九靈撰呂滄洲傳有分為汗吐下溫和解調六類者陸彥功傷寒類證便覽有曰不過汗吐下溫和解五法者王心春傷寒證治明條有分為汗吐下滲和解溫補六類者李建齋醫學入門有分為汗吐下溫清補六法者張景岳類經又景岳全書每法有子目有分為發表解肌和解攻裡救里五法者陳長卿傷寒五法有分為發汗湧吐和解清熱攻血攻下者汪苓友傷寒辨注引張憲公傷寒論類疏有分為汗吐下和寒溫六方者柯韻伯傷寒論翼王晉三古方選注有分為發解和清救五略者汪春圃孝慈備覽蓋此諸說均皆有礙所以不敢從也補瀉要領孫真人曰素問曰實即瀉之虛即補之不虛不實以經調之此其大經也凡有藏府積聚則問少長須瀉則瀉凡有虛損無問少長須補即補以意量度而用之千金方陳延之曰自有少盛之人不避風涼觸犯禁忌暴竭津液雖得微疾皆不可輕以利藥下之一利便竭其津液因滯著床廗按千金因作困無廗字動經年歲也初始皆宜與平藥治也宜利者乃轉就下之耳唯小兒不在此例大法宜知如此也夫長宿人病宜服利湯藥者未必頓盡一劑也皆視其利多少且消息之於一日之寬也千金作候利之足則止病源未除者明後更合一劑千金明作於不必服盡但以前後利勢相成耳氣力堪劑者不制也千金制作論病源宜服利藥治取除者服湯之後宜將丸散也時時服湯助丸散耳夫病是服利湯得差者從此以後慎不中服補湯也得補病勢則還覆成也重就利之其人則重弊也若初差氣力未展平復者千金展作甚當消息之宜服藥者當以平和藥逐和之也若垂平復欲將補益丸散者自可以意䉼量耳夫有常患之人不妨行走氣力未衰欲將補益冷熱隨宜丸散者乃可先服利湯下便除胸腹中瘀積痰實然後可將補藥復有虛人積服補藥或中實食為害者可止服利藥除之復有平實之人暴虛空竭者亦宜以微補藥止以和之而不可頓補也暴虛微補則易平也過補喜否結為害也夫極虛極勞病應服補湯者千金此下有不過三劑即止若治八字非是風病應服治風湯者此皆非三五劑可治也自有滯風洞虛積服數十劑及至百餘劑乃可差者也然應隨宜增損之以逐其體寒溫澀利耳家宿禰公醫心方引小品方按陳氏去仲景甚近此說精邃剴切非後世膚識之徒所能道及真醫家之典型豈可不三複乎張景岳曰治病之則當知邪正當權重輕凡治實者譬如耘禾禾中生稗禾之賊也有一去一有二去二耘之善者也若有一去二傷一禾矣有二去四傷二禾矣若識禾不的俱認為稗而計圖盡之則無禾矣此用攻之法貴乎察得其真不可過也凡治虛者譬之給餉一人一升十人一斗日餉足矣若百人一斗千人一斛而三軍之眾又豈擔石之糧所能活哉一餉不繼將並前餉而棄之而況於從中克減乎此用補之法貴乎輕重有度難從簡也景岳全書按景岳又曰攻但可用於暫不可以收緩功補乃可用於常不可以求速效此概論也前卷既有詳辨宜參又曰凡臨證治病不必論其有虛證無虛證但無實證可據而為病者便當兼補以調營衛精血之氣亦不必論其有火證無火證但無熱證可據而為病者便當兼溫以培命門脾胃之氣斯說似精然病有雖無實不受補者有雖無熱不必溫者則亦是不免拘墟之見矣李念莪本草通玄曰凡用滋補藥病不增即是減內已受補故也用克伐藥病不減即是增內已受伐故也馮楚瞻錦囊秘錄曰邪重於本則以瀉為補本重於邪則以補為瀉並是攻補寒熱同用楊仁齋曰黃連湯用乾薑黃連柴胡桂薑湯用黃芩乾薑麻黃升麻湯用桂枝石膏返陰丹用附子膩粉陰旦湯用乾薑黃芩與夫桂枝石膏湯桂枝大黃湯乾薑黃連黃芩人參湯某藥性寒某藥性溫溫以調陰寒以調陽蓋使陰陽調而得其正其有陽證當下而表怯者陰證當溫而帶熱者皆可以前例推之亦當權其冷熱重輕為之增減斯可矣活人總括張隱菴曰夫治病有專宜於寒者熱者補者瀉者又宜寒熱補瀉之兼用者如傷寒有附子瀉心湯用大黃芩連附子寒熱之並用者有柴胡加龍骨牡蠣湯以人參大黃黃芩薑桂補瀉寒熱之並用者金匱有大黃附子細辛湯有大黃乾薑巴豆之備急丸此皆先聖賢切中肯綮之妙用當參究其所用之因而取法之今時有用涼藥而恐其太涼用熱藥而恐其太熱是止知藥之寒熱而不知病之邪正虛實也然亦有並用寒熱補瀉而切當者反為不在道者笑之開之曰寒熱補瀉兼用在邪正虛實中求之則得矣侶山堂類辨徐洄溪曰虛證宜補實證宜瀉盡人而知之者然或人虛而證實以弱體之人冒風傷食之類或人實而證虛如強壯之人勞倦亡陽之類或有人本不虛而邪深難出又有人已極虛而外邪尚伏種種不同若純用補則邪氣益固純用攻則正氣隨脫此證未愈彼病益深古方所以有攻補同用之法疑之者曰兩藥異性一水同煎使其相制則攻者不攻補者不補不如勿服若或兩藥不相制分途而往則或反補其所當攻攻其所當補則不惟無益而反有害是不可不虞也此正不然蓋藥之性各盡其能攻者必攻強補者必補弱猶掘坎於地水從高處流下必先盈坎而後進必不反向高處流也如大黃與人參同用大黃必能逐去堅積決不反傷正氣人參自能充盈正氣決不反補邪氣蓋古人制方之法分經別藏有神明之道焉如瘧疾之小柴胡湯瘧之寒熱往來乃邪在少陽木邪侮土中宮無主故寒熱無定於是用柴胡以驅少陽之邪柴胡必不犯脾胃用人參以健中宮之氣人參必不入肝膽則少陽之邪自去而中土之氣自旺二藥各歸本經也如桂枝湯桂枝走衛以祛風白芍走營以止汗亦各歸本經也以是而推無不盡然試以神農本草諸藥主治之說細求之自無不得矣凡寒熱兼用之法亦同此義故天下無難治之症後世醫者不明此理藥惟一途若遇病情稍異非顧此失彼即遊移浮泛無往而非棘手之病矣但此必本於古人制方成法而神明之若竟私心自用攻補寒熱雜亂不倫是又殺人之術也醫學源流論按白虎加人參湯治熱結津乏調胃承氣湯治燥實液虧柴胡加龍骨牡蠣湯治誤下壞證附子瀉心湯治裡熱表虛之類是攻補同用也半夏生薑甘草三瀉心湯治中焦冷熱不調梔子乾薑湯黃連湯烏梅丸乾薑黃芩黃連人參湯治上熱下冷柴胡桂枝幹薑湯治水熱相併之類是寒熱同用也此皆所病之證本屬錯雜故藥之攻補寒熱各有相對者也前卷治辨虛實治有不可正行反治等條並宜參看又有病但寒但熱而寒熱並行者如大青龍湯桂枝加大黃湯大黃附子湯備急丸之類是其藥一取其性一取其用性用相藉自作一種方劑矣詳論於第十卷又如白虎湯之粳米十棗湯之大棗之類是取回護胃氣矣並與攻補同用之意不同也五藏苦欲補瀉繆仲淳曰五藏苦欲補瀉乃用藥第一義苦欲者猶言好惡也違其性故苦遂其性故欲欲者是本藏之神之所好也即補也苦者是本藏之神之所惡也即瀉也肝苦急急食甘以緩之肝為將軍之官其性猛銳急則有摧折之意用甘草以緩之即寬解慰安之義也肝欲散急食辛以散之扶蘇條達木之象也用川芎之辛以散之解其束縛也以辛補之辛雖主散遂其所欲即名為補以酸瀉之如太過則制之毋使逾分酸可以收芍藥之屬虛則補之陳皮生薑之屬心苦緩急食酸以收之心為形君神明之性惡散緩而喜收斂散緩違其性斂則寧靜清明故宜五味子之酸以收其緩也心欲耎急食鹹以耎之軟者和調之義心君本和熱邪干之則躁急故須芒硝之鹹寒除其邪熱軟其躁急也以針補之澤瀉導心氣以入腎以甘瀉之煩勞則虛而心熱參耆之甘溫益元氣而虛熱自退故名為瀉虛則補之心以下交於腎為補炒鹽之咸以潤下使下交於腎既濟之道也脾苦濕急食苦以燥之脾為倉廩之官屬土喜燥濕則不能健運白朮之燥遂其性之所喜也脾欲緩急食甘以緩之稼穡之甘甘生緩是其本性也以甘補之脾喜健運氣旺則行人參是也以苦瀉之濕土主長夏之令濕熱太過脾斯困矣急以黃連之苦瀉之虛則補之甘草益氣大棗益血俱甘入脾肺苦氣上逆急食苦以泄之肺為華蓋之藏相傅之官藏魄而主氣者也氣常則順氣變則逆逆則違其性矣宜黃芩苦以泄之肺欲收急食酸以收之肺主上焦其政斂肅故喜收宜白芍藥之酸以收之以辛瀉之金受火制急食辛以瀉之桑白皮是也以酸補之不斂則氣無管束肺失其職矣宜五味子補之酸味遂其收斂以清肅乎上焦虛則補之義見上句腎苦燥急食辛以潤之腎為作強之官藏精為水藏主五液其性本潤是故惡燥宜知母之辛以潤之腎欲堅急食苦以堅之腎非堅無以稱作強之職四氣遇濕熱即軟遇寒冷則堅五味得咸即軟得苦即堅故宜黃檗以苦補之堅即補也宜地黃之微苦以咸瀉之咸能軟堅軟即瀉也澤瀉是已虛則補之藏精之藏苦固能堅然非益精無以為補故宜熟地黃山茱萸神農本草經疏按原文稍繁今節其要且肝苦急以下據李念莪醫宗必讀刪訂錄又曰經曰五藏者藏精氣而不瀉者也故曰滿而不能實是有補而無瀉者其常也藏偶受邪則瀉其邪邪盡即止是瀉其邪非瀉藏也藏不受邪毋輕犯也世謂肝無補法知其謬也六府者傳導化物糟粕者也故曰實而不能滿邪客之而為病乃可攻也中病乃已毋盡劑也病在於經則治其經病流於絡則及其絡經直絡橫相維輔也同上按五藏苦欲補瀉見藏氣法時論而王海藏隸以各藥殆不免牽執見湯液本草今繆氏就其意敷演為說亦似不確協姑錄以備參酌焉蓋雜病論首辨藏府虛實之例以示施治之法必本於藏府之理是以古經方必論藏府虛實而宋代官撰聖惠濟眾聖濟等書其方藥尤備皆深達經旨者矣逮易水師弟剏報使之說而丹溪以來專主張之古義蕩然庋而不講唯滑攖寧著有五藏補瀉心要豈有見於此歟又按十四難曰損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精蓋是與法時論別發一義而所謂益氣緩中者猶足補脾一途補彼以及此者也滑攖寧經本義曰緩者和也又金匱肝之病補用酸助用焦苦達用甘味之藥調之尤飼鶴金匱心典引難經為解至如瀉法則繆氏以為藏偶受邪則瀉其邪此說誠是蓋五藏無自實為病者其所謂實者客熱壅實已故心脾肺之於瀉皆不過清解其熱但肝主條達偶有抑怒憤郁亦亢實為病故清肝之外更有疏肝代肝之法腎之於瀉亦僅瀉其外府錢仲陽曰腎主虛不受瀉可謂確言矣此語見小兒直訣睦親宅一大王瘡疹黑陷條中又本草綱目大戟條有說宜相參又宋學士文集贈醫師賈某序稱仲陽之術曰建為五藏之方各隨所宜肝有相火則有瀉而無補腎為真水則有補而無瀉皆啟內經之秘尤知者之所取法考肝無補法錢氏本無其說且與經旨相戾繆氏之辨為當補脾補腎之辨載在後捲雲氣血調治繆仲淳曰一補氣氣虛宜補之如人參黃耆羊肉小麥糯米之屬是也二降氣調氣降氣者即下氣也虛則氣升故法宜降其藥之輕者如紫蘇子橘皮麥門冬枇杷葉蘆根汁甘蔗其重者如番降香郁金檳榔之屬調者和也逆則宜和和則調也其藥如木香沉水香白豆蔻縮砂蜜烏藥之類三破氣破者損也實則宜破如少壯人暴怒氣壅之類然亦可蹔不可久其藥如枳實青皮枳殼牽牛之屬蓋氣分之病不出三端治之之法及所主之藥皆不可混濫者也誤則使病轉劇世多不察故表而出之血虛宜補之虛則發熱內熱法宜甘寒甘平酸寒酸溫以益營血其藥為熟地黃白芍藥牛膝炙甘草酸棗仁龍眼肉鹿角膠肉蓯蓉甘枸杞子甘菊花人乳之屬血熱宜清之涼之熱則為癰腫瘡癤為鼻衄為齒衄為牙齦腫為舌上出血為舌腫為血崩為赤淋為月事先期為熱入血室為赤遊丹為眼暴赤痛法宜酸寒苦寒鹹寒辛涼以除實熱其藥為童便牡丹皮赤芍藥生地黃黃芩犀角地榆茜草大小薊黃連山梔大黃青黛天門冬玄參荊芥之屬血瘀宜通之瘀必發熱發黃作痛作腫及作結塊癖積法宜辛溫辛熱辛平辛寒甘溫以入血通行佐以鹹寒乃可軟堅其藥為當歸紅花桃仁蘇木桂五靈脂蒲黃薑黃鬱金京三稜延胡索花蕊石沒藥䗪蟲乾漆自然銅韭汁鱉甲童便牡蠣芒硝之屬蓋血為營陰也有形可見有聲可察有證可審者也病既不同藥亦各異治之之法要在合宜倘失其宜為厲不淺差劇之門可不謹乎本草經疏按朱丹溪格致餘論云氣無補法世俗之言也以氣之為病痞悶壅塞似難於補恐增病勢不思正氣虛者不能運行邪滯所著而不出所以為病經曰壯者氣行則愈怯者著而成病苟或氣怯不用補法氣何由行此說蓋為假實證而發也又按滑攖寧曰血隧熱壅須用消黃氣隧寒壅須用桂附陰陽之用不同者無形有形之異也出朱天台撰攖寧生傳又曰血溢血泄諸蓄妄證其始也予率以桃仁大黃行血壞瘀之劑折其銳氣而後區別治之雖往往獲中猶不得其所以然也後來四明遇故人蘇伊舉問論諸家之術伊舉曰吾鄉有善醫者每治失血畜妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去畜利瘀則以妄為常曷以御之且去者自去生者自生何虛之有予聞之愕然曰名言也昔者之疑今釋然矣王損庵證治準繩引卮言二說可謂至當矣又前輩云血得熱則行得寒則凝此未審所出然內經既有其意宜參察病通義觀桃核承氣湯桂枝茯苓丸則其說可信矣然俞守約續醫說曰玄珠經十劑條內有云氣溫則血滑氣寒則血凝雖然亦有中寒氣虛陰陽不相守者血乃妄行經所謂陽虛陰必走者是也法當用辛溫之藥加官桂細辛中溫則血自歸經矣此亦一說又繆氏有吐血三法曰宜降氣不宜降火宜行血不宜止血宜補脾不宜伐肝又黃錦芳本草求真曰血有盛於氣則血泣而不流故有必用溫暖之藥以行之氣勝於血則血燥而不通故有必賴清涼之藥以行之楊仁齋曰蓋氣者血之帥也氣行則血行氣止則血止氣溫則血滑氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導達病原於氣區區調血何加焉故人之一身調氣為上調血次之是又先陽後陰之意也若失血有敗瘀滯泥於諸經則氣之道路未免有壅遏又當審所先而決去之經所謂先去其血而後調之又不可不通其變矣然而調氣之劑以之調血而兩得調血之劑以之調氣而乖張如木香如官桂如細辛如厚朴以至烏藥香附莪朮三稜之類治氣可也治血亦可也若以當歸地黃輩論之施之血證無以逾此然其性纏滯每於胃氣有虧焉胃氣既虧則五藏六府之氣亦餒矣其間劑量而佐助之雖然心為血之主肝為血之藏肺為氣之主腎為氣之藏誠哉是言也學者苟知血之出於心而不知血之納於肝知氣之出於肺而不知氣之納於腎用藥摸稜往往南轅而北轍矣假如血痢作恙以五味門冬等劑行其心以巴豆大黃等劑逐其積而其痛獨存者血之所藏無以養也必佐以川芎或芎歸湯輩則其痛止假如喘嗽氣鳴以姜橘枳梗蘇桂調其氣以南星半夏細辛豁其痰而終不下降者氣之所藏無以收也必佐以補骨指或安腎丸輩則其氣歸元病有標本治有後先綱舉而目斯張矣噫此傳心吃緊之法也直指方按易思蘭醫案曰有云氣如橐籥血如波瀾決之東流之東決之西流之西氣有一息不運則血有一息不行欲治其血先調其氣或曰血病治氣理固明矣嘗見有調氣而血疾不愈者有不調氣而治血亦愈者又何也予曰所因有不同耳有因血而病氣者有因氣而病血者能以脈證辨之而治法之先後定矣繆氏又曰因氣病而及血者先治其氣因血病而及氣者先治其血因證互異宜精別之並本於仁齋也如氣血補法之詳後自有條茲不具錄
