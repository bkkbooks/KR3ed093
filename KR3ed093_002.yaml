body:
  text: 卷二治病求本朱丹溪曰將以施其療疾之法當以窮其受疾之源蓋疾疚之源不離於陰陽二氣之邪也窮此而療之厥疾弗瘳者鮮矣良工知其然謂夫風熱火之病所以屬乎陽邪之所客病既本於陽苟不求其本而治之則陽邪滋蔓而難制濕燥寒之病所以屬乎陰邪之所客病既本於陰苟不求其本而治之則陰邪滋蔓而難圖誠能窮源療疾各得其法萬舉萬全之功可坐而致也治病必求於本見於素問陰陽應象大論者如此夫邪氣之基久而傳化其變證不勝其衆也譬如水之有本故能薦至汪洋浩瀚派而趨下以漸大草之有本故能薦生莖葉按此脫華字實秀而在上以漸蕃若病之有本變化難窮苟非必求其本而治之欲去深感之患不可得也丹溪心法類集徐洄溪曰凡人之所苦謂之病所以致此病者謂之因如同一身熱也有風有寒有痰有食有陰虛火升有鬱怒憂思勞怯蟲疰此謂之因知其因則不得專以寒涼治熱病矣蓋熱同而所以致熱者不同則藥亦迥異凡病之因不同而治各別者盡然則一病而治法多端矣而病又非止一證必有兼證焉如身熱而腹痛則腹又為一證而腹痛之因又復不同有與身熱相合者有與身熱各別者如感寒而身熱其腹亦因寒而痛此相合者也如身熱為寒其腹痛又為傷食則各別者也又必審其食為何食則以何藥消之其立方之法必切中二者之病源而後定方則一藥而兩病俱安矣若不問其本病之何因及兼病之何因而徒曰某病以某方治之其偶中者則投之或愈再以治他人則不但不愈而反增病必自疑曰何以治彼效而治此不效並前此之何以愈亦不知之則幸中者甚少而誤治者甚多終身治病而終身不悟歷症愈多而愈惑矣醫學源流論按丹溪本於經旨而洄溪之言殊為明切故並載之又張景嶽全書有求本論曰起病之因便是病本萬病之本只此表裡寒熱虛實六者而已明者獨知所因而直取其本則所生諸病無不隨本皆退矣至若六者之中多有兼見而病者則其中亦自有源有流無弗可察然惟於虛實二字總貫乎前之四者尤為緊要當辨亦是一義也治宜防微徐洄溪曰病之始生淺則易治久而深入則難治內經云聖人不治已病治未病夫病已成而藥之譬猶渴而穿井鬥而鑄兵不亦晚乎傷寒論序云時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈患人忍之數日乃説邪氣入藏則難可制按此傷寒例文昔扁鵲見齊桓公云病在腠理三見之後則已入藏不可治療而逃矣歷聖相傳如同一轍蓋病之始入風寒既淺氣血藏府未傷自然治之甚易至於邪氣深入則邪氣與正氣相亂欲攻邪則礙正欲扶正則助邪即使邪漸去而正氣已不支矣若夫得病之後更或勞動感風傷氣傷食謂之病後加病尤極危殆所以人之患病在客館道途得者往往難治非所得之病獨重也乃既病之後不能如在家之安適而及早治之又復勞動感冒致病深入而難治也故凡人少有不適必當即時調治斷不可忽為小病以致漸深更不可勉強支持使病更增以貽無窮之害此則凡人所當深省而醫者亦必詢明其得病之故更加意體察也醫學源流論按治病救於未成誠是醫家之吃緊要訣而歷聖相傳之心法必無不以此為第一義內經曰邪風之至疾如風雨次注云至謂至於身形故善治者治皮毛止於萌也其次治肌膚救其已生其次治筋脈攻其已病其次治六府治其已甚其次治五藏治五藏者半死半生也治其已成又曰見微得過用之不殆又曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時本草經曰欲療病先察其源先候病機五藏未虛六府未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全扁鵲傳曰使聖人預知微能使良醫得蚤從事則疾可已身可活也仲景曰適中經絡未流傳府藏即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞玉函經云主候長存形色未病未入腠理針藥及時服將調節委以良醫病無不愈皆可以見已蓋臨病之際精診熟察於其緩急輕重進退之勢與邪正推蕩之機反復思索痛著眼力倘遇脈證不合者審情辨姦必認得日後如何而處置對方無敢後時則重者能輕進者能退假令一時變生我心預有所期則操縱自在不使其至於敗壞困極即是良工之事也若不審其機遷延失治使輕者重重者死及異證蜂起則錯愕失據但躡其蹤而尾追之或事後論變粉澤其非者皆粗工也抑多事自擾誅伐無過而謂預為防禦猶是暗於機宜者亦不可不戒也葉香嵓曰蓋病有見證有變證有轉證必灼見其初終轉變胸有成竹而後施之以方否則以藥治藥宜以人試藥也此言是矣葉言見沉歸愚文集又徐思鶴古今醫統有慎疾説盧紹庵一萬社草論病宜早治其意與洄溪相同今不具録治有標本張景嶽曰病有標本者本為病之源標為病之變病本惟一隱而難明病變甚多顯而易見故今之治病者多有不知本末而惟據目前則最為斯道之大病且近聞時醫有云急則治其標緩則治其本互相傳誦奉為格言以為得其要矣豫聞此説而詳察之則本屬不經而亦有可取所謂不經者謂其以治標治本對待為言則或此或彼乃可相參為用矣若然則內經曰治病必求其本亦何謂耶又經曰夫陰陽逆從標本之為道也小而大淺而博可以言一而知百病之害也以淺而知深察近而知遠言標與本易而無及又曰先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先病而後生熱者治其本先病而後泄者治其本先泄而後生他病者治其本先熱而後生中滿者治其標先病而後生中滿者治其標先中滿而後生煩心者治其本小大不利治其標小大利治其本先小大不利而後生病者治其本由此觀之則諸病皆當治本而惟中滿與小大不利兩證當治標耳蓋中滿則上焦不通小大不利則下焦不通此不得不為治標以開通道路而為升降之所由是則雖曰治標而實亦所以治本也自此之外若以標本對待為言則治標治本當相半矣故豫謂其為不經者此也然亦謂其可取者則在緩急二字誠所當辨然即中滿及小大不利二證亦各有緩急蓋急者不可從緩緩者不可從急此中亦自有標本之辨萬不可以誤認而一概論也景嶽全書按經又曰病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚以意調之王啓玄注曰本而標之謂有先病復有後病也以其有餘故先治其本後治其標也標而本之謂先發輕微緩者後發重大急者以其不足故先治其標後治其本也急則治其標之言蓋本於此李東垣試效方曰如先生輕病後滋生重病亦先治輕病後治重病如是則邪氣乃伏蓋先治本故也可謂拘矣繆仲淳曰病在於表毋攻其里病在於里毋虛其表邪之所在攻必從之受邪為本現證為標五虛為本五實為標譬夫腹脹由於濕者其來必速當利水除濕則脹自止是標急於本也當先治其標若因脾虛漸成脹滿夜劇晝靜病屬於陰當補脾陰夜靜晝劇病屬於陽當益脾氣是病從本生本急於標也當先治其本舉一為例余可類推矣神農本草經疏喻西昌曰至於病氣之標本病發而有餘必纍及他藏他氣先治其本不使得入他藏他氣為善病發而不足必受他藏他氣之纍先治其標不使纍及本藏本氣為善醫門法津江含徵曰治病當知標本矣然猶不可不知標中之標本中之本如脾胃虛而生濕熱是虛為本濕熱為標也至濕熱下流膀胱之氣化不利是濕熱為標氣化不利為標中之標至氣化不利逆而上行嗌塞喘逆又標中標之標也推此而逆求之則本中之本亦可得矣醫律一筏何西池曰中風痰涎壅盛不通則死急用三生飲稀涎通關等散去其痰又吐衄余血停瘀不得不去瘀導滯亦急則治標之義也醫碥治有初中末王海藏曰治病之道有三法焉初中末也初治之道法當猛峻者謂所用藥勢疾利猛峻也緣病得之新暴感之輕得之重皆當以疾利猛峻之藥急去之中治之道法當寬猛相濟為病得之非新非久當以緩疾得中之藥養正去邪相兼濟而治之養正去邪者假令如見邪氣多正氣少宜以去邪藥多正氣藥少凡加減藥法如此之類更以臨時對證消息增減用藥仍依時令行之無忌也更加針灸其效更速末治之道法當寬緩寬者謂藥性平善廣服無毒惟能養血氣安中蓋為病證已久邪氣潛伏至深而正氣微弱故以善藥廣服養正多而邪氣自去更加以針灸其效尤速此事難知按此説不必拘執然不能無其理要在活看耳考劉河間保命集云五泄傷寒乃分三節初説暴次説中後説久泄又云是三節內包十五法初以暴藥中以的對證藥緩疾得中也末治久泄法仲景論厥陰經治法是也羅謙甫撰李東垣脾胃論後序曰病之所起初受熱中心火乘脾末傳寒中腎水反來侮土乃立初中末三法然則三法之説出於河間而海藏則擴充東垣者也海藏又本於王啓玄有和取從折屬五治論茲不採入治有緩急王中陽曰大抵暴病不可荏苒沉疴不可速瘳欲速則更醫必驟醫衆其論必繁荏苒則邪氣入深用藥未必即差泰定養生主論徐洄溪曰病有當急治者有不當急治者外感之邪猛悍剽疾內犯藏府則元氣受傷無以託疾於外必乘其方起之時邪入尚淺與氣血不相亂急驅而出之於外則易而且速若俟邪氣已深與氣血相亂然後施治則元氣大傷此當急治者也若夫病機未定無所歸著急用峻攻則邪氣益橫如人之傷食方在胃中則必先用化食之藥使其食漸消由中焦而達下焦變成渣穢而出自然漸愈若即以消黃峻藥下之則食尚在上焦即使隨藥而下乃皆未化之物腸胃中脂膜與之同下而人已大疲病已生變此不當急治者也按傷食證不一其危劇者必須急下此殊就緩證而言宜勿拘泥以此類推余病可知至於虛人與老少之疾尤宜分別調護使其元氣漸轉則正復而邪退醫者不明此理而求速效則補其所不當補攻其所不當攻所服之藥不驗又轉求他法無非誅伐無過至當愈之時其人已為藥所傷而不能與天地之生氣相應矣故雖有良劑用之非時反能致害緩急之理可不講哉醫學源流論張景嶽曰治病用藥本貴精專尤宜勇敢凡久遠之病則當要其終始治從乎緩此宜然也若新暴之病虛實既得其真即當以峻劑直攻其本拔之甚易若逗留畏縮養成深固之勢則死生系之誰其罪也故凡真見裡實則以涼膈承氣真見裡虛則以理中十全表虛則耆術建中表實則麻黃柴桂之類但用一味為君二三味為佐使大劑進之多多益善夫用多之道何在在乎必賴其力而料無害者即放膽用之性緩者可用數兩性急者亦可數錢若三五七分之説亦不過點名具數兒戲而已解紛治劇之才舉動固如是乎景嶽全書盧紹庵曰病淺效速病深效遲必然之理也試觀往哲醫案其療深重之病用藥或至數十百劑經年纍月方能奏效水到渠成藥到病退譬如口渴覓茶必須引滿鯨吸才堪滋潤喉吻是以吾家玉川翁有七碗之喻一碗二碗曷克有濟今人以沉久之疾而求旦夕之效是杯水沃輿薪多見其不知量矣一萬社草按劉河間保命集曰經曰治主以緩治客以急蓋言客邪宜急逐正虛宜緩救之義但其語經無所見當考又暴病有漸而發者或有不可必急治永疾觸事而動者亦有不可必緩治並宜別論矣又按景嶽諸輩論久病多言調補不及轉刷然久病不止虛弱宜補者凡沉滯之病內有痼結者非藉考下則不能拔除豈可一概而論乎景嶽之術偏於滋養故其説亦有所偏矣緩下之法詳載於第五卷中茲不縷述治有輕重戴復庵曰藥病須要適當假如病大而湯劑小則邪氣少屈而藥力已乏欲不復治其可得乎猶以一杯水救一車薪火竟不得滅是謂不及若證小而湯劑大則邪氣已盡而藥力有餘欲不得正其可得乎猶火熾昆岡玉石俱焚是謂太過二者之論惟中而已過與不及皆為偏廢然而太過尤甚於不及蓋失於姑息邪復勝正者只是勞而無益猶可勉而適中或失苛暴則邪氣被傷因而羸瘠者有之危殆者有之此所謂尤甚也可不戒哉嘗考仲景於承氣條下則曰若更衣止後服於桂枝方下則曰微汗漐漐乃佳不可令水淋漓其旨深矣推求師意顧焉文曰慎齋先生云夫病重者其藥輕病輕者其藥重此又從七方之義再進竿頭通變於既窮救民於垂絶仁人之用心其至矣乎其所謂病輕者非輕也以其邪氣初感元氣未虧故病雖重猶謂之病輕宜亟用重劑劫而奪之所謂病重者久病元氣微弱如小草將枯若大加浸灌速其斃耳須用小水漸沾潤之庶有回生之機本草匯箋程若水曰用藥又不可過與驟假如人之病利用溫藥即以溫藥治之藥非不對證也苟愈而過用溫劑則祛一病又生一病矣諸證用藥皆然又如人久病血氣極虛當補以溫尤宜徐徐進藥以俟血氣之復倘驟用溫藥亟補則將敗之血氣不能勝其藥力即所用之藥極與證合亦將歸於敝而已醫彀按孫真人曰病輕用藥須少屙重用藥即多此則醫之一隅何足怪也蓋復庵本於此意而論服藥多少亦可該施治之理焉文別發一義若水辨過驟之害皆不外於輕重適中之謂故並載之張子剛雞峰普濟方曰凡人三部脈大小沉浮遲疾同等不越至數勻和者雖病有寒熱不解此為陰陽和平之脈縱病必愈此乃感小邪之氣故不可深治大攻吐瀉發汗若藥勢過多反致危損切切禁之又方仁聲泊宅編載一老醫論小病不須深治但服溫平劑正氣逐濕痹可延歲月並言小病深治誅罰無過之弊又證治要訣有舉傷寒治驗以為用藥太過之戒而徐洄溪醫學源流論病深非淺藥能治論中所言其意相發曰世又有極重極久之病諸藥罔效忽服極輕淡之方而愈此乃其病本非專治之方從前皆系誤治忽遇對證之藥自然應手而痊也治有先後沈目南曰病在表而醫反下之誅伐無過致傷脾胃之氣所以下利清穀不止然雖身疼表證未解當救誤下之逆為急不可顧慮表邪以致內陽下脫必俟元陽恢復清便自調之後急當救表然表當急救何也蓋恐內陽初復未充外邪陷入又變結胸痞滿耳金匱編注趙以德曰痼疾病已沉痼非旦夕可取效者卒病謂卒然而來新感之病可取效於旦夕者乘其所入未深急去其邪不便稽留而為患也且痼疾之人正氣素虛邪尤易傳設多瞻顧致令兩邪相合為患不淺故仲景立言於此使後學者知所先後也醫宗金鑑引按朱二然校印金匱二注此係周禹載補注按金匱首篇第十四十五兩條以示治有緩急先後之序不可逆施之義沉趙所釋於諸家注中最為約核故櫟蔭府君撰金匱輯義既所援據今又揭出以備楷式但前條所論就表熱裡虛而言考之經旨如表熱裡實者則其法相反蓋表熱裡虛則必先里而後表何也先實里者恐脫候倏至邪亦從陷也里既實而從事於表亦不為遲設先救表則虛耗之陽隨汗益奪豈望邪氣外散耶表熱裡實則必先表而後里何也先攻表者恐表邪併入裡熱壅重也表既解而從事於里亦不為遲設先攻裡則胃空邪乘遂為壞病豈望邪氣內解邪乃是仲景之明律不可不知也楊仁齋直指方曰治病如奕棋當先救急急者何救其重而略其輕也亦先後之謂也金匱水氣病第二十二條亦是先後之例然彼條言急則治其標之意而與卒病痼疾稍有不同又按朱丹溪引潔矩新書謂有雜合邪者當以雜合法活之譬如感冒外邪兼為食所傷而平昔多怒又平時房勞者且補中化食行滯清涼胃火而以薑辣行之則中氣稍回外感自解見局方發揮而載復庵推求師意樓仙岩醫學綱目所載為詳此不知仲景先後之例者而此等許多證候固非一方之所能籠罩其駁雜無統一至如此則互相牽制功力迂慢豈得奏奇功乎可謂陋矣又按蔣孝琬曰或病先患冷而卒得熱者治熱不愈尋加進平溫之藥而調之不然冷方轉增或冷患熱時治之不可一用熱藥攻之反得熱蒸又曰病力弱者形肉多消欲治之法先以平和湯一兩劑少服通調血氣令病人力漸漸強生然可服當病大藥耳並家宿禰公醫心方引此一言冷熱混淆一言先虛後實俱系施治先後之例仍附存之雞峰普濟方有本病中別生滯礙條宜參治貴應變趙嗣真曰厥為亡陽不能與陰相順接咽乾為津液寡煩躁吐逆為寒格而上也故宜甘草乾薑以溫里復陽甘草芍藥益其汗奪之血然後可以復陰陽不足之氣得腳伸後或讝語者由自汗小便數胃家先自津液干少又服乾薑性燥之藥以致陽明內結讝語雖然非邪實大滿故但用調胃承氣以調之仍少與之也原其芍藥甘草湯乃是厥愈足溫後專治兩脛攣急之藥非正治脈浮自汗出小便數之藥也自常人觀之豈不曰自汗小便數證又無自利遽用乾薑溫之因而以致結燥讝語後卻用芒硝大黃寒藥以解其熱似若失次使病家遇此必歸咎醫人以為誤用乾薑熱燥之失後藥解先之差矣殊不知仲景之意不患乎乾薑之熱惟患乎正氣之虛正氣之長邪氣之所由消也且自汗小便數等證為表裡俱虛治法必先復其陰陽不足之正氣然非乾薑芍藥甘草不可至於正氣陰陽已復而內有所主則雖胃燥讝語不過大便內結大黃芒硝潤滑而去之而正氣內強不至下脫結燥而正氣安矣以上用藥次第先熱後寒先補後瀉似逆而實順非仲景之妙孰能至是哉後之學者可不以此為法推廣而應變吾何暇辨病家之繆謗也耶汪石山傷寒選録引接治病之法所要在應變所難亦在應變蓋病之情機固不可窮陰陽之進退邪正之消長千狀萬態變化不一或一證愈而更生一證或彼候未去而又發此候有可必其變者有不可必其變者要之其人情思之感動飲食之失節起居之違度及節氣之交錯藥劑之誤謬皆能為變醫者審諦脈證隨權制宜圓機活法方稱合轍是治之要於應變也是以昨日所處今日換之今日所易明日或轉雖殆似無特操而理或有不得不爾者然必也處靜觀動反覆熟察不敢苟且鹵莽之可也是治之難於應變也仲景之於甘草乾薑湯諸變正是所以示活通之妙故茲表趙氏之注以為例焉咳嗽中小青龍湯下已續後五章亦同其趣如前所敘標本先後諸義並可互發矣且有其證變而治不須變者如桂枝證服之反煩猶用桂枝者是也有證不變而治宜變者如赤石脂禹餘糧湯證復利其小便者是也俱不可不審如夫見頭治頭數數換方而藉口達變者與固執不移莫敢顧慮而自矜卓見者其陋則一也頃檢永富獨嘯漫遊雜記有一條曰治療之道二端曰持重曰逐機所謂持重者病深則治一非迂慢而過日也所謂逐機者證移則輒隨非迷惑而轉方也持重者常也逐機者變也勿能逐機而失於持重焉勿務持重而忽於逐機焉此言明核先得吾意矣但逐機字有病當作應機為穩又按無名氏史載之方跋稱載之之術曰蓋其審證精切不過三四服立愈喻當逾訛是而不效乃察病按方之不審便當改轍不可泥也此言證不變而治須變者然其云決效否於三四服者殆不免誇大也王中陽養生主論曰閭閻之家不諳服餌投藥未幾或證當轉變或藥病相攻便言有隔即從事乎異端不根之説而中道而廢明明易治之病翻成不救之危此言證變而治不宜變者實仲景桂枝湯服法之遺意也又程若水醫彀治發斑案張景嶽全書治戰汗案並言治宜持重者亦後學模範耳若水按云癸未年崇梵僧規大患發熱頭疼疲倦之極診其脈氣口大於人迎三倍虛浮無力豫用補中益氣湯去升麻加附子一片冰冷服之越三兩時遍體發紅斑時醫謂為熱藥所誤豫曰不然此非彼所識蓋因正氣未復虛火遊行於外故發斑耳仍將前藥再加附子一片服一貼其病悉除景嶽按拈於拙著傷寒廣要少陰篇今不復贅虛實治要張景嶽曰通評虛實論曰邪氣盛則實精氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其虛而補之乎抑先其邪而攻之乎見有不的則死生系之此其所以宜慎也夫正者本也邪者標也若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸變生則措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也若正氣無損者邪氣雖微自不宜補蓋補之則正無與而邪反盛適足以藉寇兵而資盜糧故治實證者當直攻其邪邪去則身安但法貴精專便臻速效此治實之道也要之能勝攻者方是實證實者可攻何慮之有不能勝攻者便是虛證氣去不返可不寒心此邪正之本末不可不知也類經又曰邪氣盛則實精氣奪則虛二句為病治之大綱其辭似顯其義甚微最當詳辨而辨之有最難者何也蓋實言邪氣實宜寫也虛言正氣虛宜補也凡邪正相薄而為病則邪實正虛皆可言也故主寫者則曰邪盛則實當寫也主補者則曰精奪則虛當補也各執一句茫無確見藉口文飾孰得言非是以至精之調反釀莫大之害不知理之所在有必不可移易者奈時醫不能察耳余請析此為四曰孰緩孰急其有其無也所謂緩急者察虛實之緩急也無虛者急在邪氣去之不速留則生變也多虛者急在正氣培之不早臨期無濟也微虛微實者亦治其實可一掃而除也甚虛甚實者所畏在虛但固守根本以先為己之不可勝則邪無不退也二虛一實者兼其實開其一面也二實一虛者兼其虛防生不測也總之實而誤補固必增邪猶可解救其禍小虛而誤攻真氣忽去莫可挽回其禍大此虛實之緩急不可不察也所謂有無者察邪氣之有無也凡風寒暑濕火燥皆能為邪邪之在表在裡在府在藏必有所居求得其本則直取之此所謂有有則邪之實也若無六氣之邪而病出三陰則惟情欲以傷內勞倦以傷外非邪似邪非實似實此所謂無無則病在元氣也不明虛實有無之義必至以逆為從以標作本絶人長命損德多矣可不懼且慎哉同上何西池曰虛者正虛也謂其人氣血虛衰也實者邪實也一切內外寒熱諸邪不論有形無形但著滯為患亟宜消散者皆為實邪非謂其人氣血壯實也故曰虛中有實實中有虛所謂正自虛而邪自實也虛而不實者止用補虛而實者必攻補兼施若實而不虛則直攻之而已如虛人傷食輕則於補劑中加消導之品重則加下利之藥頃刻收功矣庸醫乃謂須與純補俟其氣旺則食自運行遷延時日坐失事機往往變生他證即幸而奏效病者受苦久矣未有久苦於病而元氣不傷者也名曰補之實以傷之亦何為哉有虛寒有實寒如多食生冷及寒痰停滯之類有虛熱有實熱知實熱而不知虛熱與知虛寒而不知實寒皆庸醫也醫碥吳又可曰病有先虛後實者宜先補而後瀉先實而後虛者宜先瀉而後補假令先虛後實者或因他病先虧或因年高血弱或因先有內傷勞倦或因新産下血過多或舊有吐血及崩漏之證時疫將發即觸動舊疾或吐血或崩漏以致亡血過多然後疫氣漸漸加重以上並宜先補而後瀉瀉者謂疏導之劑並承氣下藥概而言之也凡遇先虛後實者此萬不得已而投補劑一二貼後虛證少退便宜治疫若補劑連進必助疫邪禍害隨至假令先實而後虛者疫邪應下失下血液為熱搏盡原邪尚在宜急下之按劉松峰類編曰此虛乃因失下血液搏盡之虛非同平日虛怯之虛邪退六七宜急補之虛回五六慎勿再服多服則前邪復起下後畢竟加添虛證者方補若以意揣度其虛不加虛證誤用補劑貽害不淺溫疫論又曰病有純虛純實非補即瀉設遇既虛且實者補瀉間用當詳孰先孰後從少從多可急隨其證而調之同上按虛實猶病之質寒熱猶病之性凡物有質必有性是病所以有虛寒虛熱實熱實寒之辨也人身氣血一莫不稟於胃脘之陽是以病之虛實寒熱亦莫不本於胃陽之強弱深尋此理則處治之法自躍如心目矣蓋論虛實而不及寒熱則遂無得乎百法之真的故景嶽之論雖精猶有遺恨焉朱丹溪格知餘論有病邪雖實胃氣傷者勿使攻擊論何柏齋醫學管見有元氣大虛病邪大盛當使攻擊説均是不達虛實寒熱互參之義難以為章程矣元堅嘗著有論一篇今不自揣揭出於此曰為醫之要不過辨病之虛實也已虛實之不明妄下湯藥則冰炭相反坐誤性命是以臨處之際不容毫有率略矣蓋嘗考之厥冷下利人皆知大虛宜補潮熱譫語人皆知大實宜瀉此則其病雖重而診療之法莫甚難者矣如夫至虛有盛候大實有羸狀者誠醫之所難也雖然此猶難乎辨證而不難乎處治何者假證發露抑遏真情自非至心體察則不能辨其疑似而認其真然既認其真也純補純瀉一意直到而病可愈矣豈有他策耶唯醫之所最難者在真實真虛混淆糅雜者而已何者其病視為虛乎挾有實證視為實乎兼有虛候必也精慮熟思能析毫釐而其情其機始可辨認及其施治欲以補之則恐妨其實欲以瀉之則恐妨其虛補瀉掣肘不易下手必也審之又審奇正攻守著著中法而後病可起矣此豈非辨認難而處治亦難者乎岐伯有五有餘二不足之説而仲景之經所云難治者概此之謂也蓋虛實之相錯其證不能一定其治不能各無其別也區而論之有虛實相兼者焉病本邪實當汗如下而醫失其法或用藥過劑以傷真氣病實未除又見虛候者此實中兼虛也治之之法宜瀉中兼補倘虛甚者或不得已姑從於補虛復而後宜議瀉矣其人素虛陰衰陽盛一旦感邪兩陽相搏遂變為實者此虛中兼實也治之之法不清涼無由解熱不轉刷無由逐結然從前之虛不得不顧故或從緩下或一下止服前哲於此證以為須先治其虛後治其實此殆未是也大抵邪不解則不受補有邪而補徒增壅住且積日之虛豈暫補所能挽回乎考之經文如附子瀉心調胃承氣即瀉中兼補之治也陽明病至循衣摸床微喘直視則既屬虛憊而猶用承氣者以實去而陰可回縱下後頓見虛候其實既去則非調養叵治也擴充觸長無適而不可矣此虛實之相兼大較如此如夫虛實之相因而生是亦不可不辨也有人於此焉脾氣虧損或久吐或久利中氣不行馴至腹滿溺閉此自虛而生實也至其滿極則姑治其標主以疏導然不以扶陽為念則土崩可待也又有人焉腎陰不足下虧上盈或潮熱心煩或血溢痰湧亦是虛生實者也至其火亢則姑治其標專主清涼然不以潤養為念則真元竭絶矣有人於此焉腸澼赤滯腸痛後重如其失下則病積依然而津液日泄羸劣日加此自實而生虛也治法或姑從扶陽然不以磨積為先則邪勝其正立見危殆又有人焉肝氣壅實妄言妄怒既而脾氣受制飲食減損日就委頓亦是實生虛者也治法或姑從補中然不兼以清膈則必格拒不納矣在仲景法則汗後脹滿是自虛而實故用且疏且補之劑五勞虛極因內有乾血是自實而虛宿食脈澀亦自實而虛故一用大黃蟅蟲丸一用大承氣湯蓋乾血下而虛自復宿食去而胃必和也此虛實相因而生之大略也要之相兼者與相因者病之新久胃之強弱尤宜參伍加思亦是診處之大關鑰也更論虛實之兼挾則表裡上下之分又不可不知也實在表而裡虛者補其中而病自愈以病之在外胃氣充盛則宜托出且里弱可以受補如發背痘瘡之類是也實在裡而兼虛者除其實而病自愈以病之屬熱倘攔補之必助其壅如彼虛人得胃實與瘀血宿食之類是也病上實素下寒者必揣其臍腹而後吐下可用病下虛素上熱者必察其心胸而後滋補可施此表裡上下之例也雖然今此所論大概就病之屬熱者而立言已如病寒之證亦不可不辨焉經云氣實者熱也氣虛者寒也蓋胃強則熱胃弱則寒此必然之理也故寒病多屬虛者然有者厥陰病之上熱下寒此其上熱雖未必為實而未得不言之猶有陽存故涼溫並用方為合轍矣寒病又有陽雖虛而病則實者顧是胃氣本弱然關門猶有權而痼寒宿冷僻在一處或與邪相併或觸時氣而動以為內實也倘其初起滿閉未甚者須溫利之滿閉殊劇者攻下反在所禁唯當溫散之蓋以寒固胃之所畏其實之極必傷胃氣遂變純虛耳觀仲景太陰病及腹病寒疝之治而其理可見也然則病寒之實必要溫補固不可與病熱之虛猶宜清滌者一例而論矣玉函經曰寒則散之熱則去之可謂一言蔽之已是寒熱之分誠虛實證治之最吃緊也病之虛實藥之補瀉各有條例其略如此而微甚多少之際猶有不可不計較者實如張景嶽氏之言焉夫虛實之不明補瀉之不當而栩栩然欲療極重極險之病者豈足與語醫哉玉函經云虛實等者瀉勿太泄蓋所謂微虛微實之治例也又按吳氏於熱證兼虛者分為二等其義更精劉方明幼幼新書引孫真人玉函要訣曰或虛中有積熱先與利熱後與治虛又曰熱里有虛先與補虛然後退熱次調胃氣即無誤矣是其意與吳氏似異而同又徐洄溪醫學源流論曰或云邪之所湊其氣必虛故補正即所以驅邪此大繆也惟其正虛而邪湊尤當急驅其邪以衛其正若更補其邪氣則正氣益不能支矣又曰或云補藥托邪猶之增家人以御盜也是又不然蓋服純補之藥斷無專補正不補邪之理非若家人之專於御盜賊也是不但不驅盜並助盜矣是言暗中景嶽之病矣又繆仲淳神農本草經疏曰病屬於虛宜治以緩若屬沉痼亦必從緩治虛無速法亦無巧法蓋病已沉痼凡欲施治宜有次第故亦無速法病屬於實宜治以急邪不速逐則為害滋蔓故治實無遲法亦有巧法此説似有理然病有暴虛又有久實不可概論治當保護胃氣繆仲淳曰夫胃氣者即後天元氣也以穀氣為本是故經曰脈有胃氣曰生無胃氣曰死又曰安穀則昌絶谷則亡可見先天之氣縱猶未盡而他藏不至盡傷獨胃氣偶有傷敗以至於絶則速死矣穀氣者譬國家之餉道也餉道一絶則萬衆立散胃氣一散則百藥難施若陰虛若陽虛或中風或中暑乃至瀉利滯下胎前産後丁腫癰疽痘瘡痧疹驚疳靡不以保護胃氣補養脾氣為先務本所當急也故益陰宜遠苦寒益陽宜防泄氣祛風勿過燥散消暑毋輕下通瀉利勿加消導滯下之忌芒硝巴豆牽牛胎前泄瀉之忌當歸産後寒熱之忌芩連梔子丁腫癰疽未潰之忌當歸痘疹之不可妄下按瀉利以下六句不確勿必拘其他內外諸病應設藥物之中凡與胃氣相違者概勿施用投藥之頃宜加三思神農本草經疏張叔承曰曰氣曰血曰精曰津液一或不足當先理脾胃若脾胃不和食少不能生化精血縱加峻補不能成功昧者但知四物養血謂參朮不可用庸之甚矣大抵邪之所湊其氣必虛木必先腐而後蟲生牆壁堅固賊自難入醫家若不審脾胃元氣精血妄加攻伐涉虛之人鮮有不致於危者余家世業醫目擊其弊特為拈出明哲幸諒之醫學六要按仲景諄諄致意於胃氣即是內經之本旨蓋以生生之源實在於胃故實證猶不得不顧況於虛者乎成聊攝明理論云藥之所以能勝邪者必待胃氣施布藥力始能溫汗吐下之以逐其邪氣邪氣勝胃氣絶者湯藥縱下胃氣不能施布雖神丹其能為效乎觀此則益可以知胃氣之不可不保護矣補脾諸説詳在後卷當相參看治不必顧忌孫臺石曰凡治法用藥有奇險駭俗者只要見得病真便可施用不必顧忌即如病有臨危原屬有餘失於攻下所致雖至幾微欲絶猶當攻下取效若久瀉久痢至於滑脫不禁則宜劫止而後調之如國家以刑治姦盜以兵卻虜寇不得已而用權權不離經非霸術也王道也乃有醫謬稱王道一味平補調停此可施與不足不可施於有餘施於有餘則邪氣得補而愈盛是速其斃也又有遇危難證如大黃附子迥若霄壤恐致殺人而惟用中和之方無大熱大寒救療而死其殺人一也簡明醫彀徐洄溪曰凡病人或體虛而患實邪或舊有他病與新病相反或一人兼患二病其因又相反或內外上下各有所病醫者躊躇束手不敢下藥此乃不知古人制方之道者也古人用藥惟病是求藥所以制病有一病則有一藥以制之其人有是藥則其藥專至於病所而驅其邪決不反至無病之處以為禍也若留其病不使去雖強壯之人遷延日久亦必精神耗竭而死此理甚易明也如怯弱之人本無攻伐之理若或傷寒而邪入陽明則仍用消黃下藥邪去而精氣自復如或懷妊之婦忽患癥瘕必用桃仁大黃以下其瘕瘀去而胎自安或老年及久病之人或宜發散或宜攻伐皆不可因其血氣之衰而兼用補益如傷寒之後食復女勞復仲景皆治其食清其火並不因病後而用溫補惟視病之所在而攻之中病即止不復有所顧慮故天下無棘手之病惟不能中病或偏或誤或太過則不病之處亦傷而人危矣俗所謂有病病當之此歷古相傳之法也故醫者當疑難之際多所顧忌不敢對證用藥者皆視病不明辨證不的審方不真不知古聖之精義者也醫學源流論按此二論與上節意似相反而俱有深味世醫有止知逐邪而不知養正者有止知養正而不知逐邪者倘以此兩節與前虛實條參互玩繹則必自有所會矣蓋置之死地而後生者呂滄州評子和用此語殆是醫者之極效而膽欲大者實不可顧忌之謂也楊仁齋直指方曰療病如濯衣必去其垢汙而後可以加裝飾亦此義耳治有隨所得而攻尤飼鶴曰無形之邪入結於藏必有所據水血痰食皆邪藪也如渴者水與熱得而熱結在水故與豬苓湯利其水而熱亦除若有食者食與熱得而熱結在食則宜承氣湯下其食而熱亦去若無所得則無形之邪豈攻法所能去哉金匱心典按此係於解金匱首篇末條而亦處治之模範耳庸工不諳此理或熱未結實而強用攻下或州都虛燥而迫與滲利其害匪輕宜知戒也治有不可正行戴復庵曰有傷寒雜病有傷寒正病傷寒雜病者難以正病治如病人證狀不一有冷有熱陰陽顯在目前當就其中大節先治其餘證則徐治然亦不可用獨熱獨寒之劑又如嘔渴煩熱進小柴胡湯嘔渴煩熱止矣而下利不休以小柴胡湯為非則嘔渴煩熱不應止以為是則下利不應見吐利厥逆進薑附湯吐利厥逆止矣而熱渴讝語昏不知人以薑附為非則吐利厥逆不應去以為是則熱渴讝語不應見此亦傷寒雜病雖無前項冷熱二證顯然並見之迹而陰中有陽陽中有陰潛伏其間未即發見用藥一偏此衰彼盛醫者當於有可疑之處能反覆辨認無致舉一廢一則盡善矣證治要訣按盧砥鏡續易簡方後集曰凡為良工臨診值病證之純者治藥當如童蒙之屬小對字字清切證之駁者處方當如才子之破合題字字包盡復庵所謂雜病即證之駁者顧不啻傷寒有之而衆病皆有之矣施治之法貴在純專然病情百端不可執一而論考之經文病之寒熱相錯者固不為鮮治方亦多涼溫並行者詳見於次卷攻補寒熱並用條此與甘草乾薑湯應變之例稍有不同蓋如柴胡加龍骨牡蠣湯證尤其駁者也如厥熱進退亦證之不純者至其治法則似隨其變態各自措施焉自他反治之法冷熱合行後世醫書又有間服夾用之方見幼幼新書引惠眼觀證茅先生漢東王先生等又要訣中尤多其例而或有朝用附子暮用大黃之説見醫經會解未審所本當考又程若水醫彀曰凡人上實下虛者真陰虧損者寒涼固不宜而溫熱亦難進則當平以補之或早以丸藥補下晚以丸藥清上午以丸藥和中然此種治例倘粗心效顰則必落於丹溪雜合治之窠曰不能無亂藥失機之弊是以醫者值證之駁者則必精察標本虛實之宜孰急表裡新久之宜孰先苟無一於此而情機淆糅藥難徑行則適擇古人成方中攻補相兼者藥性平和者以處置之或不得已則二方更替夾用要當不悖於仲景之律為期矣如今之醫雖證之純者往往二方互擬稱云本方別煎況至駁者則數方兼施謂為能盡事術病家亦甘受習以為俗徒置人於不生不死之間可勝嘆哉張隱菴侶山堂類辨曰雜證者謂一人之病見證龐雜當知始病則一久久不去漸至蔓延故治雜病如理亂繩得其頭緒一路理清不則愈理愈亂矣所治之藥亦專取其要多則雜雜無功此説即前論不可顧忌之意而亦以可矯挽近雜治之偏故附於斯又按標本病傳論曰謹察間甚以意調之間者並行甚者獨行張景嶽曰間者言病之淺甚者言病之重也病淺者可以兼治故曰並行病甚者難容雜亂故曰獨行類經此説為是張隱菴集注高士宗直解以間者為相兼之義卻失經旨矣朱永年曰間甚之中又分緩急集注引亦是反治王啓玄曰夫病之微小者猶人火也遇草而炳得木而燔可以濕伏可以水滅故逆其性氣以折之攻之病之太甚者猶龍火也得濕而炳遇水而燔不知其性以水濕折之適足以光焰詣天物窮方止矣識其性者反常之理以火逐之則燔灼自消焰光撲滅然逆之謂以寒攻熱以熱攻寒從之謂攻以寒熱雖從其性用不必皆同是以下文曰逆者正治從者反治從多從少觀其事也此之謂乎素問次注又曰夫大寒內結稸聚疝瘕以熱攻除除寒格熱反縱反縱之則痛發尤甚攻之則熱不得前方以蜜煎烏頭佐之以熱蜜多其藥服已便消是則張公從此而以熱因寒用也有火氣動服冷已過熱為寒格而身冷嘔噦嗌乾口苦惡熱好寒衆議攸同咸呼為熱冷治則甚其如之何逆其好則拒治順其心則加病若調寒熱逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益醇酒冷飲則其類矣是則以熱因寒用也所謂惡熱者凡諸食餘氣主於生者新校正云主字疑誤上見之已嘔也又病熱者寒攻不入惡其寒勝熱乃消除從其氣則熱增寒攻之則不入以豉豆諸冷藥酒漬或溫而服之酒熱氣同固無違忤酒熱既盡寒熱已行從其服食熱便隨散此則寒因熱用也或以諸冷物熱劑和之服之食之熱復圍解是亦寒因熱用也又熱食豬肉及粉羹乳以椒薑橘熱劑和之亦其類也又熱在下焦治亦然假如下氣虛乏中焦氣擁胠脅滿甚食已轉增粗工之見無能斷也欲散滿則恐虛其下補下則滿甚於中散氣則下焦轉虛補虛則中滿滋甚醫病參議言意皆同不救其虛且攻其滿藥入則減藥過依然故中滿下虛其病常在乃不知疏啓其中峻補於下少服則資壅多服則宣通由是而療中滿自除下虛斯實此則塞因塞用也又大熱內結注泄不止熱宜寒療結復須除以寒下之結散利止此則通因通用也又大寒凝內久利溏泄愈而復發綿歷歲年以熱下之寒去利止亦其類也投寒以熱涼而行之投熱以寒溫而行之始同終異斯之謂也斯如此等其徒實繁略舉宗兆猶是反治之道斯其類也同上又曰要格曰寒盛格陽治熱以熱慎不可寒格陽而治以寒外似順而中氣乃逆熱盛拒陰治寒以寒慎不可熱拒陰而治以熱外似順而中氣乃逆元和紀用經何西池曰有真反假反之分假反者如熱邪內陷陽氣不達於外故身冷肢厥戰栗惡寒以大承氣湯下之而愈不識者見其外證似寒用寒訝其相反識者謂其內證真熱用寒實為正治乃假反而非真反也真反者如風火暴盛痰涎上湧閉塞咽喉非辛熱之品不能開散不得已暫用星半烏附巴豆等熱藥是則真反也又有寒熱並用者因其人寒熱之邪夾雜於內不得不用寒熱夾雜之劑古人每多如此昧者訾為雜亂乃無識也然亦有純寒而於熱劑中少加寒品純熱而於寒劑中少加熱藥者此則名為反佐以純熱證雖宜用純寒然慮火因寒鬱則不得不於寒劑中少佐辛熱之品以行散之庶免凝閉郁遏之患寒藥熱服亦此意也純寒證雖宜用純熱然慮熱性上升不肯下降則不得不於熱劑中少佐沉寒之品以引熱藥下行如加膽汁童便入熱藥中引入肝腎之類又熱藥寒服亦此意也此反佐之義也知此諸病則上病取下如心火上炎由腎水下虛滋陰則火自降下病取上如小便不攝由肺氣虛者則益肺氣左病取右右病取左如左半身痰凝不遂由右半身火氣逼注使然則瀉右之火氣而左自寬欲升先降濁降而後清可得而升如水停氣不化津而渴用五苓去水升清則津生渴止是也欲降先升如小便不通用吐法欲行先止如氣虛散漫不能運行須先收斂其氣凝聚不散盛則自運所謂塞因塞用也欲止先行如食積瀉用承氣去積則已所謂通因通用也等法皆觸類貫通矣醫碥按至真要大論曰偶之不去則反佐以取之所謂寒熱溫涼反從其病也是反佐反治其目雖異其實一義故啓玄論寒與熱以寒溫並施論通與塞以通塞特用如西池所説稍不相協然亦足相發故附之又成聊攝注白通加豬膽湯曰此加人屎豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從可去格拒之寒也又生薑半夏湯小冷分服前注以熱因寒用釋之蓋反治之法實理之權而後世名流亦多施用如張子剛治妊婦下泄而喉閉用附子理中丸裹以紫雪尤其巧者也見張季明醫説引夷堅志又呂滄洲治內子王傷寒亦用此法並有治驗載在拙著傷寒廣要中茲不復贅又韓飛霞妻病上熱下冷證其弟急於溫藥內加清上之品水煎冷服而愈曰方書有之假對假真對真爾上乃假熱故以假冷藥從之下乃真冷故以真熱之藥反之斯上下和而病解矣事載在醫通中張呂二氏之術蓋此理也凡此之類皆當精思而意會焉又按張景嶽以假寒證用熱藥假熱證用寒藥謂為反治不知是假反而非真反矣喻西昌亦襲景嶽之謬江含徵醫津一筏云陰陽格拒藥用反佐謂之反治可也至於真寒而見假熱真熱而見假寒藥用反佐其實正治也豈是西池之所本乎又陶節庵傷寒六書曰反攻之法如寒病服寒藥而愈者此陽極變陰熱極反得水化也熱病服熱藥而愈者此陰極變陽寒極反得火化也亦與啓玄之旨相畔矣又按千金治凡所食不消方取其餘類燒作末酒服方寸匕便吐去宿食即瘥有食桃不消作病者以時無桃就樹間得稿桃燒服之登時吐病出甚良又醫説引瑣碎録載徽廟食冰太過遂苦脾疾楊吉老路進冰煎大理中丸曰欲已受病之源果一二服而愈此二法即同氣相感之理豈亦反治之類歟探試張景嶽曰探病之法不可不知如當局臨證或虛實有難明寒熱有難辨病在疑似之間補瀉之意未定者即當先用此法若疑其為虛意欲用補而未決則以輕淺消導之劑純用數味先以探之消而不投即知為真虛矣疑其為實意欲用攻而未決則以甘溫純補之劑輕用數味先以探之補而覺滯即知有實邪也假寒者略溫之必見躁煩假熱者略寒之必加嘔惡探得其情意自定矣經曰有者求之無者求之又曰假者反之此之謂也但用探之法極宜精簡不可雜亂精簡則真偽立辨雜亂則是非難憑此疑似中之活法必不得已而用之可也景嶽全書王三陽曰真陰證者不必用消息法真陽證者不必用消息法凡遇陰證似陽者先以冷水與之得水反劇者陰證也後以熱湯與之得湯少解次以薑湯與之勢又稍緩然後以理中四逆桂枝麻黃附子乾薑等投之何至有九竅流血之禍乎遇陽證似陰者先以熱湯與之得湯反躁者陽證也後以冷水與之得水少解次以芩連與之勢又稍緩然後以大黃芒硝承氣等投之何至有滑脫不禁之慘乎傷寒綱目按據盧紹庵一萬社草此説祖陶節庵然陶語今無考按王損庵傷寒準繩曰屠鵬四時治要云如仲景活人書下證俱備當行大承氣必先以小承氣試之合用大柴胡必先以小柴胡試之及陰證曉然合用四逆湯必先以理中湯真武湯之屬試之此皆大賢得重敵之要學者其可不審乎按湯劑丸散生靈之司命也死生壽夭傷寒之瞬息也豈可試為言哉蓋與其躁暴而多虞寧若重敵而無失雞峰張鋭者宋之神醫也療一傷寒診脈察色皆為熱極煮承氣湯欲飲復疑至於再三如有掣其肘者姑持藥以待病者忽發戰悸覆綿衾四五重始稍定有汗如洗明日脫然使其藥入口則人已斃矣由是觀之則屠氏之探試雖非仲景本旨得非粗工之龜鑑歟以上王説考仲景之用試啻陽明篇第三十一章成聊攝注云若不大便六七日恐有燥屎當以小承氣賾之一本作探之是已蓋疑似之際不得已而姑用之如專施此法則必後其時噬臍無及屠氏之論不宜拘也外患當以意治張子剛曰人之疾病無不自虛實冷熱而作各有形證可以對治其用藥不過補瀉寒溫而已然亦有不由虛實冷熱而致者或有諸蟲入耳喉中諸梗蠼螋溺人影而生瘡目中生眯之類皆非虛實冷熱之病法當以意治之如灌牛乳炙豬肉掩耳上以治諸蟲默念鸕鷀及戴魚網以治魚鯁以象牙末狐貍骨以治骨鯁地上畫蠼螋形取其腹中土以治溺影瘡以膽汁雞肝血及視水中豆以治目中眯之類竹䖻牙以治竹刺此皆以意治之法也雞峰普濟方按聖濟總録曰用藥之法有不取於氣味特以意為用者若魚網虎骨之治骨鯁是也然網能制魚乃魚之所畏虎能伏獸乃獸之所畏其所制伏既不同則用之亦異矣此説與張氏互相發蓋此等治法往往有神驗間或出於常理之外醫者不可忽也又按治病之法有正有權正與權者醫之要道也蓋前款所列諸説皆不外乎二者之理而二者之大義則皆備於前款諸説中讀者宜玩而知焉尤飼鶴傷寒論貫珠集分正治權變斡旋等法然斡旋亦權變中之一法已
