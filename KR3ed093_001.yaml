body:
  text: 卷一用藥勿偏執俞守約曰近時醫者偏執己見或好用熱藥或好用涼藥然素問有異法方宜論抑何嘗偏執耶古之良醫必量人之虛實察病之陰陽而後投以湯劑或補或瀉各隨其證若的是陽虛失血治以乾薑附子諸虛百損補以人參黃耆痰熱壅嗽清以芩連大便結熱利以消黃其法豈盡廢乎許叔微有云形有寒邪雖嬰孩亦可服金液藏有熱毒雖老羸亦可服大黃至哉通變之說也續醫說按許語未審出典張隱菴曰中者不偏庸者不易醫者以中庸之道存乎衷則虛者補實者瀉寒者溫熱者涼自有一定之至理若偏於溫補偏於涼瀉是非中非庸矣夫醫道上通天之四時六氣地之五方五行寒熱溫涼信手拈來急者急治緩者緩治若僅守平和之橘皮湯者又執中無權也溯觀古今多有偏心偏於溫補者惟用溫補偏於清涼者慣用清涼使病人之宜於溫補者遇溫補則生宜於涼瀉者遇清涼則愈是病者之僥倖以就醫非醫之因證以治病也豈可語於不偏不易之至道哉侶山堂類辨按天下之事莫不患偏而醫為甚焉蓋時有寒暑地有燥濕貴賤貧富虛實有別老壯婦兒強弱各異況人之素稟有陰陽之偏勝病之流布有今古之不均或一人之身而寒熱異位病之傳化又首末殊情疾證之所以萬變而不可窮極也是以藥之補瀉溫涼治之擒縱緩急倘舉一而廢百其貽害含靈不可勝道奈何古今醫家往往堅持一說膠柱不移宋人既有鬥火盤冰之誚而如劉張李朱四家齦齦然務立門戶最不能無偏故元儒許魯齋論梁寬甫病證書既辨其失曰近世論醫有主河間劉氏者有主易州張氏者張氏用藥依唯四時陰陽升降而增損之正內經四氣調神之義醫而不知此妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不停之義醫而不知此無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終莫敢投至失幾後時而不救者多矣主劉氏者或未悉劉氏之蘊則劫效目前陰損正氣遺禍於後日者多矣能用二家之長而無二家之弊則殆庶幾乎真達者之見後學之炯戒矣若繆仲淳李念莪諸人又謂後世元氣轉薄治當以補養為主出神農本草經疏醫宗必讀而其弊失之畏葸又此間有藉口古方者謂病皆有毒治當以攻伐為主而其弊失之疏暴故祖考藍溪府君嘗著平言一篇以糺駁之大旨謂素問之敘年壽與今時不異明是人之稟賦固無今古之差則不可言後世專宜補藥唐笠山吳醫匯講有管凝齋古今元氣不甚相遠說其意與粗考符軒岐之書間及調養仲景之方不乏救陽而病之屬虛者非填補不能愈則不可言治病專在攻伐可謂持正之言矣大抵醫者先入為主偶有屢次得效之藥則僻意傾倒濫用而不顧或張皇其說訛以傳世則自誤誤人其為害又豈可勝道哉學者深懲前轍潛研軒岐仲景之法旁及諸家之所長反覆尋討裒以為我用平心靜氣務消除門戶之見每對病者精加甄辨假令一時之權專主一格亦曉然洞悉於病之情機必歸之於至當庶幾措施無謬是謂之純醫矣如所謂僅守平和執中無權者亦猶偏心之徒也蓋醫家之弊莫甚於偏執故首表其害使學者有所省悟云用藥有四時之辨繆仲淳曰夫四時之氣行乎天地之間人處氣交之中亦必因之而感者其常也春氣生而升夏氣長而散長夏之氣化而軟秋氣收而斂冬氣藏而沉人身之氣自然流通是故生者順之長者敷之化者堅之收者肅之藏者固之此藥之順乎天者也春溫夏熱元氣外泄陰精不足藥宜養陰秋涼冬寒陽氣潛藏勿輕開通藥宜養陽此藥之因時制用補不足以和其氣者也然而一氣之中初中未異一日之內寒燠或殊假令大熱之候人多感暑忽發冰雹亦復感寒由先而感則為暑病由後而感則為寒病病暑者投以暑藥病寒者投以寒藥此藥之因時制宜以合乎權乃變中之常也此時令不齊之所宜審也假令陰虛之人雖當隆冬陰精虧竭水既不足不能制火則陽無所依外泄為熱或反汗出藥宜養陰地黃五味鱉甲枸杞之屬是已設從時令誤用辛溫勢必立斃假令陽虛之人雖當盛夏陽氣不足不能外衛其表表虛不任風寒灑淅戰慄思得熱食及御重裘是雖天令之熱亦不足以敵其真陽之虛病屬虛寒藥宜溫補參耆桂附之屬是已設從時令誤用苦寒亦必立斃此藥之舍時從證者也假令素病血虛之人不利苦寒恐其損胃傷血一旦中暑暴注霍亂須用黃連滑石以泄之本不利升須用葛根以散之此藥之舍證從時者也從違之際權其輕重耳至四時所傷因而致病則各從所由神農本草經疏按四時用藥諸說頗繁繆氏之論特得款要故余不具錄用藥有方土之宜孫真人曰凡用藥皆隨土地所宜江南嶺表其地暑濕熱肌膚薄脆腠理開疏用藥輕省關中河北土地崗𤍜其人皮膚堅硬腠理閉實用藥重複千金方俞守約曰昔聞老醫云治北方之疾宜以攻伐外邪為先治南方之疾宜以保養內氣為本蓋北方風氣渾厚稟賦雄壯兼之飲食倍常居室儉素殊少戕賊元氣之患一有疾病輒以苦寒疏利之其病如脫而快意通神矣若夫東南之人體質柔脆腠理不密而飲食色欲之過侈與西北之人迥異概以苦寒之劑攻之不幾於操刃而殺人乎余因其言而推廣之曰北人稟氣固厚安能人人皆實南人稟氣雖薄安能人人皆虛學者當以權變處治因其虛實而藥之斯無一偏之弊矣續醫說按此說古今醫統引丹溪當考徐洄溪曰人稟天地之氣以生故其氣體隨地不同西北之人氣深而厚凡受風寒難於透出宜用疏通重劑東南之人氣浮而薄凡遇風寒易於疏泄宜用疏通輕劑又西北氣寒當用溫熱之藥然或有邪縕於中而內反甚熱則用辛寒為宜東南地溫當用清涼之品然或有氣隨邪散則易於亡陽又當用辛溫為宜至交廣之地則汗出無度亡陽尤易附桂為常用之品若中州之卑濕山陝之高燥皆當隨地制宜故入其境必問水土風俗而細調之不但各府各別即一縣之中風氣亦有迥殊者並有所產之物所出之泉皆能致病土人皆有極效之方皆宜詳審旁察若恃己之能執己之見治竟無功反為土人所笑矣醫學源流論按岐伯有異法方宜論而五常政大論辨高下溫涼之異自來諸家所說其意大約相同仍不繁引夫皇國六千餘里之幅員西海北陸其藥猶不無斟量而今之醫有篤信邈焉絕域之術以欲療此地之人者惑矣哉往年琉球信使來朝時方寒凍從者頻病彼醫守其國套法專施辛溫斃者甚多然則人入他鄉必為風土所移亦不可不知也用藥有貴賤之別寇宗奭曰貴豪之家所養既與貧下異憂樂思慮不同當各遂其人而治之後世醫者直委此節閉不行所失甚矣嘗有一醫官暑月與貴人飲貴人曰我昨日飲食所傷今日食減醫曰可餌消化藥佗人當服十丸公當減其半下咽未久疏逐不已幾致斃以此較之虛實相遼不可不察本草衍義李念莪曰大抵富貴之人多勞心貧賤之人多勞力富貴者膏粱自奉貧賤者藜藿苟充富貴者曲房廣廈貧賤者陋巷茅茨勞心則中虛而筋柔骨脆勞力則中實而骨勁筋強膏粱自奉者藏府恆嬌藜藿苟充者藏府恆固曲房廣廈者玄府疏而六淫易客茅茨陋巷者腠理密而外邪難乾故富貴之疾宜於補正貧賤之疾利於攻邪易而為治比之操刃雖然貧賤之家亦有宜補但攻多而補少富貴之家亦有宜攻但攻少而補多是又當以方宜為辨稟受為別老壯為衡虛實為度不得膠於居養一途而概為施治也醫宗必讀馮楚瞻曰富貴者縱情極欲慮遠思多銷鑠無非心腎之脂膏貧賤者少怒寡欲願淺易足所傷無非日生之氣血故富貴之病多從本貧賤之病每從標實有異耳錦囊秘錄張石頑曰膏粱之治多難愈以其豢養柔脆痰涎膠固乎上精神凋喪乎下即有客邪非參無以助諸藥之力黎霍之患都易除以其具體堅韌表邪可以恣發里邪可以峻攻縱有勞傷一術足以資百補之功醫通按後漢書郭玉對和帝論療貴者有四難其一為骨節不強不能使藥諸家所論皆此意也又陳藏器本草拾遺曰眾味則貴要單行乃貧下證類本草序例引葉石林避暑錄話曰古方施之富貴人多驗貧下人多不驗俗方施之貧下人多驗富貴人多不驗吾始疑之乃卒然而悟曰富貴人平日自護持甚謹其疾致之必有漸發於中而見於外非以古方術求之不能盡得貧下人驟得於寒暑燥濕飢飽勞逸之間者未必皆真疾不待深求其故苟一物相對皆可為也而古方節度或與之不契云云二家之言或有其理仍錄備考又按人之稟賦強弱固有不拘貴賤貧富者更有上下之虛實不同者與中外之寒熱不侔者及宿疾有無皆施治之際所宜加意也且強人陽勝弱人陰勝此自然之勢不街辨而知也然又有體氣雖弱陽氣素亢者有體氣雖強陰寒內伏者古人所謂陽臟人陰臟人者即此謂也蘇老泉幾策審勢曰譬之一人之身將欲飲藥餌石以養其生必先審觀其性之為陰其性之為陽而投之以藥石藥石之陽而投之以陰藥石之陰而投之以陽故陰不至於涸而陽不至於亢苟不能先審觀已之為陰與己之為陽而以陰攻陰以陽攻陽則陰者固死於陰而陽者固死於陽不可救也此言本出譬喻而真理到之言矣又前輩有謂治平擾攘用藥有分者然從未見精論仍不登載老人用藥法陳令尹曰常見世人治高年之人疾患將同年小亂投湯藥妄行針灸以攻其疾務欲速愈殊不知上壽之人血氣已衰精神減耗危若風燭百疾易攻至於視聽不至聰明手足舉動不隨其志身體勞倦頭目昏眩風氣不順宿疾時發或秘或泄或冷或熱此皆老人之常態也不順治之緊用湯藥按醫說引作不須緊用湯藥務求痊瘥往往因此別緻危殆且攻病之藥或汗或吐或解或利緣衰老之人不同年少真氣壯盛雖汗吐轉利未至危困其老弱之人若汗之則陽氣泄吐之則胃氣逆下之則元氣脫立致不虞此養老之大忌也大體老人藥餌止是扶持之法只可溫平順氣進食補虛中和之劑治之不可用市肆贖賣他人惠送不知方味及狼虎之藥與之服餌切須審詳若身有宿疾或時發動則隨其疾狀用中和湯藥調順三朝五日自然無事然後惟是調停飲食依食醫之法隨食性變饌治之此最為良也奉親養老書吳又可曰三春旱草得雨滋榮殘臘枯枝雖灌弗澤凡年高之人最忌剝削設投承氣以一當十設用參朮十不抵一蓋老年營衛枯澀幾微之元氣易耗而難復也不比少年氣血生機甚捷其勢浡然但得邪氣一除正氣隨復所以老年慎瀉少年慎補何況誤用耶萬有年高稟厚年少賦薄者又當從權勿以常論溫疫論按朱丹溪格致餘論論老人血少不宜烏附燥藥又按寇宗奭本草衍義曰凡人少長老其氣血有盛壯衰三等故治法亦當分三等其少日服餌之藥於壯老之時皆須別處之決不可忽也世有不留心於此者往往不信遂致困危哀哉斯說為當而劉河間保命集載珞琭子說辨人之幼壯老有四等其治各不同文繁不錄也小兒用藥法曾省翁曰凡療小兒非以一體之謂不可同常之見所言投藥者或用投之於簡徑也投之於端的也投之久練純熟也投之窮研精研也投之益後投之勝前良工用心之至是謂投藥之專若以重劑投於雛乳小也或以峻藥投於貴峻謂嚴緊藥也直不可混淆而設造次而施合以通利者審問扶而下之當用益補者察詳按而調之孰謂恣妄之有耶所謂不可攻擊者曰虛曰幼曰嬌曰重不宜冒致者曰久曰閉不言所受曰冗用藥眾多曰競爭與攻擊復加以母之情僻執滯也父之性急愚憨也子之意頑不服藥也病之候難傳過壞證母之殢神父之執祟如此人事曷可勉強而與勞心枉究哉活幼口議劉通真曰經言六歲已下為小兒然小兒與大人異療者以有撮口急慢驚忤疳癇等候當須別為方論余病與大人不殊如吐瀉傷風傷寒之類受病一同大人兼聚同用之然小兒純陽病則熱多冷少其藥宜少冷於大人為得其有用溫藥處當以意減損之如水瀉白痢胃冷之類亦用溫藥也若丸散用之亦在醫者裁酌劉方明幼幼新書引萬全方張戴人曰夫乳者血從金化而大寒小兒食之肌肉充實然其體為水故傷乳過多反從濕化濕熱相兼吐痢之病作矣醫者不明其本輒以紫霜進食此金白餅之屬其中皆巴豆杏仁其巴豆大熱有大毒杏仁小熱有小毒小兒陽熱復以熱毒之藥留毒在內久必變生故劉河間先生以通聖涼膈神芎益元治之皆無毒之藥或曰此大人所服之藥非小兒所宜也余聞笑曰大人小兒雖年狀不同其五藏六府豈復殊耶大人服多小兒服少其實一也儒門事親梁逢堯曰調治小兒之法當須慎護腎胃氣也緣小兒未有天癸之旺而常依四時胃氣為本故不病之治不可容易損其胃氣也胃氣一虛病皆滋長輕者至重重者必死此決然之理也觀今醫者不深念慮而云小兒純陽之氣凡有疾病須當疏下是以世之為醫者執此而妄恣疏泄因此而死斃者不可勝紀良可嘆也雖然疏下在乎審諦而不可過調理小兒之要也幼幼新書引惠眼觀證張景岳曰有謂小兒為純陽之體故多宜清涼之治者此說尤為誤人按上古天真論曰女子二七男子二八而後天癸至夫天癸者陰氣也小兒之陰氣未至故曰純陽原非陽氣有餘之謂特稚陽耳稚陽之陽其陽幾何使陽本非實而誤認為火則必用寒涼妄攻其熱陰既不足又伐其陽多致陰陽俱敗脾腎俱傷又將何所藉賴而望其生乎又王節齋曰小兒無補腎法謂男至十六而腎始充滿既滿之後妄用虧損則可用藥補之若受胎之時稟之不足則無可補稟之原足又何待於補也嗚呼此何說耶夫小兒之陰氣未成即腎虛也或父母多欲而所稟水虧亦腎虛也陰既不足而不知補之陰絕則孤陽亦減矣何謂無可補耶此義惟薛立齋獨得之類經按錢仲陽既有地黃丸方薛氏實祖其意非獨得之也馮楚瞻曰治小兒疾病較之男子婦人其難尤甚但小兒易怒傷肝恣食傷脾大人窮欲傷腎多思傷心郁思傷脾惱怒傷肝悲哀傷肺故書治小兒之法猶浣衣之去垢者居多以其所犯多屬標證也治大人之法猶植樹之培根者居多以其所犯多屬本證也然小兒亦有因先天怯弱致疾大人亦有因倍食傷胃抱疴小兒而犯不足大人而犯有餘於此並可互參況氣血有偏而成病病則怪變百端大人而犯小兒之病小兒而犯大人之病病既雷同治何可執錦囊秘錄徐洄溪曰小兒之與成人即病相同者治亦迥異如傷食之證反有用巴豆硃砂其餘諸證多用金石峻厲之藥特分兩極少耳此古人真傳也後世不敢用而以草木和平之藥治之往往遷延而死此醫者失傳之故醫學源流論按千金小兒門云治其時行節度故如大人法但用藥分劑少異藥小冷耳此通真所本也蓋嬌嫩之體腸胃綿脆虛實寒熱皆易更變古人所論當矣惟稟厚壯實其病屬熱者苦寒克伐固所不妨稟薄羸弱其病屬寒者辛溫補益是其主對金石之藥亦或有可施但云之多用則謬矣要之諸家之見俱不能無失今駢舉之以備學者酌中焉又聖惠方診豆瘡論曰凡食乳嬰孩湯藥不可與童兒同療則藥過劑必有損也又曰若用湯藥宜療於乳母也二說俱是如服藥多少其說載第十二卷中宜並參婦人用藥法孫真人曰夫婦人之別有方者以其胎妊生產崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者眾陰所集常與濕居十四以上陰氣浮溢百想經心內傷二藏按玉函經作五藏外損姿顏月水去留前後交互瘀血停凝中道斷絕其中傷墮不可具論生熟按生熟外臺秘要引作矣然五藏虛實交錯惡血內漏氣脈損竭或飲食無度損傷非一或瘡痍按玉函作胎瘡未愈強合陰陽或便利於懸廁之上風從下入便成十二痼疾所以婦人別立方也若是四時節氣為病虛實冷熱為患者故與丈夫同也惟懷胎妊而挾病者避其毒藥耳其雜病與丈夫同則散在諸卷中可得而知也然而女人嗜欲多於丈夫感病倍於男子加以慈戀愛憎嫉姤憂恚染著堅牢情不自抑所以為病根深療之難瘥千金方按婦人之病至成十二痼疾本出玉函經玉函又曰男子病者眾陽所歸常居於燥陽氣遊動強力施泄便成勞損葛仙翁曰凡婦人諸病兼治憂恚令寬其思慮則病無不愈張季明醫說引按陶隱居本草序例曰褚澄療寡婦尼僧異乎妻妾此是達其性懷之所致也即與上說同趣矣嚴子禮濟生方云治療之法女子當養血抑氣以減喜怒釋澹寮集驗方云治婦人之疾當先為抑陽助陰兼理七情使無鬱抑之懷當自安養也按許學士本事方云大率婦人妊娠唯在抑陽助陰孫允賢醫方集成云婦人宜耗其氣以調其經男子息養其氣以全其神蓋皆本於真人也又按陳良甫婦人良方引產寶方序論曰大率治病先論其所主男子調其氣女子調其血氣血人之神也不可不謹調護活人書亦舉此語以謂此大略之詞婦人傷寒皆可於男子藥中選用豈必調血而後行湯耶王海藏醫壘元戎更有詳辨當閱或者以妊娠母治有傷胎破血之論夫豈知邪氣暴戾正氣衰微苟執方無權縱而勿藥則母將羸弱子安能保上古聖人謂重身毒之有故無殞衰其大半而止蓋藥之性味本以療疾誠能處以中庸與疾適當且知半而止之亦何疑於攻治哉又況胞胎所繫本於生氣之原而食飲與藥入於口而聚於胃胃分氣味散於五藏苟非大毒駃劑豈能遽達於胞胎耶所謂母治則過矣聖濟經王海藏曰安胎之法有二如母病以致動胎者但療母則胎自安或胎氣不固或有觸動以致母病者宜安胎則母自愈蕭慎齋女科經綸引按聖濟經本於六元正紀大論極為切實考本草序例舉墮胎藥數十種孫真人亦有避毒藥之語然仲景有桂枝茯苓丸附子湯等方今遇母有病則不問何藥對證施用無有半產及動胎之憂特腦麝之類香竄利竅實在所畏己張茂之究原方云僕屢醫妊婦患傷寒結胸並雜病所合用藥皆尋常孕婦之所忌者投之病痊至產初無所犯梶原性全萬安方引吳又可溫疫論論妊娠時疫用三承氣有曰若腹痛如錐腰痛如折此時未墮欲墮之侯服藥亦無及矣雖投承氣但可愈疾而全母又曰結糞瘀穢腸胃間事也胎附於脊腸胃之外子宮內事也藥先到胃瘀熱才通胎氣便得舒養是以興利除害於頃刻之間何慮之有皆篤論也如安胎之藥則當察其人素稟與宿疾而溫涼適宜仲景有當歸散白朮散二方其意可見也諸家所說蕭慎齋經綸一書纖悉具載茲不繁錄葉以潛曰良方云產後以去敗血為先血滯不快乃成諸病夫產後元既虧運行失度不免瘀血停留治者必先逐瘀瘀消然後方可行補此第一義也今人一見產後有內虛證遽用參耆甘溫之劑以致瘀血攻心而死慎之士林餘業醫學全書徐洄溪曰至如世俗相傳之邪說如胎前宜涼產後宜溫等論夫胎前宜涼理或有之若產後宜溫則脫血之後陰氣大傷孤陽獨熾又瘀血未淨結為蘊熱乃反用薑桂等藥我見時醫以此殺人無數或云產後瘀血得寒則凝得熱則行此大謬也凡瘀血凝結因熱而凝者得寒降而解因寒而凝者得熱降而解如桃仁承氣湯非寒散而何未聞此湯能凝血也蓋產後瘀血熱結為多熱瘀成塊更益以熱則煉成乾血永無解散之日其重者陰涸而即死輕者成堅痞褥勞等疾惟實見其真屬寒氣所結之瘀則宜用溫散故凡治病之法不本於古聖而反宗後人之邪說皆足以害人諸科皆然不獨婦科也醫學源流論按產後禁溫藥張戴人儒門事親既有其說前哲或曰產後大補氣血為主或曰地黃性滯白芍酸寒伐生氣俱非產後所宜其他諸說不一亦載在蕭氏書中要之惡露未盡卻忌戀泥之品而壞瘀行滯實為其主如脫血過多陽氣虛乏則大劑參附始可挽回學者宜審諦虛實勿拘一格焉傷寒雜病治法之異尤飼鶴曰治外感必知邪氣之變態治內傷必知藏府之情性治六淫之病如逐外寇攻其客毋傷及其主主弱則客不退矣治七情之病如撫亂民暴其罪必兼矜其情情失則亂不正矣醫學讀書記劉松峰曰雜病用藥品過多或無太害即如健脾者多用白朮固也再加山藥可也再加扁豆亦可也再加蓮肉棗肉亦無不可也再如補腎者多用熟地固已再加枸杞可也再加菟絲亦可也再加蓯蓉首烏芡實杜仲亦無不可也補藥固不厭多即雜證藥品過繁亦為害尚淺覺其不善速為減去或可挽回而瘟疫不能也即如葛根治瘟疫藥中至和平之品若邪在太陽加之太早反足以引邪入陽明矣又如葛根與白芷均屬陽明散劑而白芷溫散葛根涼散白芷散陽明風寒之邪葛根散陽明溫熱之邪若溫邪之在陽明用葛根而再加白芷必然掣肘恐不似他證用藥繁多之帖然無事矣所以瘟疫用藥按其脈證真知其邪在某經或表或里並病合病單刀直入批隙導款多不過五六味而止至於分兩之重輕則在臨時看其人之老少虛實病之淺深進退而酌用之說疫按松峰論葛根白芷誤據張潔古引經之說甚失古本草之旨然至雜病傷寒用藥之異則其理固不可易矣又王三陽傷寒綱目曰治傷寒如對勁敵治雜病如理亂絲此言亦是然傷寒有證候稀壞藥難徑行者雜病有卒爾危劇治宜放膽者三陽之言互意而看亦可也張隱菴侶山堂類辨亦有雜證論附藏於次卷治有不可正行條隱菴以雜病為見證龐雜之謂非是蓋雜病本對傷寒而言詳義見於拙著察病通義中又按張蕆活人書序曰古人治傷寒有法治雜病有方朱奉議於其第五卷中曰古人治傷寒有法非雜病之比陳鶴溪三因方舉此語曰方即義方法即法令外病用法令猶奸邪外擾非刑不除內病用義方猶父兄子弟不足以禮格之而已王海藏醫壘元戎駁之曰吾謂治雜病亦有法療傷寒亦有方方即法也法即方也豈有異乎要當全識部分經絡表裡藏府豈有二哉先兄紹翁亦有其辨甚為明切曰夫不易謂之方矣可准謂之法矣仲景著傷寒論設一百一十三方命之曰方者蓋有此方而治此病有此病而主此方使後人知不可易以佗劑也其評辨脈理題之曰法者使後人亦於診按之際可准其言以裁決也是不啻治傷寒一證其治雜病亦然故治傷寒之方無不可以治雜病而治雜病之法亦可以准治傷寒豈得謂彼特有方而此反無之此獨有法而彼反無之耶
