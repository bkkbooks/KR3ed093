body:
  text: 卷八清法程普明曰傷寒在表者可汗在裡者可下其在半表半裡者惟有和之一法焉仲景用小柴胡湯加減是已然有當和不和誤人者有不當和而和以誤人者有當和而和而不知寒熱之多寡稟賦之虛實藏府之燥濕邪氣之兼併以誤人者是不可不辨也夫病當耳聾脅痛寒熱往來之際應用柴胡湯和解之而或以麻黃桂枝發表誤矣或以大黃芒硝攻裡則尤誤矣又或因其胸滿脅痛而吐之則亦誤矣蓋病在少陽有三禁焉汗吐下是也且非惟汗吐下有所當禁即舍此三法而妄用他藥均無益而反有害古人有言少陽膽為清淨之府無出入之路只有和解一法柴胡一方最為切當何其所見明確而立法精微亦至此乎此所謂當和而和者也然亦有不當和而和者如病邪在表未入少陽誤用柴胡謂之引賊入門輕則為瘧重則傳入心胞漸變神昏不語之候按此不必然亦有邪已入里燥渴讝語諸證叢集而醫有僅以柴胡湯治之則病不解至於內傷勞倦內傷飲食氣虛血虛癰腫瘀血諸證皆令寒熱往來似瘧非瘧均非柴胡湯所能去者若不辨明證候切實用藥而藉此平穩之法巧為藏拙誤人非淺所謂不當和而和者此也然亦有當和而和而不知寒熱之多寡者何也夫傷寒之邪在表為寒在裡為熱在半表半裡則為寒熱交界之所然有偏於表者則寒多偏於里者則熱多而用藥須與之相稱庶陰陽和平而邪氣頓解否則寒多而益其寒熱多而助其熱藥既不平病益增劇此非不和也和之而不得寒熱多寡之宜者也然又有當和而和而不知稟質之虛實者何也夫客邪在表譬如賊甫入門豈敢遽登吾堂而入吾室必窺其堂奧空虛乃乘隙而進是以小柴胡用人參者所以補正氣使正氣旺則邪氣所容自然得汗而解蓋由是門入復由是門出也亦有表邪失汗腠理致密賊無出路由此而傳入少陽熱氣漸盛此不關本氣之虛故有不用人參而和解自愈者是知病有虛實法有變通不可誤也然又有當和而和而不知藏府之燥濕者何也如病在少陽而口不渴大便如常是津液未傷清潤之藥不宜太過而半夏生薑皆可用也若口大渴大便漸結是邪氣將入於陰律液漸少則辛燥之藥可除而花粉瓜蔞有必用矣按此係柴胡白虎合方所宜非花粉瓜蔞輕淡之品所能治也所謂藏府有燥濕之不同者此也然又有當和而和而不知邪之兼併者何也假如邪在少陽而太陽陽明證未罷按此用熱論之義是少陽兼表邪也小柴胡中須加表藥仲景有柴胡加桂枝之例矣又如邪在少陽而兼裡熱則使閉讝語燥渴之證生小柴胡中須兼里藥仲景有柴胡加芒硝之例矣按此遺大柴胡者何又三陽合病合目則汗面垢讝語遺尿者用白虎湯和解之蓋三陽合病必連胃府故以辛涼之藥內清本府外徹肌膚令三經之邪一同解散是又專以清劑為和矣所謂邪有兼併者此也由是推之有清而和者有溫而和者有消而和者有補而和者有燥而和者有潤而和者有兼表而和者有兼攻而和者和之義則一而和之法變化無窮焉知斯意者則溫熱之治瘟疫之方時行痎瘧皆從此推廣之不難應手而愈矣世人漫曰和解而不能盡其和之法將有增氣助邪而益其爭堅其病者和云乎哉醫學心悟按成聊攝以小柴胡目為和解稍失仲景之旨而後世沿襲不知其非然如普明論其大旨固無所妨也詳和解二字見桂枝湯條而小承氣調胃承氣條並有和字然則諸劑中皆有和不可專屬柴胡但柴胡較之三法則和緩故聊攝遂為其說乎本草經曰柴胡味苦乎名醫曰微寒無毒知是清涼中之和者其性啓達郁陽能清不表不里之熱故又能涼血熱楊仁齊活人總括論柴胡治血熱既録在傷寒廣要又能和肝氣又配之補藥能治虛熱其用甚博不可枚舉然錢天來傷寒溯源集曰雖後人之補中益氣湯及逍遙散之類其升發清陽開解鬱結之義亦皆不離小柴胡之旨也此言確矣但世或有安其平穩濫用誤人者亦是仁齊所論而程郊倩傷寒後條辨及醫宗金鑑並有其戒不可不審也仁齊說亦録廣要中程氏金鑑載在傷寒論輯義仍不贅又按吳又可以為溫疫邪初犯募原宜用達原飲方中檳榔厚朴草果三味協力直達其巢穴使邪氣潰敗速離募原云云考又可本從瘧論立見而此方亦胚胎於療瘧清脾諸湯今質之視聽在京師則盛稱其有驗如東都則用之少效蓋地氣之使然也然募原即半表半裡之位而其得病實為少陽乃是柴胡所主豈須他求乎如三消飲證亦系大柴胡所宜而其方泛雜尤覺無謂矣又可務急立言故制此諸方而以柴胡僅為餘熱之治庶幾學者勿拘執焉又曰清者清其熱也藏府有熱則清之經云熱者寒之是已然有當清不清誤人者有不當清而清誤人者有當清而清之不分內傷外感以誤人者有當清而清之不量其人不量其證以誤人者是不可不察也夫六淫之邪除中寒寒濕外皆不免於病熱熱氣熏蒸或見於口舌唇齒之間或見於口渴便溺之際灼知其熱而不清則斑黃狂亂厥逆吐衄諸證叢生不一而足此當清不清之誤也然又有不當清而清者何也有加努力辛苦之人中氣大虛發熱倦怠心煩溺赤名曰虛火蓋春生之令不行無陽以護其營衛與外感熱證相隔霄壤又有陰虛勞瘵之證日晡潮熱與夫産後血虛發熱煩躁證象白虎誤服白虎者難救更有命門火衰浮陽上泛有似於火者又有陰盛隔陽假熱之證其人面赤狂燥欲坐臥泥水中或數日不大便或舌黑而潤或脈反洪大崢崢然鼓擊於指下按之豁然而空者或口渴欲得冷飲而不能下或曰下元虛冷頻飲熱湯以自救世俗不識誤投涼藥下咽即危矣此不當清而清之誤也然又有清之而不分內傷外感者何也蓋風寒閉火則散而清之經云火鬱發之是也暑熱傷氣則補而清之東垣清暑益氣湯是也濕熱之火則或散或滲或下而清之開鬼門清淨府除陳莝是也燥熱之火則潤而清之通大便也傷食積熱則消而清之食去火自平也惟夫傷寒傳入胃府熱勢如蒸自汗口渴飲冷而能消水者藉非白虎湯之類鮮克有濟也更有陽盛拒陰之證清藥不入到口隨吐則以薑汁些少為引或薑製黃連反佐以取之所謂寒因熱用是也此外感實火之清法也若夫七情氣結喜怒憂思悲恐驚互相感觸火從內發丹溪治以越鞠丸開六郁也立齊主以逍遙散調肝氣也意以一方治木鬱而諸郁皆解也然經云怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結逍遙一方以之治氣上氣結者固為相宜而於氣緩氣消氣亂氣下之證恐猶未合蓋氣虛者必補其氣血虛者必滋其血氣旺血充而七情之火攸焉以平至若真陰不足而火上炎者壯水之主以鎮陽光真陽不足而火上炎者引火歸原以導龍入海此內傷虛火之治法也或者曰病因於火而以熱藥治之何也不知外感之火邪火也人火也有形之火後天之火也得水則滅故可以水折內傷之火虛火也龍雷之火也無形之火先天之火也得水則炎故不可以水折譬如龍得水而愈奮飛雷因雨而益震動陰蒙沉晦之氣光焰燭天必俟云收日出而龍雷各歸其宅耳是以虛火可補而不可瀉也其有專用參耆而不用八味者因其穴宅無寒也其有專用六味而不用桂附者因其穴宅無水也補則同而引之者稍不同耳蓋外感之火以涼為清內傷之火以補為清也然又有清之而不量其人者何也夫以壯實之人而患實熱之證清之稍重尚為無礙若本體素虛藏府本寒飲食素少腸胃虛滑或産後病後房室之後即有熱證亦宜少少用之寧可不足不使有餘或餘熱未清即以輕藥代之庶幾病去人安倘清劑過多則療熱未已而寒生焉此清之貴量其人也然又有清之不量其證者何也夫以大熱之證而清劑太微則病不除微熱之證而清劑太過則寒證即至但不及猶可再清太過則將醫藥矣且凡病清之而不去者猶有法焉壯水是也王太僕云大熱而甚寒之不寒是無水也當滋其腎腎水者天真之水也取我天真之水以制外邪何邪不服何熱不除而又何必沾沾於寒涼以滋罪戾乎由是觀之外感之火尚當滋水以制之而內傷者更可知矣大抵清火之藥不可久恃必歸本於滋陰滋陰之法又不能開胃扶脾以恢復元氣則參苓耆術亦當酌量而用非曰清後必補但元氣無虧者可以不補元氣有虧必須補之俟其飲食漸進精神爽慧然後止藥可也此清之貴量其證也總而言之有外感之火有內傷之火外感為實內傷為虛來路不同治法迥別寧曰熱者寒之遂足以畢醫家之能事也乎同上按清涼之治為熱氣散漫非汗下所對者而設外臺祕要引崔氏曰若祕而錯語者宜服承氣湯通利而錯語者宜服四味黃連除熱湯按即黃連解毒湯危達齊得效方曰至於諸熱為治有泛熱有實熱泛熱者荊芥薄荷梔子黃芩等投之正其所宜實熱者非大黃芒硝則不能效二家之說其義可見矣又羅謙甫衛生寶鑑瀉熱門分為六類曰上焦熱涼膈散龍腦雞蘇丸洗心散中焦熱調胃承氣湯瀉脾散貫衆散下焦熱大承氣湯三才封髓丹滋腎丸氣分熱柴胡飲子白虎湯血分熱桃仁承氣湯清涼四順飲子通治三焦甚熱之氣三黃丸黃連解毒湯此未為至當矣今審考之傷寒清法大端有三曰柴胡曰白虎曰梔豉是也柴胡清少陽之熱既論於前白虎清陽明之熱中無燥屎者梔豉清上焦之熱而黃連解毒湯為其變方在今則彼為便蓋白虎治熱邪陷胃焦灼津液者解毒治熱鬱心膈或爍筋髓者二方所主其位不同苟錯用之必令熱氣纏綿不解如柴胡與解毒則其證情機殆無大異矣大抵白虎證舌燥至裂反無胎渴欲冷水脈洪滑大汗出解毒證舌燥黑胎不渴脈弦數汗不出或上部僅出雜病清法其等不一丹砂牛黃之清心梔子龍膽之清肝桑白地骨之清肺生苄犀角之於血熱鱉甲胡連之於骨熱菊花薄荷之於上熱茵陳之於發黃香薷之於中暑之類皆各有相適須熟察而精處焉又按外臺祕要崔氏引阮河南曰療天行凡除熱解毒無過苦酸之物故多用苦參青葙艾按千金此有梔子葶藶苦酒烏梅之屬此其要也夫熱盛非苦酸之物則不能愈熱在身中既不時治治之又不用苦酢之藥如救火不以水必不可得脫免也千金翼方曰嘗見太醫療傷寒惟大青知母等諸冷物極與仲景本意相反湯藥雖行百無一效此二說相反均有所偏矣又楊仁齊直指方積熱論曰凡熱皆出於心熱甚則能傷血熱出於心洗心散所不可闕熱能傷血四順清涼飲又不可無程若水醫彀彀之曰退熱之法全在清心必用麥門冬燈草白朮茯苓蓋心者一身之主宰而萬事之本根萬令從心心不清則妄動而熱不退然熱甚能傷血血滯則氣鬱而熱愈不退退熱之法所以又在調血法用川芎當歸若夫陽浮於外則當斂而降之法用參苓白朮散薑棗煎服仁齊又曰退熱用涼藥不可十分盡或餘熱些少未去不足關心自然無事否則熱去則寒起古人戒之一方多用川芎茯苓甘草少用白朮粗末水煎病後和胃收斂浮陽屢試得效二家之言亦非通論姑録備考又按十劑中有濕劑李瀕湖本草綱目改作潤劑曰風熱燥甚則血液枯涸而為燥病上燥則渴下燥則結筋燥則強皮燥則揭肉燥則裂骨燥則枯肺燥則痿腎燥則消凡麻仁阿膠膏潤之屬皆潤劑也養血則當歸地黃之屬生津則麥門冬栝樓根之屬益精則蓯蓉枸杞之屬蓋病屬燥者原其源委非虛則熱前人或論秋燥證拙著察病通義辨之故潤劑亦不過於補清二法中錯綜為劑故今不別揭溫法程普明曰溫者溫其中也藏受寒侵必須溫劑經云寒者熱之是已然有當溫不溫誤人者即有不當溫而溫以誤人者有當溫而溫之不得其法以誤人者有當溫而溫之不量其人不量其證與其時以誤人者是不可不審也天地殺厲之氣莫甚於傷寒其自表而入者初時即行溫散則病自除若不自表入而直中陰經者名曰中寒按直中陰證即表寒此言殊不了其證惡寒厥冷口鼻氣冷或冷汗自出嘔吐瀉利或腹中急痛厥逆無脈下利清穀種種寒證並見法當溫之又或寒濕侵淫四肢拘急發為痛痹亦宜溫散此當溫而溫者也然又有不當溫而溫者何也如傷寒熱邪傳裡口燥咽乾便閉讝語以及斑黃狂亂衄吐便血諸證其不可溫固無論矣若乃病熱已深厥逆漸進舌則乾枯反不知渴又或挾熱下利神昏氣弱或脈來澀滯反不應指色似煙燻形如槁木近之無聲望之似脫甚至血液衰耗筋脈拘攣但唇口齒舌乾燥而不可解者此為真熱假寒之候世俗未明亢害承製之理誤投熱劑下咽即敗矣更有鬱熱內蓄身反惡寒濕熱脹滿皮膚反冷中暑煩心脈虛自汗燥氣焚金痿軟無力者皆不可溫又有陰虛脈細數陽乘陰而吐血者亦不可溫溫之則為逆候此所謂不當溫而溫者也然又有當溫而溫之不得其法者何也假如冬令傷寒則溫而散之冬令傷風則溫而解之寒痰壅閉則溫而開之冷食所傷則溫而散之至若中寒暴痛大便反鞕溫藥不止者則以熱劑下之時當暑月而納涼飲冷暴受寒侵者亦當溫之體虛挾寒者溫而補之寒客中焦理中湯溫之寒客下焦四逆湯溫之按以四逆為下焦治非是又有陰盛格陽於外溫藥不效者則以白通湯加人尿豬膽汁反佐以取之經云熱因寒用是已按此非反治輯義有辨復有真虛挾寒命門火衰者必須補其真陽太僕有言大寒而盛熱之不熱是無火也當補其心此心字指命門而言仙經所謂七節之旁中有小心是也按心字指命門失太僕之意又仙經當改作內經書曰益心之陽寒亦通行滋腎之陰熱之猶可是也然而醫家有溫熱之溫有溫存之溫參耆歸術和平之性溫存之溫也春日煦煦是也附子薑桂辛辣之性溫熱之溫也夏日烈烈是也和煦之日人人可近燥烈之日非積雪凝寒開冰解凍不可近也更有表裡皆寒之證始用溫藥裡寒頓除表邪未散復傳經絡以致始為寒中而其後轉變為熱中者容或有之藉非斟酌時宜對證投劑是先以溫藥救之者繼以溫藥賊之矣亦有三陰直中初無表邪按直中陰證必初有表邪而溫劑太過遂令寒退熱生初終異轍是不可以不謹所謂溫之貴得其法者此也然又有溫之不量其人者何也夫以氣虛無火之人陽氣素微一旦客寒乘之則溫劑宜重且多服亦可無傷若其人平素火旺不喜辛溫或曾有陰虛失血之證不能用溫者即中新寒溫藥不宜太過病退則止不必盡劑斯為克當其人矣若論其證寒之重者微熱不除寒之輕者過熱則亢且溫之與補有相兼者有不必相兼者虛而且寒則兼用之若寒而不虛即專以溫藥主之丹溪云客寒暴痛兼有積寒者可用桂附不可遽用人參蓋溫即是補豫遵其法先用薑桂溫之審其果虛然後以參朮輔之是以屢用屢驗無有差忒此溫之貴量其證也若論其時盛夏之月溫劑宜輕時值隆冬溫劑宜重然亦有時當盛暑而得虛寒極重之證曾用參附煎膏而治愈者此舍時從證法也譬如霜降以後禁用白虎然亦有陽明證蒸熱自汗讝語煩燥口渴飲冷者雖當雨雪飄搖之際亦曾用白虎治之而痊安但不宜太過耳此溫之貴量其時而清劑可類推已邇時醫者群尚溫補痛戒寒涼且曰陽為君子陰為小人又曰陽明君子苟有過人必知之誠以知之而即為補救猶可言也不思藥以療病及轉而療藥則病必增劇而成危險之候又況桂枝下咽陽盛則殆承氣入胃陰盛以敗安危之機禍如反掌每多救援弗及之處仁者鑑此顧不痛歟願吾醫者精思審處晰理不差於毫釐用藥悉歸於中正俾偏陰偏陽之藥無往不底於中和斯為善治噫可不勉哉醫學心悟張景嶽曰凡用熱之法如乾薑能溫中亦能散表嘔惡無汗者宜之肉桂能行血善達四肢血滯多痛者宜之吳茱萸善暖下焦按此句不穩腹痛泄瀉者極妙肉豆蔻可溫脾腎飧泄滑利者最奇胡椒溫胃和中其類近於蓽茇丁香止嘔利氣其暖過於豆仁補骨脂性降而善閉古能納氣定喘止帶濁泄瀉製附子性行如酒故無處不至能救急回陽按仲景回陽方中必用生附至若半夏南星細辛烏藥良薑香附木香茴香仙茅巴戟之屬皆性溫之當辨者然用熱之法尚有其要以散兼溫者散寒邪也以行兼溫者行寒滯也以補兼溫者補虛寒也第多汗者忌姜姜能散也按此說泥失血者忌桂桂動血也氣短氣怯者忌故紙故紙降氣也大凡氣香者皆不利於氣虛證味辛者多不利於見血證所當慎也是用熱之概也景嶽全書按藥之過熱者必燥如烏頭之散寒濕輕粉之除黴毒皆是已又朱丹溪局方發揮辨燥熱之弊云蓋以熱藥治寒病苟無寒藥為之嚮導佐使則病拒藥而扦格不入謂之遠熱者行之以寒也此概論耳消法程普明曰消者去其壅也藏府筋絡肌肉之間本無此物而忽有之必為消散乃得其平經云堅者削之是已然有當消不消誤人者有不當消而消誤人者有當消而消之不得其法以誤人者有消之而不分部分以誤人者有消之而不辨夫積聚之原有氣血積食停痰蓄水癰膿蟲蠱勞瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後二陰諸疾以誤人者是不可不審也凡人起居有常飲食有節和平恬淡氣血周流穀神安暢病安從來惟夫一有不慎則六淫外侵七情內動飲食停滯邪日留止則諸證生焉法當及時消導俾其速散氣行則愈耳倘遷延日久積氣盤踞堅牢日漸強大有欲拔不能之勢雖有智者亦難為力此當消不消之過也然亦有不當消而消者何也假如氣虛中滿名之曰鼓腹皮膨急中空無物取其形如鼓之狀而因以名之此為敗證必須填實庶乎可消與蠱證之為蟲為血內實而有物者大相徑庭按此說蠱證與古義異又如脾虛水腫土衰不能制水也非補土不可真陽大虧火衰不能生土者非溫暖命門不可又有脾虛食不消者氣虛不能運化而生痰者腎虛水泛為痰者血枯而經水斷絶者皆非消導所可行而或妄用之誤人多矣所謂不當消而消者此也然又有當消而消之不得其法者何也夫積聚癥瘕之證有初中末之三法焉當其邪氣初客所積未堅則先消之而後和之及其所積日久氣鬱漸深濕熱相生塊因漸大法從中治當祛濕熱之邪削之耎之以底於平但邪氣久客正氣必虛須以補瀉疊相為用如薛立齊用歸脾湯送下蘆薈丸豫亦嘗用五味異功散佐以和中丸皆攻補並行中治之道也若夫塊消及半便從未治不使攻擊但補其氣調其血導達其經脈俾營衛流通而塊自消矣凡攻病之藥皆損氣血不可過也此消之之法也然又有消之而不明部分者何也心肝脾肺腎分布五方胃大腸小腸膀胱三焦膽與膻中皆附麗有常所而皮毛肌肉筋骨各有淺深凡用湯丸膏散必須按其部分而君臣佐使駕馭有方使不得移則病處當之不至誅伐無過矣此醫門第一義也而於消法為尤要不明乎此而妄行克削則病未消而元氣已消其害可勝言哉況乎積聚之原有氣血食積停痰蓄水癰膿蟲蠱癆瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後二陰諸疾各各不同若不明辨為害匪輕豫因約略而指數之夫積者成於五藏推之不移者也聚者成於六府推之則移者也其忽聚忽散者氣也痛有定處而不散者血也得食則痛噯腐吞酸者食積也腹有塊按之而耎者痰也先足腫後及腹者水也先腹滿後及四肢者脹也痛引兩脅咳而吐涎者停飲也咳而胸痛吐膿腥臭者肺癰也當胃而痛嘔而吐膿者胃脘癰也當臍而痛小便如淋轉側作水聲者腸癰也增寒壯熱飲食如常身有痛偏著一處者外癰也病人嗜食甘甜或異物飢時則痛唇之上下有白斑點者蟲也蟲有九濕熱所生而為蛇為鱉則血之所成也胡以知為蛇鱉腹中如有物動而痛不可忍吃血故也按前人或有是說要屬胡談又嶺南之地以蠱害人施於飲食他方之蠱多因近池飲冷陰受蛇𧈭之毒也病人咳嗽痰紅抑抑不樂畏見人喉癢而咳劇者癆瘵生蟲也按此似以殺蟲屬消法然彼自一法程氏不免牽湊痃如弓弦筋病也癖則隱癖附骨之病也症則有塊可徽積之類也瘕者或有或無痞氣之類也少腹如湯沃小便澀者胞痹也痛引睪丸疝也女人經水自行而腹塊漸大如懷子者腸覃也經水不行而腹塊漸大並非妊者石瘕也有妊無妊可於脈之滑澀辨之也至於濕熱下墜則為陰菌陰蝕陰挺下脫陰莖腫爛之類而虛火內爍庚金則為痔漏為懸癰為藏毒種種見證不一而足務在明辨證候按法而消之也按濕熱下墜諸證豈特消法所治乎醫者以一消字視為泛常而不知其變化曲折較他法為尤難則奈何不詳稽博考以盡濟時之仁術也耶醫學心悟按消之為義廣矣凡病實於裡者攻而去之此正治也其兼虛則補而行之此奇治也然更有虛實相半攻有所過補有所壅者於是有消法之設焉其類有四曰磨積曰化食曰豁痰曰利水是也蓋此四法除利水外其藥應病愈不似吐下之有形跡如內消然故名之為消焉而又或與攻配用或與補並行各有所適要均中治之道也硇砂檳榔之於氣積乾漆鱉甲之於血積蘆薈蕪荑之於疳積之類是磨積之例也停食有舊新之別舊食則阿魏紅丸之類新食則曲蘗平胃之類更和蘿蔔之於傷面山楂之於傷肉之類所傷既異則其藥亦殊是化食之例也痰涎有冷有熱冷痰之治以小青龍為祖熱痰之治以小陷胸為源是豁痰之例也水飲內蓄其在中焦者為渴為嘔為下利為心腹痛證候多端大抵苓朮半吳為之主藥其在下焦者虛冷則溫而導之如腎氣丸濕熱則清而泄之如八正散是已水飲外溢者必為胕腫輕則徒事淡滲重則從其虛實而施劑嚴子禮所謂陰水宜溫暖之劑如實脾散復元丹陽水宜清平之藥如疏鑿飲子鴨頭丸者是已是利水之例也消之不一如此詎可不為審辨乎程氏所論猶失粗略姑存之已又按戴復庵證治要訣曰治淋之法除的然虛冷之處其餘諸證若用本題藥不效便宜施以調氣之劑蓋津道之逆順皆一氣之通塞為之也云云如不效但宜投以益血之方蓋小便者血之餘也血苟充滿則滋腴下潤自然流通又易思蘭醫案治氣鬱二便祕曰氣鬱不行則升降失職是以下竅祕結二便不順吸門不開幽門不通正此謂也闢如注水之器閉其上竅則下竅不通水安從出乃不治上部而專治下部攻之愈急則元氣愈陷二便可由而利耶按續醫說讀易悟治法條其意稍近宜參又張景嶽類經曰二便之治小便尤難但知氣化則能出矣之意則大腸之血燥者不在硝黃而膀胱之氣閉者又豈在五苓之類斯三說欲用消導之際所宜留意也仍附之又按十劑中有通劑滑劑燥劑俱是消法已又近時李一亭著醫綱提要立醫學大綱一十六字法門而其燥濕門分為潤燥利濕蓋利濕亦消法也澀法鎮法張戴人曰所謂澀劑者寢汗不禁澀以麻黃根防己滑泄不已澀以豆蔻枯白礬木賊烏魚骨罌粟殼凡酸味亦同乎澀者收斂之意也喘嗽上奔以虀汁烏梅煎寧肺者皆酸澀劑也然此數種當先論其本以攻去其邪不可執一以澀便為萬全也事親李瀕湖曰脫者氣脫也血脫也精脫也神脫也脫則散而不收故用酸澀溫平之藥以斂其耗散汗出亡陽精滑不禁泄痢不止大便不固小便自遺久嗽亡津皆氣脫也下血不已崩中暴下諸大亡血皆血脫也牡蠣龍骨海螵蛸五倍子五味子烏梅榴皮訶黎勒罌粟殼蓮房棕灰赤石脂麻黃根之類皆澀藥也氣脫兼以氣藥血脫兼以血藥及兼氣藥氣者血之帥也脫陽者見鬼脫陰者目盲此神脫也非澀藥所能收也本草綱目張景嶽曰固方之制固其泄也如久嗽為喘而氣泄於上者宜固其肺久遺成淋而精脫於下者宜固其腎小水不禁者宜固其膀胱大便不禁者宜固其腸藏汗泄不止者宜固其皮毛血泄不止者宜固其營衛凡因寒而泄者當固之以熱因熱而泄者當固之以寒總之在上者在表者皆宜固氣氣主在肺也在下者在裡者皆宜固精精主在腎也然虛者可固實者不可固久者可固暴者不可固當固不固則滄海亦將竭不當固而固則閉門延寇也二者俱當詳酌之景嶽全書按仲景之於澀啻赤石脂禹餘糧湯桃花湯二方而已蓋人身氣血本貴流通故有些邪壅輕用兜住則正邪俱被堵塞坐為變證且極虛極脫自非溫補不能收攝是以澀法僅為一處專脫者設要為不得已之策乃仲景之所以少用也程若水醫彀曰治病之法先去病然後可用收澀如浣衣然先去垢膩然後可加粉飾也所以粟殼龍骨之藥不可輕用此說不穩但末句可取張戴人曰所謂重劑者鎮縋之謂也其藥則硃砂水銀沉香水石黃丹之倫以其體重故也久病咳嗽涎潮於上咽喉不利形羸不可峻攻以此縋之故內經曰重者因而減之貴其漸也事親按經言重者是病重之義非指重縋李瀕湖曰重劑凡四有驚則氣亂而魂氣飛揚如喪神守者有怒則氣逆而肝火激烈病狂善怒者並雄黃鐵粉以平其肝有神不守舍而多驚健忘迷惑不寧者宜硃砂紫石英之類以鎮其心有恐則氣下精志失守而畏如人將捕者宜磁石沉香之類以安其腎大抵重劑壓浮火而墜痰涎不獨治怯也故諸風掉眩及驚癇痰喘之病吐逆不止及反胃之病皆浮火痰涎為害俱宜重劑以墜之本草綱目按心神失守龍骨牡蠣以收固之諸逆上衝硃砂鐵粉以墜壓之然則鎮法亦澀法之類也至真要大論曰高者抑之又曰驚者平之並重縋之謂矣蓋腳氣上入及奔豚疝氣之類亦重縋所宜如養正丹黑錫丹其效最著鄭端友全嬰方論載交泰丹治小兒因吐瀉之後變成慢驚纍服熱藥上熱下冷涎鳴氣粗服藥雖多止在鬲上不入中下此意殆足通他病矣其方用黑鉛硫黃鐵液粉等十二味雖然金石之藥宜暫用而不可久用王中陽養生主論稱鎮墜久服則陽亢陰消果為下虛瀕湖於鉛丹條云性帶陰毒不可多服恐傷心胃俱可為鑑矣殺蟲吳鶴臯曰古方殺蟲如雷丸貫衆乾漆蠟塵百部鉛灰皆其所常用也有加附子乾薑者壯正氣也加苦參黃連者蟲得苦而安也加烏梅訶子者蟲得酸而軟也加藜蘆瓜蒂者欲其帶蟲而吐也加芫花黑醜者欲其帶蟲而下也用雄黃川椒蛇床樟腦水銀檳榔者治疥瘡之蟲也用胡桐淚莨菪子韭子蟾酥者治齲齒之蟲也用川槿皮海桐皮者治風癬之蟲也用青葙子覆盆菜者治九蟲䘌蝕之蟲也用敗鼓心桃符板虎糞骨死人枕獺爪鸛骨者驅瘵蟲也醫方考按此說不醇姑録存之蓋蛔之為物與四氣七情本無關涉自是一種病由故其方藥亦有出於諸法之外者汪訒庵別設一類良有以也考之經旨甘草粉蜜湯安蛔之治也烏梅丸為厥陰正方而殺蟲之治也胃之寒熱皆足動蛔而其偏寒者必兼溫中其偏熱者必兼清中或兼轉刷前人之法備矣如近今所用鷓鴣菜殆殺蟲聖藥也又張景嶽全書曰逐治之法旋逐旋生終非善策欲杜其源必須溫養脾胃脾胃氣強蟲自不生矣然蛔病有嘔痛危劇亟須驅逐者景嶽之言豈善後之策歟又按張戴人儒門事親曰夫蟲之所生必於脾胃深處藥之所過在於中流蟲聞藥氣而避之群著安得取之豫之法先令飢甚次以檳榔雷丸為引子別下蟲藥大下十數行可以搐而空穩上張子政用此法下蟲數百相銜長丈餘蓋此術本於外臺療食症發症方而言頗有理學者宜試用焉
