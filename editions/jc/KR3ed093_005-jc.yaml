body:
  text: 卷五下法大旨張戴人曰下之攻病人亦所惡聞也然積聚陳莝於中留結寒熱於內留之則是耶攻之則是耶內經一書惟以氣血通流為貴世俗庸工惟以閉塞為貴又止知下之為瀉又豈知內經之所謂下者乃所謂補也陳莝去而腸胃潔癥瘕盡而營衛昌不補之中有真補者存焉然俗不信下之為補者蓋庸工妄投下藥當寒反熱當熱反寒未見微功轉成大害使聰明之士亦復不信者此也所以謂寒藥下者調胃承氣湯泄熱之上藥也大小桃仁承氣次也陷胸湯又其次也大柴胡又其次也按此諸方各有所宜今立差等未審何意以涼藥下者八正散泄熱兼利小便洗心散抽熱兼治頭目黃連解毒散治內外上下畜熱而不泄者四物湯涼血而行經者也神芎丸解上下畜熱而泄者也以溫藥而下者無憂散下諸積之上藥也十棗湯下諸水之上藥也以熱藥下者煮黃丸纏金丸之類也急則用湯緩則用丸或以湯送丸量病之微甚中病即止不必盡劑過而生愆仲景曰大法秋宜瀉謂秋則陽氣在下人氣與邪氣亦在下故宜下此仲景言其大概耳設若春夏有可下之疾當不下乎按此下原論承氣湯義不了今刪卻或言男子不可久瀉婦人不可久吐何妄論之甚也可吐則吐可下則下豈問男女乎大人小兒所傷之物在胃脘如兩手脈遲而滑者內實也宜下之何以別乎蓋傷宿食者惡食傷風者惡風傷寒者惡寒傷酒者惡酒至易辨也故凡宿食在胃脘者可下之則三部脈平若心下按之而硬滿者猶宜再下之如傷寒大汗之後重複勞發而為病者蓋下之後熱氣不盡故也當再下之若雜病腹中滿痛不止者此為內實也金匱要略曰痛而腹滿按之不痛為虛痛者為實難經曰痛者為實腹中滿痛里壅為實故可下之不計難病傷寒皆宜急下之宜大承氣湯或導水丸或泄水丸等藥過十餘行如痛不已亦可再服痛已則止至如傷寒大汗之後發熱脈沉實及寒熱往來時時有涎嗽者宜大柴胡加當歸煎服之下三五行立愈產後慎不可作諸虛不足治之必變作骨蒸寒熱飲食不入肌膚瘦削經水不行經曰寒則衰飲食熱則消肌肉人病瘦削皆粗工以藥消爍之故也嗚呼人之死者豈為命乎難經曰實實虛虛損不足而益有餘如此死者醫殺之耳至如目黃九疸食勞皆屬脾土可下之宜茵陳蒿湯或用導水丸禹攻散瀉十餘行次以五苓散桂苓甘露散白朮丸等藥服之則愈矣或腰腳胯痛可用甘遂粉二三錢以獖豬腰子薄批七八片摻藥在內以濕紙包數重文武火燒熟至臨臥細嚼以溫酒或米飲湯調下至平明見一二十行勿訝意欲止瀉則飲冰或新水頓服之瀉立止次服通經和氣定痛烏金丸騙馬丹之類則愈矣內經有不因氣動而病生於外者太僕以為瘴氣賊魅蟲毒蜚屍鬼擊沖薄墜墮風寒暑濕斫射剝割撞撲之類至如諸落馬墮井打撲閃肭損折湯沃火燒車碾犬傷腫發焮痛日夜嚎泣不止者予尋常談笑之間立獲大效可峻瀉三二十行痛止腫消乃以通經散下導水丸等藥如瀉水少則可再加湯劑瀉之後服和血消腫散毒之藥病去如掃此法得之睢陽高大明侯德和使外傷者不致癃殘跛躄之患余非敢掩人之善意在救人耳曾有鄰人杖瘡發作腫痛焮及上下語言錯亂時時嘔吐數日不食皆曰不救余以通經散三四錢下神祐丸百餘丸相併而下間有嘔出者大半已下膈矣良久大瀉數行穢不可近膿血涎沫瘀血約一二斗其病人困睡不省一日一夜領問予予曰喘息勻停腫消痛減故得睡也來旦語清食進不數日痊救杖瘡欲死者四十年間二三百余追思舉世杖瘡死者皆枉死也自後凡見冤人被責者急以導水丸禹攻散大作劑料瀉驚涎一兩盆更無腫發痛焮之難如導水丸禹攻散泄瀉不動更加之通經散神祐丸瀉之瀉訖須忌熱物止可吃新汲水一二頓瀉止立愈至如沉積多年羸劣者不可便服陡攻之藥可服纏積舟三稜丸之類內經曰重者因而減之若人年老衰弱有虛中積聚者止可五日一服萬病無憂散故凡積年之患豈可一藥而愈即可減而去之以本草考之下之寒者有戎鹽之咸犀角之酸鹹滄鹽澤瀉之甘鹹枳實之苦酸膩粉之辛澤漆之苦辛杏仁之苦甘下之微寒者有豬膽之苦下之大寒者有牙消之甘大黃瓜蒂牽牛苦瓠子藍汁牛膽羊蹄根苗之苦大戟甘遂之苦甘樸消芒硝之苦辛下之溫者有檳榔之辛芫花之苦辛石蜜之甘皂角之辛鹹下之熱者有巴豆之辛下之辛涼者按辛字可疑有豬羊血之咸下之平者有郁李人之酸桃花萼之苦上三十味惟牽牛大戟芫花皂角羊蹄根苦瓠子瓜蒂有小毒巴豆甘遂膩粉杏仁之有大毒余皆無毒設若疫氣冒風中酒小兒瘡疹及產後潮熱中滿敗血勿用膩粉杏仁大毒之藥下之必死不死即危且如檳榔犀角皂角皆溫平可以殺蟲透關節除腸中風火燥結大黃芒硝樸消等鹹寒可以治傷寒熱病時氣瘟毒發斑瀉血燥熱發狂大作湯劑以盪滌積熱澤瀉羊蹄根苗牛膽藍葉汁苦瓠子亦苦寒可以治水腫遍身腫大如鼓大小便不利及目黃濕毒九疸食癆疳蟲食土生米等物分利水濕通利大小便盪滌腸胃間宿谷相搏又若備急丸以巴豆乾姜大黃蜜和丸之亦是下藥然止可施於辛苦勞力貧食粗辣之輩或心腹脹滿脅肋刺痛暴痛不住服五七丸或十丸瀉五七行以救急若施之富貴城郭之人則非矣此藥用砒石治瘧相類止可施之於貧食之人若備急丸治傷寒風溫中酒冒風及小兒瘡疹產後滿悶用之下膈不死則危及夫城郭之人富貴之家用此下藥亦不死則危矣奈何庸人畏大黃而不畏巴豆粗工喜巴豆而不喜大黃蓋庸人以巴豆惟熱而不畏以大黃性寒而畏粗工以巴豆劑小而喜以大黃劑大而不喜皆不知理而至是也豈知諸毒中惟巴豆為甚去油匱之蠟猶能下後使人津液涸竭留毒不去胸熱口燥他病轉生故下藥以巴豆為禁余嘗用前十餘藥如身之使臂臂之使手然諸洞泄寒中者不可下俗謂休息痢也傷寒脈浮者不可下表裡俱虛者不可下內經中五痞心證不宜下按此一句似有訛脫厥而唇青手足冷內熱深者宜下寒者不宜下以脈別之小兒內瀉轉生慢驚及兩目直視魚口出氣者亦不宜下若十二經敗甚亦不宜下止宜調養溫以和之如下則必誤人病耳若其餘大積大聚大病大秘大涸大堅下藥乃補藥也余嘗曰瀉法兼補法良以此夫儒門事親程普明曰下者攻也攻其邪也病在表則汗之在半表半裡則和之病在裡則下之而已然有當下不下誤人者有不當下而下誤人者有當下不可下而妄下之誤人者有當下不可下而又不可以不下下之不得其法以誤人者有當下而下之不知淺深不分便溺與蓄血不論湯丸以誤人者又雜證中不別寒熱積滯痰水蟲血癰膿以誤人者是不可不察也何謂當下不下仲景云少陰病得之二三日口燥咽乾者急下之少陰病六七日腹滿不大便者急下之下利脈滑數不欲食按之心下硬者有宿食也急下之陽明病讝語不能食胃中有燥屎也可下之陽明病發熱汗多者急下之少陰病下利清水色純青心下必痛口乾燥者急下之傷寒六七日目中不了了睛不和無表證大便難者急下之此皆在當下之例若失時不下則津液枯竭身如槁木勢難挽回矣然又有不當下而下者何也如傷寒表證未罷病在陽也下之則成結胸病邪雖已入里而散漫於三陰經絡之間尚未結實若遽下之亦成痞氣按此數句蓋失經旨宜參拙著傷寒論述義況有陰結之證大便反鞕得溫則行如開冰解凍之象又雜證中有高年血燥不行者有新產血枯不行者有病後亡津液者有亡血者有日久不更衣腹無所苦別無他證者若誤下之變證蜂起矣所謂不當下而下者此也然又有當下不可下者何也病有熱邪傳裡已成可下之證而其人臍之上下左右或有動氣則不可以下又咽中閉塞者不可下又脈微弱者不可下脈浮大按之無力者不可下脈遲者不可下喘而胸滿者不可下欲吐欲嘔者不可下病人陽氣素微者不可下下之則呃病人平素胃弱不能食者不可下病人能食胃無燥屎也不可下小便清者不可下病者腹滿時減復如故者不可下若誤下之變證百出矣所謂當下不可下而妄下誤人者此也然有當下不可下而又不得不下者何也夫以羸弱之人虛細之脈一旦而熱邪乘之是為正虛邪盛最難措手古人有清法焉有潤法焉有導法焉有少少微和之法焉有先補後攻先攻後補之法焉有攻補並行之法焉不可不講也如三黃解毒清之也麻仁梨汁潤之也蜜煎豬膽汁土瓜根導之也涼膈散大柴胡少少和之也更有脈虛體弱不能勝任者則先補之而後攻之或暫攻之而隨補之或以人參湯送下三黃枳朮丸又或以人參瓜蔞枳實攻補並行而不相悖蓋峻劑一投即以參朮歸芍維持調護於其中俾邪氣潛消而正氣安固不愧為王者之師矣按此段當與第二卷虛實條相參又有雜證中大便不通其用藥之法可相參者如老人久病人新產婦人每多大便閉結之證丹溪用四物湯東垣用通幽湯予嘗合而酌之而加以蓯蓉枸杞柏子仁芝麻松子仁人乳梨汁蜂蜜之類隨手取效又嘗於四物加升麻及前滋潤藥治老人血結數至圊而不能便者往往有驗此皆委曲疏通之法若果人虛雖傳邪熱邪不妨借用寧得猛然一往敗壞真元至成洞瀉雖曰天命豈非人事哉所謂下之貴得其法者此也然又有當下而下而不知淺深不分便溺與蓄血不論湯丸以誤人者何也如仲景大承氣湯必痞滿燥實兼全者乃可用之若僅痞滿而未燥實者仲景只用瀉心湯痞滿兼燥而未實者仲景只用小承氣湯除去芒硝恐傷下焦陰血也燥實在下而痞滿輕者仲景只用調胃承氣湯除去枳樸恐傷上焦陽氣也又有太陽傷風證誤下而傳太陰以致腹痛者則用桂枝湯加芍藥大實痛者桂枝湯加大黃是解表之中兼攻裡也按此論三承氣及加芍藥加大黃不核辨見於後又有邪從少陽來寒熱未除則用大柴胡湯是和解之中兼攻裡也又結胸證項背強從胸至腹硬滿而痛手不可近者仲景用大陷胸湯丸若不按不痛者只用小陷胸湯若寒實結胸用三白散熱藥攻之又水結胸頭出汗者用小半夏加茯苓湯按此據朱奉議活人書喻西昌傷寒尚論篇所辨當矣水停脅下痛不可忍者則用十棗湯凡結胸陰陽二證服藥罔效活人俱用枳實理中丸應手而愈按此方所主實系陰結又河間三書云鬱熱蓄甚神昏厥逆脈反滯澀有微細欲絕之象世俗未明造化之理投以溫藥則不可行或者妄行攻下致殘陰暴絕勢大可危不下亦危宜用涼膈散合解毒湯養陰退陽積熱藉以宣通則心胸和暢而脈漸以生此皆用藥淺深之次第也又如太陽證未罷口渴小便短澀大便如常此為溺澀不通之證治用五苓散又太陽傳本熱結膀胱其人如狂少腹硬滿而痛小便自利者此為蓄血下焦宜抵當湯丸若蓄血輕微但少腹急結未至硬滿者則用桃核承氣湯或用生地四物湯加酒洗大黃各半下之尤為穩當蓋溺澀證大便如常燥糞證小便不利蓄血證小便自利大便色黑也此便溺蓄血之所由分也血結膀胱病勢最急則用抵當湯稍輕則抵當丸結胸惡證悉具則用大陷胸湯稍輕者大陷胸丸其他盪滌腸胃推陳致新之法則皆用湯古人有言凡用下藥攻邪氣湯劑勝丸散誠以熱淫於內用湯液滌除之為清淨耳此湯丸之別也然又有雜證中不別寒熱積滯痰水蟲血癰膿以誤人者何也東垣治傷食證腹痛便閉拒按者因於冷食用見晛丸因於熱食用三黃枳朮丸若冷熱互傷則以二丸酌其所食之多寡而互用之應手取效按冷食熱食以分治法殊為迂泥又實熱老痰滾痰丸水腫實證神祐丸蟲積剪紅丸血積花蕊丹失笑丸腸癰牡丹皮散隨證立方各有攸宜此雜證攻下之良法也近世庸家不講於法每視下藥為畏途病者亦視下藥為砒鴆致令熱證垂危袖手旁觀委之天數大可悲耳昔張子和儒門事親三法即以下法為補謂下去其邪而正氣自復穀肉果菜無往而非補養之物雖其說未合時宜而於治病攻邪之法正未可缺吾願學者仰而思之平心而察之得其要領以施救濟之方將以躋斯民於壽域不難矣醫學心悟按經曰因其重而減之又曰其下者引而竭之中滿者寫之於內又曰其實者散而寫之又曰其未滿三日者可汗而已其滿三日者可泄而已曰人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此軒岐之下法也蓋攻下之道不可以速不可以遲必在其中肯焉邪將陷里未全實胃者雖曰數既多倘遽下之則邪正相擾或熱氣上迫或變為虛寒其證不一此經文所諄諄垂戒者也邪既實胃者雖得病無日必宜用疏轉而瞻顧失下則火邪膠固銷血鑠液遂至攻補兩難此吳又可所深畏者也是以用下之機間不容穟必俟外解裡實而亟用承氣釜底抽薪則邪氛頓衰而後從事清潤病無不愈矣大抵服湯已更衣二三行則譫妄止舌潤復和倘以其餘焰猶存誤為實未去而過攻之則必損胃氣亦為變證所以有得下余勿服之禁也然至其人稟強與病勢殊重者及餘邪復聚者則並有不可以常論所謂下後懊憹而煩及大下後六七日不大便煩不解之類是也又可論有因證數攻條曰其中有間日一下者有應連下三四日者有應連下二日間一日者其中寬緩之間有應用柴胡清燥湯者有應用犀角地黃湯者至投承氣某日應多與某日應少與其間不能得法亦足以誤事此非可以言傳貴乎臨時斟酌斯言精切非空談矣並是傷寒之理也已如雜病之於下則干霍暴痛等諸危急證宜峻下之固不待言凡沉滯痼癖如頑痰宿飲積食老血及狂癇黴癩諸疾皆有不可不下者其負固不服宜霎時驅除者有如久咳之於十棗湯之類淹久不消宜取次潰散者有如勞極之於大黃䗪蟲丸之類蓋其端緒不一臨處之際須仔細甄辨而勿疑殆焉尤飼鶴醫學讀書記曰攻除陳積之藥可峻而不可駃宜專而不宜泛駃則急過病所泛則搏擊罕中由是堅壘如故而破殘已多豈徒無益而已哉此理之所然然破積有大藥如鱉甲煎丸之類則非宜概言矣外臺引崔氏療癥瘕有羈縻攻之方亦緩下之謂也又按三承氣功用成聊攝註解以熱結微甚為辨而張云岐保命集所論綦詳蓋消黃均是寒下之藥而大黃氣味峻烈能破實結芒硝咸潤能軟堅凝大黃功在氣芒硝功在質此其所以為異但芒硝比大黃其力頗緩不如大黃之獨行奏續然病稍重者非配用芒硝則不能盪滌大邪況滋以枳樸破氣則最見其效故大承氣為最緊而小承氣次之調胃承氣又次之蓋小承氣證視之大承氣證則其機相同其實稍輕如調胃承氣則既無枳樸更有甘草是潤下之法其用頗不同也陶節庵傷寒六書以三焦分論之迂拘不可信閔涵清傷寒闡要編既加辨訂今不復贅又按吳又可曰如人方肉食而病適來以致停積在胃用大小承氣連下惟是臭水稀糞而已於承氣湯中但加人參一味服之雖三四十日所停之完穀及完肉於是方下蓋承氣藉人參之力鼓舞胃氣宿物始動也今試有陽明病其人素虛雖用承氣胃氣不能施布仍遵此法始得快下者蓋不啻停食為宜也用下勿拘結糞吳又可曰大凡客邪貴乎早逐乘人氣血未亂肌肉未消津液未耗病人不至危殆投劑不至掣肘愈後亦易平復欲為萬全之策者不過知邪之所在早拔去病根為要耳但要諒人之虛實度邪之輕重察病之緩急揣邪氣離膜原之多寡然後藥不空投投藥無太過不及之弊是以仲景自大柴胡以下立三承氣多與少與自有輕重之殊勿拘於下不厭遲之說應下之證見下無結糞以為下之早或以為不應下之證誤投下藥殊不知承氣本為逐邪而設非專為結糞而設也必俟其糞結血液為熱所搏變證迭起是猶養虎遺患醫之咎也況多有溏糞失下但蒸作極臭如敗醬或如藕泥臨死不結者但得穢惡一去邪毒從此而消脈證從此而退豈徒孜孜糞結而後行哉假如經枯血燥之人或老人血液衰少多生燥結或病後血氣未復亦多燥結在經所謂不更衣十日無所苦有何妨害是知燥結不致損人邪毒之為殞命也要知因邪熱致燥結非燥結而致邪熱也但有病久失下燥結為之壅閉瘀邪鬱熱益難得泄結糞一行氣通而邪熱乃泄此又前後之不同總之邪為本熱為標結糞又其標也能早去其邪安患燥結耶假令滯下本無結糞初起質實頻數窘急者宜芍藥湯加大黃下之此豈亦因結糞而然耶乃為逐邪而設也或曰得毋為積滯而設與余曰非也邪氣客於下焦氣血壅滯鬱而為積若去積以為治已成之積方去未成之積後生須用大黃逐去其邪是乃斷其生積之原營衛流通其積不治而自愈矣更有虛痢又非此論或問脈證相同其糞有結有不結者何也曰原其人病至大便當即不行續得蘊熱益難得出蒸而為結也一者其人平素大便不實雖胃家熱甚但蒸作極臭狀如黏膠至死不結應下之證誤引經論初硬後必溏不可攻之句誠為千古之弊溫疫論按仲景以後妙用承氣者莫如又可而此論實為其本領以吾觀之其所得固在於此其所失亦在於此何以言之後世庸師不諳醫理遇胃家實證清便不結者當下不下徒治其外遂至轉變不一故又可悍然立言以破其陋可謂卓矣然仲景治下利用大承氣者六條用小承氣用謂胃承氣用大柴胡者各一條皆為熱結旁流及滯下諸證未有內無實物而輒用承氣者蓋胃實之徵在於脈證而不在結糞故注意胃實而勿拘結糞是用下之法也倘云注意逐邪則復開粗工下早之路其害有不可勝言且燥屎瘀積正是邪藪承氣以蕩其結而邪從以消謂之承氣逐邪則乖矣所謂溏糞失下蒸作極臭者即是黏膩惡物繫於瘀積所致則亦不可言之非胃實如滯下一證猶是宿積因邪而動非邪之生積也又可切畏黃連又以白虎為表藥故不得不以大黃充清解豈亦此論之所以發乎然則學者宜通又可之意勿泥又可之文庶其可歟再又可以誤引經論為千古之弊然初硬後溏固不是可下證但須勿以實滯下利相混看而已又按陽明病熱熏內外血液必燥故下後調治必與養營清燥等湯此亦又可之卓識也下邪熱不宜丸許學士曰仲景論中百一十三方為圓者有五理中陷胸抵當麻仁烏梅是已理中陷胸抵當皆大彈丸煮化而服與湯無異至於麻仁治脾約證烏梅治濕䘌證按當作蛔厥證皆欲必達下部故用小丸其他皆欲入經絡逐邪毒破堅癖導瘀血燥屎之類須憑湯劑以滌除也余見俗醫用小丸藥以巴豆而下邪毒致殺人者不可勝數蓋巴豆止導食積而不能去熱毒既下之後藏氣虛而邪毒宛然猶在更再以大黃樸消下之鮮不致斃按此數句稍有病大抵下藥欲其必中必當一服而止也故不可不慎歟傷寒發微論柯韻伯曰仲景下劑只重在湯故曰醫以丸藥下之非其治也觀陷胸抵當二丸仍用水制是丸復其湯重兩許連滓服則勢力更猛於湯散劑矣當知仲景方以銖兩分計者非外感方按此語不知何謂丸以桐子大服十丸者不是治外感法傷寒論翼按可下篇曰凡可下者用湯勝丸散更考太陽中篇第百二百三兩條則知凡欲下邪熱者雖大黃丸猶在所忌不啻巴豆小丸也陳九韶黴瘡秘錄云如傷寒禁用丸藥恐庸俗誤用巴豆丸若用大黃丸則宜矣此說非是又吳又可論三承氣曰不耐湯藥者或嘔或畏當為細末蜜丸湯下蓋是不得已之策也又蜜丸煮丸之別當考第九捲雲溫下張石頑曰三承氣湯為寒下之柔劑白散備急丸為熱下之剛劑附子瀉心湯大黃附子湯為寒熱互結剛柔並濟之和劑此鼎峙三法也獨怪近世但知寒下一途絕不知有溫下等法蓋暴感之熱結可以寒下若久積之寒結亦可寒下乎是以備急等法所由設也然此僅可以治寒實之結設其人稟質素虛雖有實邪固結敢用剛猛峻劑攻擊之乎故仲景又立附子瀉心湯用芩連佐大黃以祛膈上之熱痞即兼附子之溫以散之大黃附子湯用細辛佐附子以攻脅下寒結即兼大黃之寒導而下之此聖法昭然不可思議者也奈何去聖久遠一聞此法無論賢與不肖莫不交相詆譭遂至明哲束手沉疴待斃良可慨夫傷寒諸論按石頑主張溫下其意甚善然此說則猶未為盡蓋約下藥為三法固涉不倫如溫之一途本療寒實證而其法其緩急之別備急丸走馬湯是急治之祖方也桂枝加大黃湯大黃附子湯是緩治之祖方也其藥雖寒溫並用而其性味則融和以溫利結寒非為熱寒互結也桂枝加大黃湯前注謂為兼表者既辨於傷寒論述義中大黃附子湯立方之趣詳論於第十卷中並不贅如附子瀉心湯是寒溫各奏其功非溫利之謂也此方尤飼鶴傷寒論貫珠集所解甚核亦錄於述義中更有巴豆丸子以去陳積之劑宋人方書其方殊夥而有驗者不一湯液本草巴豆條云若急治為水穀道路之劑若緩治為消堅磨積之劑此言實是如張戴人一概禁用巴豆者非通論也虛秘不可峻利初和甫曰余歷觀古人用通藥率用降氣等藥蓋肺氣不下降則大腸不能傳送以杏仁枳殼訶子等藥是也又老人虛人風人津液少大便秘經云澀者滑之故用胡麻杏仁麻子仁阿膠之類是也今人學不師古妄意斟酌每至大便秘燥即以駛藥音史盪滌之既走津液氣血大便隨手愈更秘澀兼生他病梶原性全萬安方引養生必用方按駃藥古或作快藥以為駛藥者蓋誤吳茭山曰人病失血耗氣之餘老人血少多有秘結之患人皆不知此好用大黃樸消重者牽牛巴豆隨利隨結殊不知此輩皆血少津液枯竭腸胃乾燥之人宜用麻子杏仁潤滑之劑腸潤皆通其病漸愈若妄用大黃巴豆之類損其陰血故病愈加矣所以局方制麻仁丸少用大黃凡治老人風秘血少腸胃燥結者此也諸證辨疑按虛秘之治要不過利氣潤燥二途初氏之說是也又蔣自了醫意商敘下藥云外有臨服加生蜜者取其潤澤加鐵鏽水者取其重墜加檳榔汁者取其推下此皆下家之助者也予遇一老人大便苦結結而下下後復結將已垂斃其時攻下則元氣難堪潤燥則力緩不應偶以潤燥湯中加豬油一兩同煎服後竟愈蓋其腸胃乾枯已極故用油以潤之亦古法之未言及者也考仲景豬膏發煎本為潤腸設而孫真人亦云凡大便不通皆用滑膩之物及冷水並通也今蔣氏實祖其意者也又下法之類更有導法揭出於第九卷中
