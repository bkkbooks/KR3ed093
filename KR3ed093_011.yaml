body:
  text: 卷十一藥分三品陶隱居曰上品藥性亦皆能遣疾但其勢力和厚不為倉卒之效然而幾月常服必獲大益病既愈矣命亦兼申天道仁育故云應天中品藥性療病之辭漸深輕身之説稍薄於服之者祛患當速而延齡為緩故云應人下品藥性專主攻擊毒烈之氣傾損中和不可常服疾愈即止地體收殺故云應地本草黑字按藥分上中下所以使人就三品之分識無毒有毒之辨在臨處之際易於擇用此神農已來本草之制而唐宋以前莫敢或易者矣事物浸繁三品混糅至李瀕湖著綱目懲創太過物以類從毅然破三品之例而每部徒立子目於是本草之學壞古制幾乎從祧今所以表隱居之言不厭其贅也明李時珍作本草綱目其名已愚僅取大觀本割裂舊文妄加增駁迷誤後學此孫季逑校定神農本草經序中語也蓋李書肆意改舊強立條理故學者眩惑奉為圭臬不知援據駁雜誣妄不一孫氏之言切中其病仍附注於此藥性皆偏繆仲淳曰藥石稟天地偏至之氣者也雖醇和濃懿號稱上藥然所稟既偏所至必獨脫也用違其性之宜則偏重之害勢所必至故凡有益於陽虛者必不利乎陰有益於陰虛者必不利乎陽能治燥者必不宜於濕能治濕者必不宜於燥能破散者不可以治虛能收斂者不可以治實升不可以止升降不可以療降寒有時而不宜於熱熱有時而不宜於寒古人半夏有三禁謂渴家汗家血家仲景嘔家忌甘酒家亦忌甘王好古論肺熱忌人參之屬諸如此類莫可勝數苟昧斯旨吉凶貿焉人命至重置報難逃醫為司命其可不深思詳察也哉神農本草經疏張景嶽曰藥以治病因毒為能所謂毒者以氣味之有偏也蓋氣味之正者穀食之屬是也所以養人之正氣氣味之偏者藥餌之屬是也所以去人之邪氣其為故也正以人之為病病在陰陽偏勝耳欲救其偏則惟氣味之偏者能之正者不及也如五常政大論曰大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九是凡可辟邪安正者均可稱為毒藥故曰毒藥攻邪也類經按千金載仲景曰人體平和唯須好將養勿妄服藥藥勢偏有所助令人藏氣不平易受外患養生要集引同見醫心方又唐書裴潾傳載布衣張臯者上疏曰高宗時處士孫思邈達於養生其言曰人無故不應餌藥藥有以偏助則藏氣為不平推此論之可謂達見至理又王啓玄注五常政大論曰無毒之藥性雖平和久而多之則氣有偏勝至真要大論曰久而增氣物化之常也氣增而久夭之由也啓玄注甚詳有久服黃連苦參而反熱者此其類也之語並二家所據也又衛生寶鑑有無病服藥辨洽引諸説以徵藥性之偏宜並考焉毒藥二字古多連稱見素問及周官即總括藥餌之詞先君子素問識有詳説茲不繁引如張戴人曰凡藥皆有毒也非止大毒小毒謂之毒雖甘草苦參不可不謂之毒久服必有偏勝其言不能無疵矣又按程若水醫彀曰蓋藥有利有害參耆歸術補氣補血等藥利人處極多亦有受其害者不中病也香燥苦寒損氣損血等藥害人處極多亦有受其利者適中病也此説為是蓋醫人能就每藥如其所以害則其所以利必益瞭然繆氏經疏於各條下附有簡誤其用心切矣草石之異趙敬齋曰藥字從草以草為樂也按此解殆僻玉石之類乃仙家之藥至於凡人豈可輕服草木之類以湯煮之則爛以火炙之則焦湯液丸散入於脾胃可以易消去疾病而養氣血若玉石堅硬非椎則斧則不可用脾胃虛軟豈與之相便哉又草木之藥雖有大毒可以解之至於玉石之藥一發莫救往時洪文安公被人投礬石丸礬石大熱者竟至精液枯竭而死可不戒哉儒醫精要按巢源曰有説者云藥性草木則速發而易歇土石則遲發而難歇也千金曰草藥氣力易盡石性沉滯獨主胃中主字似訛故令數發二説俱出其解散論中而殆一言蔽之者已又朱丹溪本草衍義補遺曰藥則氣之偏可用於暫而不可久夫石藥又偏之甚者也何柏齋醫學管見亦論金石之害曰不得已而用則煮取其汁可也末而服之則鮮不為害何氏之見幾於畏葸然仲景之用石藥配以米穀則亦未可謂之無理矣又沉存中夢溪筆談曰凡人飲食及服藥既入腸為真氣所蒸英精之氣味以至金石之精者如細研硫黃硃砂乳石之類凡能飛走融結者皆隨真氣洞達肌骨猶如天地之氣貫穿金石土木曾無留礙自余頑石草木則但氣味洞達耳云云沉氏此言極傎不知金石之所以損人草木之所以益人正在於此也岐伯曰石藥之氣悍倉公曰石之為藥精悍是可以鑑焉又按倪純字本草匯言曰神農嘗百草而定藥故其書曰本草意必先以草為正嗣後果木金石禽魚等類繼之故集中先列草部云云此與敬齋之意相發矣蓋輕身延年之妄漢人蚤有其辨今本草以玉石為魁者亦恐漢時方士之所為而如丹砂之寒涼消石朴消之駃利而列之上品水銀之險毒而列之中品之類實非醫家之旨矣岐伯論中古之治病則特舉湯液與草蘇草荄之枝而仲景之方草類最多則醫藥之於玉石須處之第二流也必矣本草蓋為漢方士所汩者也漢書郊祀志稱成帝初即位丞相衡御史大夫談奏言郊祀明年衡談復條奏中有云候神方士使者副佐本草待詔七十餘人皆歸家顏師古曰本草待詔謂以方藥本草而待詔者據此則漢之本草為長生久視而非養正攻邪之用矣且平帝之時政自莽出莽好神仙事則所召通知本草者其為方士亦可知矣補注敘於平帝紀及樓護傳檢出本草字而反不引郊祀志之最裨考證者故附注於此氣味辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也至真要大論按此言陰陽本之陰陽應象大論而藥有陰陽配合出於本草經藥石者有陰陽水火之齊出於史記倉公傳又六者或收云云亦本之藏氣法時論而增或燥或潤且經文或急二字太素所無明是衍文撰偽經者蓋不能辨也王啓玄曰辛散酸收甘緩苦堅咸耎此五者皆自然之氣也然辛味苦味匪惟堅散而已辛亦能潤能散苦亦能燥能泄故上文曰脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之則其謂苦之燥泄也又曰腎苦燥急食辛以潤之則其謂辛之濡潤也素問次注寇宗奭曰夫天地既判生萬物者惟五氣爾五氣定物則五味生五味生則千變萬化至於不可窮已故曰生物者氣也成之者味也以奇生則成而耦以耦生則成而奇寒氣堅故其味可用以耎熱氣耎故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈耎則和故咸可以養脈骨收則強故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以耎收之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦病矣古之養生治疾者必先通乎此不通乎此而能已人之疾者蓋寡矣本草衍義李東垣曰辛能散結潤燥苦能燥濕堅軟咸能軟堅酸能收緩收散甘能緩急淡能利竅用藥法象王海藏曰藥味之辛甘酸苦竅味也寒熱溫涼氣也味則五氣則四五味之中每一味各有四氣有使氣者有使味者有氣味俱使者有先使氣後使味者有先使味後使氣者所用之不一也有一藥而一味者或三味者或一氣者或二氣者不可一途而取也辛散也其行之也橫甘緩也其行之也上苦泄也其行之也下酸收也其性縮咸也其性舒上下舒縮橫之不同如此合而用之其變用不同何以然鼓掌成聲沃火成沸二物相合象在其間也七情相制四氣相和其變可輕用為哉伊尹湯液廣為大法按原文稍繁此係節録景嶽全書稍加潤色今拈於後繆仲淳曰夫物之生也必稟乎天其成也必資乎地天布令主發生寒熱溫涼四時之氣行焉陽也地凝質主成物酸苦甘鹹甘淡五行之味滋焉陰也故知微寒微溫者春之氣也大溫熱者夏之氣也大熱者長夏之氣也涼者秋之氣也大寒者冬之氣也凡言微寒者稟春之氣以生春氣升而生言大熱者感長夏之氣以生長夏之氣化言平者感秋之氣以生平即涼也秋氣降而收言大寒者感冬之氣以生冬氣沉而藏此物之氣得乎天者也天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之水曰潤下潤下作咸火曰炎上炎上作苦木曰曲直曲直作酸金曰從革從革作辛土愛稼穡稼穡作甘本乎天者親上本乎地者親下氣味多少各言其類也凡言酸者得木之氣言辛者得金之氣言咸者得水之氣言苦者得火之氣言甘者得土之氣惟土也寄旺於四季生成之數皆五故其氣平其味甘而淡其性和而無毒土德沖和感而類之莫或不然固萬物之所出亦萬物之所入乎此物之味資乎地者也氣之毒者必熱味之毒者必辛炎黃言味而不加氣性者何也蓋古文尚簡故秪言味物有味必有氣有氣斯有性自然之道也氣味生成原本乎是知其所自則思過半矣本草經疏又曰藥有五味中涵四氣因氣味而成其性合氣與味及性而論其為差別本自多途其間厚薄多少單用互兼各各不同良難究竟是故經曰五味之變不可勝窮此方劑之本也陰陽二象實為之綱紀焉鹹味本水苦味本火酸味本木甘味本土辛味本金此五味之常也及其變也有神明之用焉今姑陳其略以明之第準經文同一苦寒也黃芩則燥天冬則潤蘆薈能消黃蘗能補黃連止瀉大黃下通柴胡苦寒而升龍膽苦寒而降同一咸也澤瀉則瀉蓯蓉則補海藻昆布則消而軟堅馬莖鹿茸則補而生齒同一酸也硫黃味酸而熱空青味酸而寒甘合辛而發散為陽甘合酸而收斂為陰人參黃耆陽也甘溫以除大熱地黃五味陰也甘酸以斂陰精聊採數端引以為例如是之類難可枚舉良由氣味互兼性質各異參合多少制用全殊所以窮五味之變明藥物之能厥有旨哉顧其用紛錯其道淵微可以意知難以言盡非由妙悟則物不從心固將拯蒸民於夭枉宜寤寐乎茲篇同上張景嶽曰氣味有陰陽陰者降陽者升陰者靜陽者動陰者柔陽者剛陰者怯陽者勇陰主精陽主氣其於善惡喜惡皆有妙用不可不察氣味之升降升者浮而散降者沉而利宜升者勿降宜降者勿升氣味之動靜靜者守而動者走走者可行守者可安氣味之剛柔柔者純而緩剛者躁而急純者可和躁者可劫非剛不足以去暴非柔不足以濟剛氣味之勇怯勇者直達病所可賴出奇怯者用以周全藉其平安氣味之主氣者有能為精之母主精者有能為氣之根或陰中之陽者能動血中之氣或陽中之陰者能顧氣中之精氣味有善惡善者賦性馴良盡堪擇用惡者氣味殘狠何必近之氣味有喜惡有素性之喜惡有一時之喜惡喜者相宜取效尤易惡者見忌不必強投全書又曰辛主散其行也橫故能解表甘主緩其行也上故能補中苦主瀉其行也下故可去實酸生收其性也斂故可治泄淡主滲其性也利故可分清咸主軟其性也沉故可導滯用純氣者用其動而能行用純味者用其靜而能守有氣味兼用者和合之妙貴乎相成同上按周官瘍醫曰凡藥以酸養骨以辛養筋以咸養脈以苦養氣以甘養肉以滑養竅此與醫經之旨稍異又褚氏遺書曰酸通骨甘解毒苦去熱咸導下辛發滯亦自一義又按海藏又曰本草只言辛鹹苦酸不言淡如何是味淡李瀕湖曰淡附於甘徐洄溪曰土本無味也無味即為淡淡者五味之所從出即土之正味也故味之淡者皆屬土徐説是考靈樞九針篇曰淡入甘楊上善太素注曰五味各入其藏甘味二種甘與淡也谷入於胃變為甘味未成曰淡屬其在於胃已成為甘走入於脾也聖濟經亦論五味生於土而本於淡及甘甚則反淡並可以徵矣又陳氏別説曰有諸淡利九竅之理見藿香條又按味又有澀何首烏味苦澀微溫羊蹄實味苦澀平石衣澀冷榼藤子味澀金櫻子味酸澀平自然銅食之苦澀者是真之類是也又龍膽味苦寒政和本作味苦澀有滑周官所言是也又紫葛味苦滑冷苧根味甘滑冷洄溪曰礬石味澀而云酸者蓋五味中無澀澀則酸之變味澀味收澀亦與酸同如五色中之紫即紅之變色也又曰藥之味澀者絶少龍膽之功皆在於澀澀者酸辛之變味兼金木之性者也此説並是又有蘞芋條陶隱居曰生則有毒簽不可食注音杴政和本草作蘞又日華子於半夏日味㿌辛於牽牛子曰味苦㿌於茜根曰味酸㿌亦蘞訛先兄紹翁曰源順和名鈔引掌禹錫食經云茄子味甘酸注唐韻力減反䤘味也䤘音初減反酢味也俗語云惠久之蓋俗語於義為妥大抵微毒戟人咽喉者也又按經不舉氣性字繆説宜從王安道溯洄集曰經於諸藥名下不著氣性等字獨以味字冠之者由藥入口惟味為先故也亦是寇宗奭曰序例藥有酸鹹甘苦辛五味寒熱溫涼四氣今詳之凡稱氣者即是香臭之氣其寒熱溫涼則是藥之性氣字恐後世誤書當改為性字則於義方允李瀕湖載此説以為與禮記文合愚謂寒藥溫涼四時之氣也然則藥之寒熱溫涼指之以氣固無不可況經文未曾及氣臭蓋聖濟經論氣臭自有已疾之用寇氏徽宗時人故遵其説也又按海藏又曰本草只言溫大溫熱大熱寒大寒微寒平小毒大毒有毒無毒不言涼如何是氣涼瀕湖曰微寒即涼也今考涼字特日華子陳藏器用之又有稱冷蓋亦寒也平則序例中不言豈以平即四氣之最緩和者乎王啓玄五常政大論注曰上品中品下品無毒藥悉謂之平又唐六典尚藥奉御云凡合藥宜用一君三臣九佐方家之大經也必辨其五味三性七情然後為和劑之節又云三性謂寒溫平又元和紀用經曰五等之口寒次冷冷大寒也寒然後涼涼然後小溫小溫然後溫溫之甚曰和利甚曰小熱小熱甚則熱矣又有性澀見側柏葉楓柳皮條可疑又按李念莪醫宗必讀亦以藥性配四時之氣頗為約當宜參閲考周官食醫曰凡食齊視春時羹齊視夏時醬齊視秋時飲齊視冬時注曰飯宜溫羹宜熱醬宜涼飲宜寒疏曰視猶比也然則藥食之理一也又按徐洄溪曰凡味厚之藥主守氣厚之藥主散此説似是然與素問之旨有差陳氏別説於桂條曰厚實氣味重者宜入治藏及下焦藥輕薄者宜入治頭目發散藥乃與徐意同徐又曰凡藥之寒熱溫涼有歸氣分者有歸血分者大抵氣勝者治氣味勝者治血即溫之以氣補之以味之義徐又曰人身有氣中之陽有血中之陽氣中之陽走而不守血中之陽守而不走凡藥之氣勝者往往補氣中之陽質勝者往往補血中之陽如附子暖血肉桂暖氣一定之理也然氣之陽勝則能動血血之陽勝則能益氣又相因之理也桂氣分藥也而其驗則見於血其義不曉然乎此説亦佳又按洄溪曰凡有毒之藥性寒者少性熱者多寒性和緩熱性峻速入於血氣之中剛暴駁烈性發不支藏府嬌柔之物豈能無害故須審慎之但熱之有毒者速而易見而寒之有毒者緩而難察尤所當慎也斯言足補繆氏之未逮藥性生成本原陳月朋曰形金木水火土真假色青赤黃白黑深淺性寒濕溫涼平急緩味辛酸咸苦甘厚薄體虛實輕重平枯澀輕枯虛薄緩淺假宜治上重潤實厚急深真宜治下其中平者宜治中余隨藏氣所宜處方本草蒙筌徐洄溪曰凡藥之用或取其氣或取其味或取其色或取其形或取其質或取其性情或取其所生之時或取其所成之地各以其所偏勝而即資之療疾故能補偏救弊調和藏府深求其理可自得之神農本草百種録按月朋説猶欠切實姑存之蓋百種録每品分氣味形色為解多所發明其丹砂條曰甘言味寒言性何以不言色與氣蓋入口則知其味入腹則知其性若色與氣則在下文主治之中可推而知之也蓋隅反之言也又王損庵傷寒準繩汪訒庵本草備要所論與徐説相近然似過鑿今亦存之王曰辨其味察其氣觀其色考其以何時苗以何時花以何時實以何時萎則知其稟何氣而生凡見某病為何氣不足則可以此療之矣汪曰醫之為物各有形性氣質其入諸經有因形相類者如連翹似心而入心荔枝核似睪丸而入腎之類有因性相從者如屬木者入肝屬水者入腎潤者走血分燥者入氣分本天者親上本地者親下之類有因氣相求者如氣香入脾氣焦入心之類有因質相同者如藥之頭入頭干入身枝入肢皮行皮又如紅花蘇木汁似血而入血之類自然之理可以意得也侶山堂類辨有藥性形名論蓋是汪氏之所依據文繁不録又賈九如藥品化義本於陳氏立辨藥八法曰曰體燥潤輕重滑膩干曰色青紅黃白黑紫蒼曰氣羶臊香腥臭雄和曰味酸苦甘辛咸淡澀此四者乃天地産物生成之法象必先辨明以備參訂日形陰陽木火土金水曰性寒熱溫涼清濁平曰能升降浮沉定走破曰力宣通補瀉滲斂散此四者藉醫人格物推測之義理而後區別以印生成是也最覺冗雜又按古之論藥特言氣味而後世踵事加精以論生成本原其理亦不可易然諸説不一難得適從今更加詳酌竊為之辨曰藥之所以有寒熱溫涼與有毒無毒之性皆莫不本於氣味形色此氣字與經文氣味之氣不同所謂氣者氣臭是已雖香焦腥臊腐五氣之分大抵藥之取用芳香與葷臭二者能有所歸矣芥歸鼻蓼葉歸舌蔥實歸目薤歸於骨韭歸心葫歸五藏蒜歸脾腎並出菜部黑字所謂形者形質是也重能鎮墜而輕者不必上行潤能滋液而枯者不必燥濕矣如五色則尤多不可拘者然五藏相適或有不可誣者更有如黑能止血之類蓋五味之用為最多焉要之何物不具存氣味形色但其所長有在氣者有在味者有在形者有在色者如沉麝之於氣甘棗之於味鉛丹鐵粉之於形紅花蘇木之於色是也有所在不一者如桂枝之溫中發表在味與氣地黃之補血填精在味與質之類是也且味有厚薄氣有和烈而氣味形色相兼不均所謂同一熱藥而附子之熱與乾薑之熱迥乎不同同一寒藥而石膏之寒與黃連之寒迥乎不同者未始不本於此理此乃百藥所以各異其用也又按陳鶴溪三因方論藥有功能氣味性用其説不確姑摘録於此曰敷和彰顯溽蒸清潔淒滄者五氣之德也安魂育神益氣定魄守志者百藥之功也生榮蕃茂豐備緊斂清謐者五氣之化也通潤悅懌輕身潤澤益精者百藥之能也舒啓明曜安靜徑切凝肅者五氣之政也開明利脈滑膚堅肌強骨者百藥之氣也風熱濕燥寒者五氣之令也酸苦甘辛鹹者百藥之味也顧茲氣運與萬物雖種種不齊其如成象效法無相奪倫一一主對若合符契至於勝復盛衰不能相多往來升降不能相無故各從其動而興災變亦不相加也於是有振發銷鑠驟注肅殺凜冽者五氣之變也在藥則有收斂乾焦甜緩斂澀滋滑者百藥之性也散落燔焫霜潰蒼隕冰雪者五氣之眚也在藥則有鼽衄溢汗嘔吐涎湧泄利者百藥之用也德化者氣之祥功能者藥之良政令者氣之章氣味者藥之芳又朱丹溪格致餘論論藥之命名以色形氣質味能時以其非處治之要茲不探入藥性專長徐洄溪曰凡藥性有專長此在可解不可解之間雖聖人亦必試驗而後知之如菟絲之去面皯亦其一端也以其辛散耶則辛散之藥甚多以其滑澤耶則滑澤之物亦甚多何以他藥皆不能去而獨菟絲能之蓋物之生各得天地一偏之氣故其性自有相制之理但顯於形質氣味者可以推測而知其深藏於性中者不可以常理求也故古人有單方及祕方往往以一二種藥治一病而得奇中及視其方皆不若經方之必有經絡奇偶配合之道而效反神速者皆得其藥之專能也藥中如此者極多可以類推本草百種録按藥之專長顯於形質氣味者如茵陳之治黃香薷之治暍之類是也程云來金匱直解曰意不盡言言不盡意者藥性也顧焉文本草匯箋曰藥之治病嘗有不可解者原不必強解之闕之可也並與洄溪之意符矣洄溪又曰凡物精華所結者皆得天地清粹之氣以成而穢濁不正之氣不得干之故皆有解毒之功其非精華所結而亦能解毒者則必物性之相制或以毒攻毒也此説亦當仍附之一藥兼主陶隱居曰藥性一物兼主十餘病者取其偏長為本本草黑字按一物固不宜有數性斯語片言居要故王海藏既表章之更據唐本草序例考之則其意若謂藥有偏於治中風者有偏於治傷寒者名有所偏主觸類長之以主十餘病然病雖一而其證不均倘啻云治某病則淺學無所下手殆為不便變通故陷居又曰藥之所主止説病之一名假令中風乃有數十種傷寒證候亦有二十餘條更復就中求其體例大體歸其始終以本性為根宗繇是觀之藥之為物氣味相藉必有一定不移之本性於是其功乃有偏長擴而充之則兼主十餘病其理昭然矣唯每藥之下白字黑字俱蘊其祕豈古人識識相因故敘事約雅意在言外者乎如麻黃苦溫其功發陽故能治邪氣表壅亦能治肺冷喘咳亦能治水濕外實黃耆甘溫其功托陽故能治虛勞不足亦能治癰疽膿潰亦能治濕邪黏滯之類其所主雖多端要其指歸則一蓋配合之宜轉輾活用皆本於一定之本性而已仲景用藥理必如此古本草之旨亦復不外乎此矣先兄紹翁有見於斯深究古聖之微意著藥雅一書以闡揚兼主之祕為後學變通之法門惜其稿未完而沒愚有志補續不能也蘇東坡書篆髓後曰余嘗論學者之有説文如醫之有本草雖草木金石各有本性而醫者用之所配不同則寒溫補瀉之效隨用各別可謂知言矣又按聖濟經曰物各有性性各有材材各有用聖人窮天地之妙通萬物之理其於命藥不特察草石之寒溫順陰陽之常性而已以謂物之性有盡也制而用之將使之無窮物之用有窮也變而通之將使之無窮夫唯性無盡用無窮故施於品劑以佐佑斯民其功用亦不一而足也吳氏注曰溫涼寒熱物之性也可以去邪御疾性之材也因其材而施於治療之際材之用也此説於兼主之義亦足互發聖濟又曰有因其性而為用者有因其用而為使者有因其所勝而為制者其類不同然通之皆有權用之皆有法也亦系得理之言更舉諸僻藥以示其例今不具録功用大體陳藏器曰藥有宣通補泄輕重澀滑燥濕此十種者是藥之大體而本經都不言之後人亦所未述遂今調合湯丸有昧於此者至如宣可去壅即薑橘之屬是也通可去滯即通草防己之屬是也補可去弱即人參羊肉之屬是也泄可去閉即葶藶大黃之屬是也輕可去實即麻黃葛根之屬是也重可去怯即磁石鐵粉之屬是也澀可去脫即牡蠣龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也只如此體皆有所屬凡用藥者審而詳之則靡所遺失矣本草掌禹錫等引本草拾遺按禹錫等曰謹按徐之才藥對孫思邈千金方陳藏器本草拾遺序例如後而其首節千金方論處方引藥對第二節至第九節即千金文仍知第十節説藥之大體第十一節論五方之氣即是陳氏之言無可復疑寇氏引為陶隱居誤不待辨至本草綱目則以首節為拾遺以第十節為藥對其失在不撿千金近世諸家一踵綱目之陋稱以徐之才十劑仍附訂於此按陳氏所説乃藥之大體而不是合和之義故列於斯至聖濟經添以劑字而成聊攝明理論稱為十劑河間戴人並宗其義於是七方十劑遂印定後人眼目矣然諸家所演亦概不外於功用故並附載之從其朔也又按李瀕湖曰去閉當作去實去實當作去閉此説不必又曰濕當作潤又以石英為潤藥則偏矣古人以服石為滋補故爾為是今更審之通劑滑劑燥劑俱是利水一途而分之為三未詳其意湧吐一法別無其目河間隸之宣劑然與薑橘之屬性類殊異此他猶有可議者要之陳氏之言本不足為典型而後人遵守或補續之或回護之無敢置辨者未知其果何意也吳禔曰五藏之氣欲通而不閉也故鬱而不散則為壅壅得宣而發故必宣劑以散之如否滿之類是也胃滿則腸虛腸滿則胃虛更滿更虛是為平氣否滿不通則其氣無自而升降矣宣劑以散之豈不宜哉五藏之氣欲運而不止也故留而不行則為滯滯得通而達故必通利以行之如水病痰癖之類是也水生於腎病流於體痰因於飲癖聚於胃水病痰癖則其氣無自而流轉矣通劑以行之豈不宜哉氣弱而不勝其食飲形羸而不見其充盈若此之類不足為弱也必補劑以扶之則不足者壯矣支滿膈寒腹為䐜脹浮澀相搏為脾約若此之類有餘為閉也必泄劑以逐之則有餘者卻矣實則氣壅者外閉而中滿如汗不發而腠密八風客於玄府也邪氣勝而中蘊五氣傷而淫勝也若此者輕劑以揚之則實者泄矣怯則氣浮者本虛而未盛如神失守而驚悸則心不持而恐懼乘之氣上厥而癲疾則陽不降而首疾作矣若此者重劑以鎮之則怯者寧矣滑則氣脫者內耗而外越如開腸洞泄則風傷於腸胃便溺遺矢則腸虛而不制若此者澀劑以收之則滑者止矣澀則氣著者其氣附而不散如乳難而不下內祕而不通若此者滑劑以利之則澀者決矣濕主土土生脾濕漬於藏氣浮於四肢腹大而體重津竭而少氣是為濕氣淫勝腫滿脾濕之病若此者治以燥劑所以除其濕也或從汗出或從嘔吐或消渴水道數利或便難駃藥數下是為津耗為枯五藏痿弱營衛涸流之病若此者治以濕劑所以潤其燥也凡此十者治病之成法也舉此成法變而通之所以為治病之要以此為要則推而廣之以致其詳萬舉萬當之劑也聖濟經注按十劑諸説頗繁前卷間摘入之吳氏此説為河間所據而殆得其要仍拈於此又陳遠公本草新編亦有詳論沈芊緑著要藥分劑十卷以十劑分類強以諸藥排列又按寇宗奭補寒熱二劑曰如寒可去熱大黃朴消之屬是也如熱可去寒附子桂之屬是也繆仲淳增升降二劑曰寒熱二劑攝在補瀉義不重升降者治法之大機也經曰高者抑之即降之義也下者舉之即升之義也而陳遠公則並二家辨駁之極為鄭重沈芊緑亦曰十劑中如宣輕則兼有升義瀉滑則兼有降義且諸藥性非升即降或可升可降或升多降少或升少降多別無不升不降專為宣通等性者則升降二字可以概群藥不得另立二門次於十劑後云云考王啓玄曰高者抑之制其勝也下者舉之濟其弱也然則下泄鎮墜及降氣之法皆可謂之抑也陽氣虛陷不振者與以調補而使其勝發者即是舉之也此外何自有升降者耶且升降之説古典所未言實藍本於潔古而如雲每藥必有升降則尤不免牽湊蓋繆氏之增沉氏之辨亦均非通論也又徐思鶴增為二十四劑既載於第三卷賈九如藥品化義景三陽嵩崖尊生書並有添立八劑寒可去熱熱可去寒雄可表散鋭可下行和可安中緩可制急平可主養靜可制動是也可謂贅設矣又按王中陽養生主論曰大抵百藥之性不出溫涼寒熱藥體則不過浮沉澀滑在人用之如何耳醫之為義上焦之病宜沉而降之中焦之病或升而發之故滑者澀之澀之滑之此自一家言姑附存之引經報使之謬趙敬齋曰藥之功效有治病之多者有治病之少者湯液集要分其藥為太陰經藥某藥為少陰經藥層見而疊出其如黃蘗人參皆言五藏川牛膝鼠黏子皆助十二經如此治病之多者不可數計若拘繫經脈分定陰陽則治一而不能治二治此而不能治彼刻舟膠柱性無變通又豈能治人之病哉儒醫精要徐洄溪曰蓋人之氣血無所不通而藥性之寒熱溫涼有毒無毒其性亦一定不移入於人身其功能亦無所不到豈有其藥止入某經之理即如參耆之類無所不補砒鴆之類無所不毒並不專於一處也所以古人有現成通治之方如紫金錠至寶丹之類所治之病甚多皆有奇效蓋通氣者無氣不通解毒者無毒不解消痰者無痰不消其中不過略有專宜耳至張潔古輩則每藥注定云獨入某經皆屬附會之談不足徵也源流論按古之治病或本之經絡然經絡者五臟六腑之氣所以周流於外故治病之在某經某絡者必治各藏各府而自已況於病不必專屬一經一絡乎此所以藥之不可分經絡而古本草之不敢言及也蓋引經報使之説出而本草之學自此大變如李瀕湖其釋性用頗為精審而習聞所囿不能脫其窠臼學者不無遺憾焉敬齋之辨稍屬曖昧而洄溪則斷然以為附會之談何其識見之卓也藥宜精擇陶隱居曰衆醫都不識藥惟聽市人市人又不辨究皆委採送之家採送之家傳習造作真偽好惡並皆莫測所以鍾乳醋煮令白細辛水漬使直黃耆蜜蒸為甜當歸酒灑取潤螵蛸膠著桑枝蜈蚣朱足令赤諸如此等皆非事實俗用既久轉以成法非復可改未如之何本草黑字羅謙甫曰至元庚辰六月中許伯威五旬有四中氣本弱病傷寒八九日醫者見其熱甚以涼劑下之又食梨三四枚傷脾胃四肢冷時昏憒請豫治之診其脈動而中止有時自還乃結脈也亦心動悸吃噫不絶色青黃精神減少目不欲開踡臥惡人語豫以炙甘草湯治之成無己曰補可去弱人參大棗甘補不足之氣桂枝生薑辛益正氣五藏痿弱營衛涸流濕以潤之按湯液本草作濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心加桂枝人參急扶正氣減生地黃恐損陽氣銼一兩按湯液本草一兩劑服之不效豫再思脈病對莫非藥陳腐而不效乎再於市鋪選嘗氣味厚者再煎服之其病減半再服而愈凡藥昆蟲草木生之有地根葉花實採之有時失其地性味少異失其時氣味不全又況新陳不同精粗不等倘不擇用用之不效醫之過也內經云司歲備物氣味之專精也修合之際宜加意焉衛生寶鑑按此按或引為東垣然至元庾辰在東垣去世之後仍知其誤按經有陰乾暴乾採造時月生熟土地所出真偽陳新並各有法而隱居所演其説甚詳所拈此語當今醫人亦皆蹈其弊豈何可不加思乎謙甫治驗實後學之龜鑑故同學王海藏既舉之湯液本草其確可知矣如六陳之説及云大黃木賊荊芥芫花之類亦宜陳久者姑闕其疑已孫真人曰古之醫者自解探取陰乾曝乾皆悉如法用藥必依土地所以治十得九今之醫者但以診脈處方不委採藥時節至於出處土地新陳虛實一皆不悉所以治十不得五六者實由於此千金方按此説原於徐之才亦出千金採藥時月陶隱居有説而沉存中夢溪筆談謂為未當文繁不録宜相照看又按李瀕湖於香附子條曰此乃近時日用要藥而陶氏不識諸注亦略乃知古今藥物興廢不同如此則本草諸藥亦不可以今之不識便廢棄不收安知異時不為要藥如香附子者乎此説良是然藥之後出者固多而日用要藥如香附子者不過僅僅數種近人有好用僻藥奇品者蓋在瑣末小疾則或用得效至內外傷大患則白字黑字諸藥既已盡之苟徒從事於難得之草石難知之蟲魚吾恐其誤生命者不鮮矣藥品生熟傅復慧曰藥之生熟補瀉在焉劑之補瀉利害存焉蓋生者性悍而味重其功也急其性也剛主乎瀉熟者性淳而味輕其功也緩其性也柔主乎補補瀉一差毫釐千里則藥之利人害人判然明矣如補藥之用制熟者欲得其醇厚所以成其資助之功瀉藥制熟者欲去其悍烈所以成其攻伐之力用生用熟各有其宜實取其補瀉得中毋損於正氣耳豈為悅聽美觀而已哉何今之庸醫專以生藥餌人夫藥宜熱而用生生則性烈藏府清純中和之氣服之寧無損傷故經生則性瀉性瀉則耗損正氣宜熟豈可用生又有以生藥為嫌專尚炮製稱奇夫藥宜生而用熟熟則其性緩藏府鬱滯不正之氣服之難以驅逐故藥熟則性緩性緩則難攻邪氣宜生豈可用熟審視瑤函按此説稍得當蓋仲景於附子治表用熟治里用生即是悍淳緩急之別而非以補瀉分者如大黃酒洗者即因以添力也然則生熟之用其辨不一宜子細玩索焉韓飛霞醫通曰標病攻擊宜生料氣全力強本病服餌宜制煉調劑大成此傅氏所本而似為概論製藥徐洄溪曰製藥之法古方甚少而最詳於宋之雷斆後世製藥之法日多一日內中亦有至無理者固不可從若其微妙之處實有精義存焉凡物氣厚力大者無有不偏偏則有利必有害欲取其利而去其害則用法以制之則藥性之偏者醇矣其制之義又各不同或以相反為制或以相資為制或以相惡為制或以相畏為制或以相喜為制而製法又復不同或制其形或制其性或制其味或制其質此皆巧於用藥之法也古方製藥無多其立方之法配合氣性而桂枝湯中用白芍亦即有相制之理故不必每藥制之也若後世好奇眩異之人心求貴重怪僻之物其製法大費工本以神其説此乃好奇尚異之人造作以欺誑富貴人之法不足憑也惟平和而有理者為可從耳源流論按芍藥古無赤白之辨洄溪白芍之説非是陳月朋曰凡藥製造貴在適中不及則功效難求太過則氣味反失火制四有煅有炮有炙有炒之不同水制三或漬或泡或洗之弗等水火共製造者若蒸若煮而有二焉餘外制雖多端總不離此二者匪故巧弄各有意存酒製升提薑製發散入鹽走腎藏仍仗軟堅用醋注肝經且資住痛童便制除劣性降下米泔制去燥性和中乳制滋潤回枯助生陰血蜜制甘緩難化增益元陽陳壁土製竊真氣驟補中焦麥麩皮製抑酷性勿傷上膈烏豆湯甘草湯漬曝並解毒致令平和羊酥油豬酥油塗燒咸滲骨容易脆斷有剜去瓤免脹有抽去心除煩大概具陳初學熟玩本草蒙筌按玉函經曰凡草木有根莖枝葉皮毛花實諸石有軟硬消走諸蟲有毛羽甲角頭尾骨足之屬有須燒煉炮炙生熟有定一如後方順方是福逆之者殃又或須皮去肉或去皮須肉或鬚根去莖又須花須實依方揀採治削極令淨潔然後升合稱兩勿令參差又千金方論市上雇人搗合之弊曰塵埃穢氣入藥中羅篩粗惡隨風飄揚衆口嘗之衆鼻嗅之藥之精氣一切都盡與朽木不殊並是合和之總訣而序例所舉修治諸説皆絮劑之要領也如雷公炮炙多系煩瑣適用不便又宋人方書如雞峰普濟方本事方十便良方之類間載炮製之法學者宜參互考究焉又按製藥字面如㕮咀陶隱居所謂皆細切之較略令如㕮咀者是也先兄紹翁曰㕮哺古文同猶父與甫通許氏説文云哺咀也咀含味也而無㕮字此説與段若膺説文注相符矣仲景鄉語云炒作熬是劉河間説見宣明論櫟蔭府君以為本於揚雄方言又備預百要方修合法所舉其説稍詳曰炮者置藥於煻灰中轉轉令微拆而用或以濕紙裹入煻灰令熱通而用炒者置藥於器中火上熱令香氣出或令色黃或焦黑熬者置藥於器中用小水逼干於火上或令色黃或至赤黑煨者用生藥入火煨之亦以濕紙裹而煨之焙者高置火上令乾也爁者與炒同也凡藥不云炮炙者皆洗去泥土或日乾或焙乾或陰乾切者斷切而用銼者細切而用或有粗銼者又李念莪本草通玄曰煅則通紅炮則煙起炒則黃而勿焦烘與焙同燥而不黃今詳如炙以物舉於火上而燔之也燎燒去毛也泡猶洗濯也疱與淘同義之類二書所漏亦間有之須考索補足也藏藥貯擬法孫真人曰存不忘亡安不忘危大聖之至教求民之瘼恤民之隱賢人之用心所以神農鳩集百藥黃帝篡録針經皆備預之常道也且人疴瘵多起倉卒不與人期一朝嬰已豈遑知救想諸好事者可貯藥藏用以備不虞所謂起心雖微所救惟廣見諸世祿之家有善養馬者尚貯馬藥數十斤不見養身者有蓄人藥一錙銖以此類之極可愧矣貴畜而賤身誠可羞矣傷人乎不問馬此言安用哉至如人或有公私使命行邁邊隅地既不毛藥物焉出忽逢瘴癘素不資貯無以救療遂拱手待斃以致夭歿者斯為自致豈是枉橫何者既不能深心以自衛一朝至此何嘆惜之晚哉故置藥藏法以防危殆云爾石藥灰土藥水藥根藥莖藥葉藥花藥皮藥子藥五穀五果五菜諸獸齒牙骨角蹄甲皮毛尿屎等藥酥髓乳酪醍醐石蜜沙糖飴糖酒醋膠面糵豉等藥上件藥依時收採以貯藏之蟲豸之藥不收採也稱斗升合鐵臼木臼絹羅紗羅馬尾羅刀砧玉槌瓷鉢大小銅銚鐺釜銅鐵匙等上合藥所須極當預備凡藥皆不欲數數曬曝多見風日氣力即薄歇宜熟知之諸藥未即用者候天大晴時於烈日中曝令大幹以新瓦器貯之泥頭密封須用開取即急封之勿令中風濕之氣雖經年亦如新也其丸散以瓷器貯蜜蠟封之勿令泄氣則三十年不壞諸杏仁及子等藥瓦器貯之則鼠不能得之也凡貯藥法皆須去地三四尺則土濕之氣不中也千金方又曰夫尋方學之要以救速為貴是以養生之家須遇合成熟藥以備倉卒之急同上按真人之言深切周詳洵醫家之模範也徐洄溪亦有論曰其丸散有非一時所能合者倘有急迫之疾必須丸散俟丸散合就而人已死矣惟醫家合之留待當用者用之不終棄也又有不常用不易得之藥儲之數年難遇一用藥肆之中因無人問則亦不備惟醫者自蓄之乃可待不時之需耳云云蓋本諸真人也又時賢産經治橫逆難産催生鉛丹方後曰上譬如停水滅火積年無用偶爾不虞乃救一時之急也可謂能近取譬矣
