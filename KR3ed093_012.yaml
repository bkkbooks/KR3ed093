body:
  text: 卷十二煮藥總說沉存中曰古之飲藥者煮煉有節飲啜有宜藥有可以久煮有不可以久煮者有宜熾火有宜溫火者此煮煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也良方序病必擇醫治必擇藥臨煎造制切在恭誠宜令親信至意心明者煎造忖度最為的確煎藥銚器除油垢腥穢量水盞器大小斟酌用深小淨銚內下新淨甜水藥末引物一切都足浸勻後詣火上慢慢煎熬合得分數攪括周傍勿令迸轉藥熟用稀疏紗絹濾去滓取汁施圓端效方按湯液本草東垣用藥心法內照圖並同然此為詳李瀕湖曰凡服湯藥雖品物專精修治如法而煎藥者鹵莽造次水火不良火候失度則藥亦無功觀夫茶味之美惡飲味之甘餲皆繫於水火烹飪之得失即可推矣是以煎藥須用小心老成人以深罐密封新水活火先武后文如法服之未有不效者本草綱目徐洄溪曰煎藥之法最宜深講藥之效不效全在乎此夫烹飪禽魚羊豕失其調度尚能損人況藥專以之治病而可不講乎其法載於古方之末者種種各殊如麻黃湯先煮麻黃去沫然後加余藥同煎此主藥當先煎之法也而桂枝湯又不必先煎桂枝服藥後須啜熱粥以助藥力又一法也如茯苓桂枝甘草大棗湯則以甘瀾水先煎伏苓如五苓散則以白飲和服服後又當多飲暖水小建中湯則先煎五味去渣而後納飴糖大柴胡湯則煎減半去渣再煎柴胡加龍骨牡蠣湯則煎藥成而後納大黃其煎之多寡或煎水減半或十分煎去二三分或止煎一二十沸煎藥之法不可勝數皆各有意義大都發散之藥及芳香之藥不宜多煎取其生而疏蕩補益滋膩之藥宜多煎取其熟而停蓄此其總訣也故方藥雖中病而煎法失度其藥必無效蓋病家之常服藥者或尚能依法為之其粗魯貧苦之家安能如法制度所以病難愈也若今之醫者亦不能知之矣況病家乎源流論按說文曰煮享也煮煮或從火又曰煎熬也方言曰凡有汁而干謂之煎然則煮也者投物於水火以熟之之名煎也者火以干汁之名也古方於湯藥則曰煮去滓則曰煎如柴胡瀉心等湯可以見焉有物而熬盡其汁亦曰煎如龜甲煎丸可以見焉其義與說文合宋以來於湯藥一用煎字甚失古義矣枳實梔子湯有空煮文亦足知煮之義金匱百合諸方用煎字然外臺引作煮字又古方有名煎者系煎煉之謂說見於第九卷中張景嶽命湯藥以煎可謂謬矣又按主藥煮法洄溪之說為佳更審經方自有二義蓋藥氣味薄者倘淡煮之則力不純故葛根茯苓之類以為主藥則必先煮之氣味厚者倘濃煮之則勢必慢故大黃芒硝之類以為主藥則必後內之猶是利湯補湯之別矣又按煮藥器唐恕齊原病集曰銀者為上磁者次之尤生洲壽世青編曰必用砂銚瓦罐如富貴家淨銀之器煎之更妙切忌油穢腥氣銅錫鐵鍋或煎過他藥者必滌潔淨器口用紙蘸水封之煮藥水火陶隱居曰凡煮湯欲微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為準按千金此下曰皆絞去滓而後酌量也蓋本隱居肘後方序然則利湯欲生少水而多取汁按千全曰為病須快利所以少水而多取汁補湯欲熟多水而少取汁按千金曰為病須補益所以多水而少取汁好詳視之不得令水多少用新布兩人以尺木絞之澄去垽濁紙覆令密溫湯勿令鎗器中有水氣於熟湯上煮令暖亦好服湯寧令小沸熟易下冷則嘔湧本草黑字若合治湯藥當取井花水極令潔淨升斗勿令多少煮之調和一如其法玉函經凡煮藥用遲火火駛藥力不出盡當以布絞之綿不盡汁也同上危達齊曰汁下之藥每服煎至八分對病藥煎至七分滋補藥煎至六分不可極干亦不可猛火驟乾恐傷藥力得效方吳茭山曰煎藥要知補藥利藥行經行氣藥而用水多少若煎補藥以十分之水煎取四分之藥若利藥以十分之水煎取六分之藥若行經行氣脾胃等藥只宜時取活人心統按仲景煮法不一大約煮減半以上隱居所謂用水一斗煮取四升者其義相合蓋久煮則藥性和利也利補異制亦是一說仲景方桂枝加芍藥生薑人參新加湯及炙甘草湯俱是補劑而較他湯最濃煮其理可見矣如外臺療瘧醇醨湯乃系截藥非可常論者也深師醇醨湯生薑烏梅甘草桂心常山蘘荷根以水六升煮取一升曰醇未發前須頓服更以水三升煮取一升日醨至發不斷復頓服又引備急有桂廣州法醇醨湯用大黃甘草常山宜閲外臺古今録驗療水咳逆氣白前湯方後云上四味切以水一斗內藥刻志水度復加水七升微火煎令至刻去滓次內藥七種云云又近效五加酒以木度深淺與水平剋之云云按此甚便宣仿火候則仲景但於桂枝湯云微火煮此隅反之辭而玉函隱居並祖其意至後世諸家稍分條例今舉其一二吳仁齊傷寒蘊要曰若發汗之藥必用緊火煎取濾清通口服之若攻下之藥亦緊火煎下大黃朴消俱有次第須溫服若補中溫中之藥宜漫火煎服之若陰寒病急者亦宜緊火急煎服之李念莪本草通玄曰補藥須封固文火細煎利藥宜露頂武火速煎尤生洲壽世青編曰如煎探吐痰飲之劑當用武火取其急速而發吐之也此數說或有理要好行小慧者已又按煮藥所用水火靈樞有流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪而仲景有甘爛水潦水泉水東流水蓋皆取熟淡不助里飲陳藏器千里水及東流水說宜考又有清漿水殆取性涼解熱也朱丹溪本草衍義補遺宜考如其他諸方當從玉函用井華水為妙然或有難遽辨故吳仁齊傷寒蘊要曰取新汲井水若有鹹味苦鹹者皆不可用此說為是又儒門事親有水解一篇文繁不録又梶原性全萬安方氣病中引森立天可用方人參湯煮法曰要用勞水陳蘆不然則水強火盛藥力不出也性全更舉活人書七味蔥白湯為徵云不獨此藥諸煮湯法皆須要弱水微火也虛勞傷寒産婦老人小兒氣力微者尤可用勞水此說亦是又本草綱目曰火用陳蘆枯竹取其不強不損藥力也桑柴火取其能助藥力烰炭取其力慢櫟炭取其力緊溫養用糠及馬屎牛屎者取其緩而能使藥力勻遍也藥有別內湯中陶隱居曰凡湯酒膏中用諸石皆細搗之如粟米亦可以葛布篩令調並以新綿別裹內中其雄黃硃砂輩細末如粉凡湯酒中用大黃不須細銼作湯者先以水浸令淹浹密覆一宿明旦煮湯臨熟乃內湯中又煮兩三沸便絞出則勢力猛易得快利凡湯中用麻黃皆先別煮兩三沸掠去其沫更益水如本數乃內余藥不爾令人煩芒硝飴糖阿膠皆須絞湯畢內汁中更上火兩三沸煬盡乃服之本草黑字甄氏曰蜜臘膏髓類者皆成湯內煬令和調也又合湯用血及酒者皆臨熟內之然後絞取湯也醫心方引録驗方孫真人曰凡湯中用麝香牛黃犀角鹿角羚羊角蒲黃丹砂須熟細末如粉臨服內湯中攪令調和合服之按蒲黃丹砂字宋校本所無今從真本及本草序例引録凡生麥門冬生薑入湯皆切三搗三絞取汁湯成去滓內之煮五六沸依如升數不可共藥煮之也諸湯用酒者皆臨熟下千金方寇宗奭曰本草第一序例言犀角羚羊角鹿角一概末如粉臨服內湯中然今昔藥法中有生磨者有煎取汁者凡諸石雖是湯酒中亦須稍細藥力方盡出效亦速但臨服須澄濾後再上火不爾恐遺藥力不見效本草衍義吳茭山曰凡藥中沉香木香須煎藥熟去渣方磨沉香木香濃汁入藥凡再煎一沸服不可同煎服者慎之活人心統陳月朋曰凡湯中加酒醋童便竹瀝薑汁亦候湯熟絞汁盞內加入便服凡湯中用沉香木香乳香沒藥一切香竄藥味須研細末待湯熟先傾汁小盞調服訖然後盡飲本草蒙筌錢仲陽曰鉤藤久煎便無力俟他藥煎熟十餘沸投入即起頗得力也本草匯言按大黃水漬內湯中千金外臺往往見之傷寒總病論魏炳書後亦有其說且曰內或用竹瀝煎者每四錢按此言粗末藥一服水一盞二分煎至七分下竹瀝三分煎至七分又按炙甘草湯當歸四逆加吳茱萸生薑湯均酒水同煮不臨熟下者又石天基傳家寶有量小不能飲者於服藥之後飲酒幾杯之說外科正宗神授衛生湯後曰病在上部先服藥隨後飲酒一杯病在下部先飲酒一杯隨後服藥以行藥勢亦是一法引藥湯龍溪曰用藥煎煮或用薑蔥取其發散或用棗蓋棗能和百藥之力傷寒解惑論張介石曰酒入藥為引者取其活血行經姜入藥為引者取其發表注凝小棗入藥為引者取其消散開胃大棗入藥為引者取其補血健脾按棗分大小多事殊甚龍眼入藥為引者取其寧心利水燈心入藥為引者取其得睡神歸蔥白入藥為引者取其發散諸邪勿住蓮實入藥為引者取其清心養胃和脾資蒙醫經按藥既配合為方固無須引子之目然宋以來書於每方煮法內必舉其品則欲用其方者亦宜通知其例故拈之於此尤飼鶴醫為讀書記曰兵無嚮導則不達賊境藥無引使則不通病所新病且然況伏邪乎此理之所或然也去滓再煎吳遵程曰去滓再煎者要使藥性合而為一漫無異同並停胃中少頃隨胃氣以敷布而里之未和者遂無不和所以方中既用人參甘草復加生薑大棗不嫌其復全藉胃中天真之氣為斡旋蓋取和之為義耳甘草瀉心湯半夏瀉心湯三湯俱去滓復煎亦同此義以此三瀉心皆治里未和之證故皆取復煎以共行其事之義傷寒分經按此係生薑瀉心湯注文即本於喻西昌傷寒抉疑論小柴胡湯考大小柴胡三瀉心及柴胡桂薑湯旋覆代赭湯並去滓再煎蓋寒熱雜合之劑此法為妙然唯治病冷熱相溷結在一處者倘冷熱異位者不敢再煎詳義見於拙著傷寒論述義許弘內臺方議曰小柴胡湯去滓再煎取其清能入膽之義誤矣藥滓再煮陶隱居曰凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人可當依此用皆應先暴令燥本草黑字按補湯或宜再煮其他概不可用李念莪本草通玄曰藥滓再煮殊非古法味有厚薄氣有輕重若取二煎其厚且重者尚有功力其輕且薄者已無餘味安在其君臣佐使之宜哉考古方唯金匱柴胡飲子再合滓重煮然舊說既疑非仲景方乃足以確李氏之言矣作丸散酒膏法陶隱居曰凡丸散藥亦先切細暴燥乃搗之有各搗者有合搗者並隨方所言其潤濕藥如天門冬乾地黃輩皆先切暴獨搗令偏碎更出細擘暴乾若逢陰雨亦以微火烘火工切之既燥小停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒中不須如此也凡篩丸藥用重密絹令細於蜜丸易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令如丸者凡篩丸散藥畢皆更合於臼中以杵搗之數百過視其色理和同為佳也凡漬藥酒皆須細切生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不必待至酒盡也滓可暴燥微搗更漬飲之亦可散服凡合膏初以苦酒漬令淹浹不用多汁密覆勿泄云晬祖對切時者周時也從今旦至明且亦有止一宿者煮膏當三上三下以泄其熱勢令藥味得出上之使幣幣沸乃下之使沸靜良久乃止寧欲小小生其中有薤白者以兩頭微焦黃為候有白芷附子者亦令小黃色為度豬肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦可酒煮飲之可摩之膏膏滓則宜以傅病止此蓋欲兼盡其藥力故也凡用蜜皆先火煎掠去其沫令色微黃則丸經久不壞掠之多少隨蜜精粗本草黑字按原文更載各藥修治文繁今不具録朱君輔曰員藥法蜜劑每藥一斤用蜜一斤麵糊劑每藥末一斤用面四兩米粉亦如之朱氏集驗方陳月朋曰散研成細末也宜旋制合不堪久留恐走泄氣味服之無效爾本草蒙筌徐思鶴曰凡草藥燒灰為末如華葉柏葉茅根薊根十灰散之類必燒焦枯用器蓋覆以存性若如燒燃柴薪煆成死灰性亦不存而罔效矣古今醫統按華葉疑桑葉李瀕湖曰別有釀酒者或以藥煮汁和飯或以藥袋安置酒中或煮物和飯同釀皆隨方法又有煮酒者以生絹袋藥入壇密封置大鍋中水煮一日埋土中七日出火毒乃飲本草綱目按吳茭山活人心統曰修合丸藥務在制度如法一不如法則用不效譬如造酒得法則味香甜飲之能生精養血快情忘憂造不如法則酒味苦酸飲之則敗胃生痰非惟無益而反有害此篤論也然諸修合劑皆同此理不翅丸藥矣服藥節度病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜本草白字按此引經文猶是前卷七情之例葛仙翁曰按中黃子服食節度曰服治病之藥以食前服之服養生之藥以食後服之吾以咨鄭君何以如此也鄭君言易知耳欲以藥攻病既宜及未食內虛令毒勢易行若以食後服之則藥攻谷而力盡矣若欲養生而以食前服藥力未行而谷驅之以下不得除上作益也醫心方引抱朴子按素問有為後飯之文出腹中論病能論次注曰飯後藥先謂之後飯仲景有先食服之語出桃核承氣湯烏梅丸赤石脂丸赤丸己椒藶黃丸茵陳五苓散方後又桂枝茯苓丸每日食前服一丸並未有食後服之法蓋抱朴子與經相協平旦服出十棗湯空腹服出薯蕷丸亦並非四肢血脈之治晝三夜二之類仲景之意不過使藥氣接續耳要之本草之言宜附之別論汪訒庵醫方集解嘗有疑辭語意缺穩仍不登載利湯欲早宜考後款又按盧紹庵一萬社草馮楚瞻錦囊祕録說食前食後之分稍有可取仍附之盧曰病在上頻而少食後服病在下頓而多食前服此宗東垣宜參次款頻而少者分數口徐徐吞咽急則速過病所頓而多者引滿一吸而盡緩則不及攻病食後腹飽留戀於上食前腹飢迅達於下病在中宮不飢不飽不疾不徐此古法服藥緩急先後次序愚謂食前服者須當緩行幾步體若困憊扶坐良久令人摩揉胸腹食後服者不可遽然行走身雖矍鑠亦宜伏枕片時屏息假寐又於漏下五鼓服藥宿食消融腸胃空虛藥易運行尤為有益馮曰調理脾氣者宜食遠而徐徐服之藥後勿就進食調理腎元者宜食前而頓服多服之藥後便可進食若血食美味更佳蓋助精血發生尤捷耳服藥多少陶隱居曰凡云分再服三服者要令勢力相及並視人之強羸病之輕重以為進退增減之不必悉依方說也本草黑字凡服藥多少要與病人氣血相宜蓋人之稟受本有強弱又貴賤苦樂所養不同豈可以一概論況病有久新之異尤在臨時以意裁之故古方云諸富貴人驟病或少壯膚腠細緻與受病日淺者病勢雖輕用藥宜多諸久病之人氣形羸弱或腠理開疏者用藥宜少聖濟總録修而肥者飲劑豐羸而弱者受藥減褚氏遺書按隱居之說辭約義暢能得仲景之旨大抵仲景之方大劑分服小劑頓服強人多服羸者減用既論於前卷分量條而更有病勢加劇連進數劑不論其人者如桂枝湯若汗不出乃服至二三劑是也有藥與病阻似覺病重則從容施劑以視其安者如桂枝湯若病重者一日一夜服云云是也說詳於第四卷中又古方有殺藥者以意增之之法見千金排風湯後又本草食鹽條圖經引傳信方或遇殺藥人云云此皆進食增減之之謂也又初和甫養生必用方云世人服藥多隻日間服之往往夜間不服致藥力不相接續藥不勝病而冬月夜永尤非所宜凡調理病人當並夜間服藥萬安方引又醫說引醫余論大瀉腹痛暖藥夜服又補藥宜接續既見第七卷中亦是令勢力相及之意也如孫真人後服漸少之言舉在次條恐不可以為模則矣又李東垣用藥心法曰在上不厭頻而少在下不厭頓而多少服則滋榮於上多服則滋補於下此本於至真要大論平氣之道云云者服湯要溫清孫真人曰凡服湯欲得稍熱服之即易消下不吐若冷則吐嘔不下若太熱則破人咽喉務在用意湯必須澄清若濁令人心悶不解中間相去如步行十里久再服若太促數前湯未消後湯來沖必當吐逆仍問病者腹中藥消散乃可進服凡服湯法大約皆分為三服取三升按真本作凡服湯皆分三升為三服宜從然後乘病人穀氣強進一服最須多次一服漸少後一服最須少如此即甚安穩所以病人於後氣力漸微故湯須漸少千金方按湯欲熱本於陶隱居見前水火條須澄清本於玉函經玉函經凡煎藥皆去沫沫濁難飲使人煩詳仲景方皆去滓溫服正是此義但生薑半夏湯小冷服蓋是反治而解毒之藥宜冷飲之者以熱飲則助其毒勢也隱居亦有冷服者暖服者之語而後世其法稍繁如景三陽嵩崖尊生書服藥法則雖殊失蕪雜姑存之以備酌奪曰急服有通口直飲重劑治下部宜之有趁熱連飲輕劑偶劑發汗宜之緩服有趁熱徐徐小飲治肺病宜有不用氣墮津自下治咽喉病宜冷服有寒劑冷服治大熱病宜有熱劑冷服治假熱病宜熱服有熱劑熱服治大寒病宜有寒劑熱服治假寒病宜溫服有補藥溫服取溫補意有平藥溫服病不犯大寒熱者宜空心服有五更空心服病在腎肝宜取其再睡一番藥入腎肝有蚤起空心補下治下宜有空心服後即壓以食治腎恐妨心治命門恐妨肺者宜食後服有食後即服病在胸膈者宜有食遠方服病在中脘者宜或病在胸膈用峻下藥恐飲食方在胃口下早致胸結者亦宜臨臥服有服後正臥病在胸隔素有積者宜有服後左右側臥病在左右肋使藥直至病所有服後去枕臥病在肺及在膈以上者宜一二滾服發散治上病者宜百十滾服溫補治中脘病者宜濃煎服治下部病者宜去頭煎服虛怯病恐不勝藥力者宜巳未午初服於陰中引提陽氣宜補中益氣湯提瘧湯皆是按千金治九漏礬石白朮散後曰病在上側輪臥在下高枕臥使藥流下又陳良甫外科精要引李嗣立曰昔嘗聞一名醫講論凡人遇五更初腎氣必開若一語言咳嗽口唾即腎氣復合遇腎開時進一服平補藥其功效勝尋常服峻補之藥十數服並嵩崖所本又按藥有露宿服者截瘧用最有驗千金治瘧或間日發者或夜發者方後曰銅器中漬藥露置星月下高淨處橫刀其上蓋露者暴露之謂也或用治痢千金治熱毒痢用黃連及三因露宿湯之類或用治濕見續易簡方後集三生飲下或用治腳氣朱氏集驗方五聖散用瓦器盛貯將紗片蓋瓦器口安頓屋上露一宿來早服或用治骨蒸聖惠有柴胡湯皆借天之正氣以勝邪氣者也此本於劉默生證治百問或以霧露之露為說者誤也如魏氏沉附膏蓋以出火毒也出家藏方補益中曰再煎略沸傾出夏月則用冰雪浸極冷服之冬則露一宿服補瀉汗吐湯法陶隱居曰毒利藥皆須空腹補瀉其間自可進粥補闕肘後百一方序孫真人曰凡服利湯欲得侵早凡服補湯欲得服三升半晝三夜一中間間食則湯氣溉灌百脈易得藥力凡服湯不得太緩太急也按真本此一句作若如此則太太須緩不得速急也又須左右仰覆臥各一食頃即湯勢遍行腹中又於室中行皆可一百步許一日勿出外即大益凡服治風湯第一服厚覆取汗若得汗即須薄覆勿令大汗中間亦須間食不爾令人無力更益虛羸千金按華元化曰轉下湯為可早與但當少與勿令大下耳少與當數其間耳千金引蔣孝琬曰凡服補湯者相去遠久服寫湯相去近醫心方引近效婆羅門僧療大風疾方後曰服法患大風者用火為使在室中重作小紙屋子屋子外然火令病人在紙屋中發汗外臺引此術為佳徐洄溪曰發散之劑欲驅風寒出之於外必熱服而暖覆其體令藥氣行於營衛熱氣周遍挾風寒而從汗解若半溫而飲之仍當風坐立或僅寂然安臥則藥留腸胃不能得汗風寒無暗消之理而營氣反為風寒所傷矣通利之藥欲其化積滯而達之於下也必空腹頓服使藥性鼓動推其垢濁從大便解若與飲食雜投則新舊混雜而藥氣與食氣相亂則氣性不專而食積愈頑矣源流論凡煎吐藥湯及調散或用酸米湯或用白湯或用稀來粥須備十餘鍾令病者頓服一鍾即用指探吐藥出再服一鍾亦隨用指探吐藥出再服再吐以順溜快吐為度則頭額身上自有微汗所有病證輕減即為中病不必盡服余藥若過吐之即使病盡除恐損胸中陽氣也醫宗金鑑按探吐又有以篦子者有以箸者有以虀者有以紙撚子者有以叉股及雞羽者有以鵝翎少抹桐油於尖上曬乾者又用吐緊勒肚腹見丹溪心法又用藥吐如下以醋飯止之古方往往謂之吐不止者用之出千金咳嗽中瀉不止者用之出千金妊娠朴消蕩胞湯外臺必效療癖方近效大麝香丸後及本草續隨子條日華子說又諸劑服法互見前卷宜相參服藥不必盡劑楊仁齊曰治寒以溫治熱以涼但中病即止矯枉則過正也蓋涼藥頻施必至於嘔惡沉冷溫藥頻施必至於煩躁哄熱所貴酌量權度一毫無過用焉是為活法直指方唐恕齊曰如當汗當下逐水發吐之劑皆一時攻邪豈宜再服故皆中病而已不必盡劑原病集按此說本於傷寒論可汗吐下篇成聊攝注解曰要在適當不欲過也又曰如承氣湯證云若二服利則止後服又云若一服讝語止更莫復服是不盡劑也嘔家服湯法口噤孫真人曰凡服湯嘔逆不入湯者先以甘草三兩水三升煮取二升服之得吐但服之不吐益佳消息定然後服余湯即流利更不吐也千金方按此法甚驗又本草柿條陳藏器曰火乾者名烏柿人服藥口苦及欲吐逆食少許立止又聖惠開內障眼論曰凡欲下針預向人說忽恐下手疾人驚駭嘔吐云云或吐不定含白梅咽津仍預先合之吐逆盛即難止吳仁齊曰凡嘔而不止者藥內必少加生薑汁一二匙服之最效凡服藥宜徐徐呷下不可急也傷寒蘊要孫臺石曰諸病惟嘔證不能納藥服時欲嘔預備薑湯兼送更以炒鹽二包輪尉喉下至胸多炒頻尉即安簡明醫彀陳飛霞曰大凡嘔吐不納藥食者最難治療蓋藥入即吐安能有功又切不可強灌胃口愈吐愈翻萬不能止豫之治此頗多先將薑湯和土作二泥丸塞其兩鼻使之不聞藥氣然後用對證之藥煎好鮮出澄清冷熱得中止服一口即停之半時之久再服一口又停之良久服二口停之少頃則任服不吐矣斯時胃口已安焉能得吐愚人不知明見其葉藥不納偏以整杯整碗強灌之則一吐傾囊而出又何藥力之可恃乎幼幼成集按生薑半夏湯煮取一升小冷分四服千金治腳氣上入腹腹急上衝胸氣急欲絶半夏湯初稍稍進恐氣衝上格塞不得下小小服通人氣耳並是吳氏所本又曾省翁活幼心書必勝散治小兒大人病中聞藥氣即噁心乾嘔不能療者川白芷銼曬或焙研為細末抄一字及半錢於舌上令其自化或用掌心盛之以舌舐咽云云又按口噤難下藥者或藥尉心胸或搐藥鼻中或楷藥齒齦俟身關開而後內套劑方見於第九卷尉法及導法後小兒服湯法劉通真曰一月以內可與百日同周歲可與二歲同三歲可與四歲同五歲可與六歲同同者謂其多少為一服雖然大約如此更詳其疾之輕重而增減之孫思邈言龍膽調中二湯云兒生一日至七日取一合分三服生八日至十五日取一合半分三服生十六日至二十日取二合分三服生二十日至三十日取三合分三服生三十日至四十日以五合分三服恐五合未得自斟酌上此二方准一日已上四十日以來兒方法具此後欲虛方者宜一準此為率乃至五六歲皆節次加減之不煩重述幼幼新書引萬全方按小青龍加石膏湯方後曰小兒服四合蓋大約言也千金又曰四十日至六十日兒六合為三服六十日至百日兒一服二合半百日至二百日兒一服三合出恆山湯方後升麻湯紫菀湯並同二百日至期歲一服五合出五香連翹湯方後五歲兒服一升二歲服六合治咳逆喘息如水雞聲方五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黃半兩足水為一斗煮取六升半分三服五香枳實湯蓋五歲以下說有異同或隨藥力緊慢者要皆用小量也又按與藥之法古方有以綿著湯中捉綿滴兒口中者千金桂枝湯之類又有傅藥乳頭令兒和乳咽之者肘後千金錢氏等此法甚多又有令乳母服藥者千金耆婆萬病圓之類今俗亦皆為之服丸散酒法若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度本草白字陶隱居曰上本說如此按今藥中單行一兩種有毒物只如巴豆甘遂之輩不可便令至劑爾如經所言一物一毒服一丸如細麻二物一毒服二丸如大麻三物一毒服三丸如胡豆四物一毒服四丸如小豆五物一毒服五丸如大豆六物一丸服六丸如梧子從此至十皆如梧子以數為丸而毒中又有輕重且如狼毒鉤吻豈同附子芫花輩邪凡此之類皆須量宜也同上黑字按寇宗奭曰凡服藥多少雖有所說一物一毒服一丸如細麻之例今更合別論緣人氣有虛實年有老少病有新久藥有多毒少毒逐事斟量不可採此為例但古人凡設例者皆是假令豈可執以為定法此說有理又曰凡散日三者當取旦中暮進之四五服則一日之中量時而分均也肘後百一方序孫真人曰凡丸藥皆如梧桐子大補者十丸為始從一服漸加不過四十丸過亦損人云一日三度服欲得引日多時不闕藥氣漸漬熏蒸五臟積久為佳不必頓服早盡為善徒棄名藥獲益甚少千金方按丸散湯使隱居稱有須酒服者而仲景所用不過三四沸湯服取其溫養酒服取其宣達醫心方引蔣孝琬曰用散和酒服之酒能將藥氣行入人穴中以去邪聖濟總録曰古法服藥多以酒者非特宣通血氣而已亦以養陽也又治漏風四神散方後曰以熱酒一升投之如飲酒不得人用沸湯投之亦得蓋本於備急丸以暖水若酒服白飲服取其適胃漿水服取其清熱是已降至宋元隨證異法不勝枚舉又孫臺石簡明醫彀曰如細丸湯送大丸及末藥先以湯調勻添湯咽下又按古人用丸散欲其黏滯膈胃浸潤為功者服餌之際別自有法丸有噙化既詳於第九卷散有吸咽千金咳嗽門有鍾乳七星散等三方云治下篩作如大豆七聚七星形以小筒吸取酒送下云云宜閲原文有舐吃永類鈐方暴嗽立案散皂角江子半夏杏仁為末每服半錢生薑汁調放手心用舌點舐之立效又喘急中有選奇七七散又醫方集成翻胃此證如水穀並不能下方便集中一方用丁香附子為末於掌中舐吃亦一法也又載有一方今不録又活幼心書速效散治長成小兒因他物成跌著觸損兩目血脹腫痛荊芥薄荷草決明甘草為粗末和半生半炒芝麻等分抄二錢在掌中盛以干吃咀嚼味盡吐去渣三五次即效又必勝散見於前皆宜臨證擇用焉孫真人曰凡服酒藥欲得使酒氣相接無得斷絶絶則不得藥力多少皆以知為度不可令至醉及吐則大損人也千金方按陳月朋本草蒙筌曰藥酒補虛損證宜少服旋取效攻風濕證宜多飲速取效斯言為是服藥不可與食相連凡藥勢與食氣不欲相逢食氣消即進藥藥氣散即進食如此消息即得五藏安和非但藥性之多少其節適早晚復須調理今所云先食後食蓋此義也聖惠方按非但以下數句本本草黑字中語楊遠林曰切不可飲食未久而即服藥服藥未久而即飲食使腸胃中藥食混亂雖靈丹亦難奏效必須兩相調停度量時候方可服藥服後再加之以坐臥安養約有三四時刻或人行四五里之地以伺藥力循行經絡方可飲食兩無妨也雖有不拘時者亦不可連飲食奇效單方按千金服餌法凡人遇風發條中曰湯消即食粥粥消即服湯聖惠蓋本於此又盧紹庵一萬社草曰多飲茶酒湯水譬如酒添水則味淡服藥甫及碗許湯水倍之藥力減矣尤生洲壽世青編曰食不得雜雜則物性或有相反苟能慎之服藥自效並篤論也服藥禁忌陶隱居曰服藥不可多食生葫荽及蒜雞生菜又不可食諸滑物果實等又不可多食肥豬犬肉油膩肥羹魚鱠腥臊等物服藥通忌見死尸及産婦淹穢事本草黑字謝士泰曰凡禁之法若湯有𧢻按即觸字服竟五日忌之若丸散酒中有相違𧢻必須服藥竟之後十日方可飲啖醫心方引刪繁論孫真人曰凡服湯三日常忌酒緣湯忌酒故也千金方又曰凡服藥皆斷生冷酢滑豬犬雞魚油麵蒜及果實等其大實丸散切忌陳臭宿滯之物同上又曰凡餌湯藥其粥食肉菜皆須太熟熟即易消與藥相宜若生則難消復損藥力仍須少食菜及硬物於藥為佳亦少進鹽酢乃善亦不得苦心用力及房室喜怒是以治病用藥力惟在食治將息得力太半於藥有益同上古方逐名下並載禁忌謂如理中丸合忌桃李葫荽大蒜青魚鮓菘菜等物即使服餌者多致疑惑自非單行久服餌者當依此法倉卒治病不必拘忌聖濟總録按隱居真人及醫心方並有某藥忌某物說當參閲備預百要方曰凡服藥通忌生冷油滑生謂不煮熟之物冷謂性冷萵苣蕎麥之類油謂胡麻等滑謂葵蓴之類攻冷又謂體冷之物油又謂膏脂之屬百要方未為當又石天基傳家寶曰或有服藥之人畏其味苦乃以圓眼大棗適口若補藥則無可妨倘發散汗下藥則因甜阻滯不效矣此說為然
