body:
  text: 卷九諸劑概略治內者自內以達外湯體丸散丹之類見於服飲者是也治外者由外以通內膏尉蒸浴粉之類藉於氣達者是也夫湯液主治本乎腠理凡滌除邪氣者於湯為宜傷寒之治多先於用湯者如此醪醴主治本乎血脈凡導引痹郁者於酒為宜風痹之治多專於漬酒者如此散者取其漸漬而散解其治在中久病痼疾劑多以散者理如此也丸者取其收攝而其治在下腹中之病及不可散服者宜用丸也至於成丹則火力烹養有一陽在中之義金石之類多取焉膏取其膏潤以祛邪毒凡皮膚蘊蓄之氣膏能消之又能摩之也尉資火氣以舒寒結凡筋肉攣急頑痹不仁尉能通之也蒸言其氣之熏以發腠理燒地為之所以啓元府也浴言其因於湯浴以泄皮膚而利肌肉也粉則粉密其空隙也聖濟經按林億等千金方凡例曰卒病賊邪須湯以蕩滌長病痼疾須散以漸清當漸漬此古人用湯液煮散之意也今聖濟本諸此而更增本乎腠理語是誤混素問湯液之義蓋此論諸劑差謬不少詳辨於後又醫心方引蔣孝琬論膏酒湯散丸煎次第亦難可信然是古說姑存之曰病有新舊療法不同邪在毫毛直服膏及以摩之不療草日入於孫脈宜服藥酒酒是熟液先走皮膚故藥氣逐其酒勢入於孫脈邪氣散矣不療卅日入於絡脈宜服湯不療六十日傳入經脈宜服散不療八十日入於藏府宜服丸百日已上謂之沉疴宜服煎也考煎謂煎煉之方千金方有風虛雜補酒煎一類外臺祕要有古今諸家煎方聖濟總録曰煎者取其和熟為服食之劑是也又陳月朋本草蒙筌五用曰湯曰膏曰散曰丸曰漬酒有說不確略摘録於後款湯散丸張仲景曰若欲治病當先以湯洗滌五藏六府按千金洗作蕩開通經脈理導陰陽破散邪氣潤澤枯槁悅人皮膚益人氣血水能淨萬物故用湯也若四支病久風冷發動次當用散散能逐邪風濕痹表裡移走居無常處者散當平之次當用丸丸能逐沉冷破積聚消諸堅症進飲食調營衛能參合而行之者可謂上工金匱玉函經按千金亦載是言要疑假託也又中藏經意同而文有異仍注於此曰湯可以蕩滌臟腑開通經絡調品陰陽祛分邪惡潤澤枯朽悅養皮膚益充氣力扶助困竭莫離於湯也圓可以逐風冷破堅症消積聚進飲食舒營衛開關竅緩緩然參合無出於圓也散者能祛風寒暑濕之氣攄寒濕穢毒之邪發陽四肢之壅滯除剪五臟之結伏開腸和胃行腸通經莫過於散也沉存中曰湯散丸各有所宜古方用湯最多用丸散者殊少煮散古方無用者惟近世人為之大體欲達五藏四支者莫如湯欲留膈胃中者莫如散久而後散者莫如丸又無毒者宜湯小毒者宜散大毒者須用丸又欲速用湯稍緩用散甚緩者用丸此大概也近世用湯者全少應湯者全用煮散大率湯劑氣勢完壯力與丸散倍蓰煮散多者一啜不過三五錢極矣比功較力豈敵湯勢然既力大不宜有失消息用之要在良工難可以定論拘也蘇沉內翰良方李東垣曰大抵湯者蕩也去大病用之散者散也去急病用之圓者緩也不能速去之其用藥之舒緩而治之意也用藥法象按玉函所立次第固不得拘沉氏說稍核猶未為盡湯蕩之解誠不過其一端而散散丸緩不無其理然其得名俱取之於體非取之於用也東垣散散之說與漸漬散解之義自不同丸以緩之亦出劉河間七方說中蓋此三物醫人日與周旋而不審其辨豈可也乎今參諸家質之經旨湯之為物煮取精液藥之性味混然融出氣熱完壯其力最峻表裡上下無所不達卒病痼疾無所不適是故補瀉溫涼有毒無毒皆以湯為便所以用湯最多也唯其最峻故大毒之藥功力過烈乃在所畏本草藥不宜入湯酒者多系大毒之品其意可知也散之為物其體也散故直到膈胃而猶有外達之勢不問藥之緊慢欲疏壅閉者尤其所宜其輕浮也故少戀滯之能而性味易竭宜參第十二卷作丸散法條是以力頗劣於湯然比丸為捷故大毒亦稍所畏矣散之屬散者天雄散一方此取抵當病所以收澀之當歸散白朮散亦是調養蓋妊娠喜疏通不喜重滯也要之補方偶有用散要不似湯丸之多矣丸之為物其體也結勢不外達而以漸熔化故其力最緩而祉則取次收效瀉則羈下症癖然大毒難入湯散者丸以用之亟建殊績焉本草經若用毒藥療病先起如黍粟陶隱居一以丸藥為解可見大毒必宜丸藥沉氏亦本於此耳要之湯也散也丸也病各有其對而藥亦各有其宜本草經稱藥性有宜丸者宜散者云云而隱居又舉病有宜服丸者服湯者云云為注則可知彼此相藉而三者之設於是焉立矣又按經中湯之類有如大黃黃連瀉心湯之麻沸湯漬取於疏刷上熱有如走馬湯之熱湯捻取白汁取於急卒便用並是稍緩於煮湯有如十棗湯之煮棗去滓取於剛柔相濟有如大陷胸湯之內甘遂末桃花湯之內赤百脂末俱取於主藥專功矣散之類有如半夏散半夏乾薑散之水煮取干其不戟咽有如薏苡附子敗醬散之水煮取干使藥速效矣丸之類有如抵當丸大陷胸丸下瘀血湯之水煮取於寬猛得中理中丸之沸湯和服亦取於亟效矣凡此之類各莫不有精義存則措施之際不可不慎如藥法也又按素問有湯液醪醴論張景嶽曰湯液者清酒之類先君子曰經既云上古作湯液而又言當今之世必齊毒藥則張說是漢藝文志湯液經法十六卷未知所指何物皇甫士安甲乙經序云伊尹以元聖之才撰用神農本草以為湯液此乃為煮藥之義湯方或有稱飲者先兄紹翕曰醫宗金鑑葉仲堅云飲與湯稍有別服有定數者名湯時時不拘者名飲按千金方蘆根飲子有隨便飲之語是局方縮脾飲等所源也然古方湯飲無甚分別矣又按林億等千金方凡例曰昔人長將藥者多作煮散法蓋取其積日之功今詳千金外臺雖有其方不過僅僅數首而與仲景之方其旨自異龐安常傷寒總病論曰唐自安史之亂藩鎮破扈至於五代天下兵戈道路艱難四方草石鮮有交通故醫家以湯為煮散然則其弊昉於五代而積習至宋盛行矣和劑局方末卷諸湯繫於香竄諸藥為末沸湯點服者蓋煮散之變法也又按東垣又曰細末者不循絡止去胃中及藏府之積氣味厚者白湯調氣味薄者煎之和渣服去下部之疾其丸極大而光且圓治中焦者次之治下焦者極小稠麵糊取其遲化宜至下焦或酒或醋取其收其散之意也凡半夏南星欲去濕者以生薑汁稀糊為丸取其易化也水浸宿炊餅又易化滴水丸又易化煉蜜丸者取其遲化而氣循經絡也蠟丸者取其難化而旋旋取效也此說不純宜參前說且古方丸藥大抵用蜜後世趨便易以糊丸功力殊劣又寇宗奭張子剛並有蠟丸之說張氏為優曰有一等虛人沉積不可直取當以蠟匱其藥蓋蠟能黏逐其病而又久留腸胃間又不傷氣能消磨至盡也出雞峰普濟方又古方中有蜜丸和棗核彈子等大含噙化下以治咳嗽膈噎及胸熱之類病屬上焦者其意在浸潤調治即苦酒湯少少含咽之之例徐洄溪傷寒類方曰內治而兼外治法也又半夏散少少咽之驗之往往得效亦不可不知也醫心方咳嗽中引張仲景大棗丸僧深紫菀丸録驗方大紫菀丸等千金翼方治胸中熱含消丸消渴羊髓煎等外臺所引諸家五膈丸及近效大小便不通含消石本草葶藶條治嗽含膏丸十便良方心腹痛姜骰子瑣碎録骨鯁沙糖和刮牙屑等直指方勞瘵雄黃散濟生方瘰癧皂子丸御藥院方治三種癭方之類不可枚舉宜臨證遴用又按張石頑傷寒纘論曰云圓者如理中陷胸抵當皆大彈丸煮化而和滓服之也云丸者如麻仁烏梅皆用小丸取達下焦也此說誤矣蓋古方皆用丸字宋欽宗諱完其音與丸相近故南宋槧本醫書皆改作圓獨趙開美重刊北宋板傷寒論悉用丸字實為舊面如王是齊百一選方改為元字有曰元者即藥之丸也丸字犯御諱以元字代之此可以證焉又丸藥有名丹者先君子曰蓋以方士多煅煉服餌凡諸石煅煉之物泛然稱之丹後草藥如控誕丹竟無知其所由焉又按皇國製劑轉刷及芳香間用湯泡以代煮煎是取其疏蕩亦便倉卒其法以㕮咀藥內絹袋中麻沸湯擺用俗呼振出藥即三黃湯之遺意徐洄溪注彼方曰此又法之最奇者不煎而取泡又本草引經驗後方曰治嬰兒童子患𤺋豆疾用紫草二兩細銼以百沸湯一大盞泡便以物合定勿令氣漏放如人體溫量兒大小服聖惠方同泡字作沃字滋補之劑多用蜜膏以代蜜丸是取其留戀其法但以細末藥煉蜜和過而已俗呼煉藥宋人療小兒間既見用蓋取適口也錢氏以來有其方中無油脂之品以蜜和如膏故名為某膏此二法者功效不鮮而明以來諸家無敢知者何也酒醴邪之傷人有淺深藥之攻邪有輕重病之始起當以湯液始其微病既日久乃以醪醴治其甚是故病人色見淺者湯液主治其見深者必齊主治其見大深者醪醴主治又有形數驚恐經絡不通病生於不仁者治以醪藥以此見受邪既深經脈閉滯非醪藥散發邪氣宣發血脈安能必愈然則湯液者取其蕩滌邪氣醪醴者取其宣通閉滯凡病始作多以湯液蓋取其蕩滌之功甚於丸散病久日深乃以醪醴其法衆者以夫受邪堅牢取差或遲是故服餌之方用酒醴者十常六七大法醪醴之方冬三月宜用立春後宜止服餌之家不問有疾冬三月宜常得酒藥兩三劑至立春勿服故能使百疾不生又況酒性酷熱主行藥勢所以病人素有血虛氣滯陳寒痼冷偏枯不隨拘攣痹厥之類悉宜常服皆取其漸漬之力也聖濟總録按藥酒昉於仲景紅藍花酒以降其方甚多大抵皆為宣通血脈發揚痼痹之劑矣內經醪醴亦是酒之屬今聖濟始探玉版論要篇文以演其義然上古所作莫知其法則宜存而不論如服餌之方云云以下正是藥酒功用此相混立論須分別看焉大法冬宜服酒至立春宜停本出千金聖濟似以湯液為煎煮湯藥之義膏徐洄溪曰今所用之膏藥古人謂之薄貼按此語不知所據其用大端有二一以治表一以治里治表者如呼膿去腐止痛生肌並托風護肉之類其膏宜輕薄而日換此理人所易知治里者或驅風寒或和氣血或消痰痞或壯筋骨其方甚多藥亦隨病加減其膏宜重厚而久貼此理人所難知何也蓋人之疾病由外以入內其流行於經絡藏府者必服藥乃能驅之若其病既有定所在於皮膚筋骨之間可按而得者用膏貼之閉塞其氣使藥性從毛空而入其腠理通經貫絡或提而出之或攻而散之較之服藥尤有力此至妙之法也故凡病之氣聚血結而有形者薄貼之法為良但制膏之法取藥必真心志必誠火候方到方能有效否則不能奏效至於敷尉吊溻種種雜法義亦相同在善醫者通變之也源流論按經筋篇治口僻以馬膏膏其急者以白酒和桂以塗其緩者仲景曰四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞王函經曰能尋膏煎摩之者亦古之例也又曰膏煎摩之勿使復也華元化曰夫傷寒始得一日在皮當摩膏火灸之即愈千金引然則古之用膏者多矣考之千金外臺大抵外摩遍身及病處又內服之其方一而其用則二陶隱居有可服之膏可摩之膏之語孫真人曰病在外火炙摩之在內溫酒服如棗核許蓋皆是所謂取其膏潤以祛邪毒者已如瘍腫之膏必紙帛攤貼自是一法又按千金五物甘草生摩膏治少小新生肌膚幼弱喜為風邪所中云豬肪煎如膏如彈丸大一枚炙手以摩兒百遍蓋系固表之法又韓飛霞醫通曰八歲以下小兒戒投藥以所宜藥為末香油或水調摩患處使藥氣由毛孔穴絡薰蒸透達此說難從又續醫說稱痘瘡未出預用麻油摩背又稱驚風發搐用竹茹燈心粗末入薑汁少許麻油調勻按摩小兒自額上起直至背心兩手足心數十遍並未試姑存之尉蒸尉闢冷宜蒸尉而不蒸尉則使人冷氣潛伏漸成痹厥不當蒸尉而蒸尉則使人陽氣偏行陰氣內聚皮膚不痹勿蒸尉中藏經因藥之性資火之神由皮膚而行血脈使郁者散屈者伸則尉引為力多矣引取舒伸之義以尉能然血氣形志論曰病生於筋治以尉引王機真藏論曰痹不仁腫痛可湯尉及火灸刺之蓋病生於筋則拘急攣縮痹而不仁則經血凝泣二者皆由外有所感尉能溫之血性得瘟則宣流能引其凝泣也聖濟總録按楊上善太素注曰筋之病也醫而急故以尉引調其筋病也藥布尉之引之使其調也蓋是聖濟所據龐安常曰下利穀道中痛當以熬鹽末尉之或炒枳實末溫尉按以上本於玉函經二味相兼益佳若臍中冷結不可便尉冷氣攻心腹必死須先用藥溫之久而可尉凡臍下冷結成關陰大小便不通服藥雖多不見效以炒鹽尉臍下須臾即通按此法外臺中數見宜參看然關陰已服巴豆甘遂大黃輕粉之類大多即暴通利而損人尤宜詳之也總病論按靈樞壽夭剛柔篇載寒痹藥尉扁鵲治尸厥為五分之尉蓋尉之為用隨病所在散凝寒破結陰故古或與灸代用外臺載岐伯曰灸風者不得一頓滿一百若不灸者亦可以蒸藥尉之灸寒濕者不得一頓滿千若不灸可蒸藥薰之是也又如陳藏器原蠶屎尉偏風及瑣碎録睡中風吹手足或酸或疼或腫用炒熱鹽帕裹之尉微汗俱取之發表也如千金及翼方外臺等尉症諸方皆取之潰堅也如聖濟治氣虛陽脫及傷寒陰厥蔥白尉臍下亦出活人書及衛生家寶考蔥尉法本見時後方經驗祕方治瀉不止用艾木鱉子蛇床子尉俱取之固元陽也如韓祗和治下焦積寒而上焦陽盛難用溫藥用灰包尉臍下醫學綱目引聖濟治中風人口噤或不咽藥用黑豆尉前後心曰用黑豆二三升以青布裹於醋湯鐺內蘸及熱尉前後心並胸膈令風氣散即得藥下或炒鹽醋灰亦得衛生寶鑑治左脅下有積得寒則痛見藥則吐用蔥尉法有治驗其說甚詳景嶽全書治傷寒結胸虛弱不堪攻擊者用蔥頭生薑生蘿蔔罨尉劉松峰說疫病久失下中氣大虧不能運藥名為停藥用此法皆是外假其力以救服藥所不及也又按本草艾條圖經曰中風掣痛不仁不隨並以干艾斛許揉團之內瓦甑中並下塞諸孔獨留一目以痛處著甑目下燒艾一時久知矣此尉法之變者本事方續集疝氣薰方亦稍近宜並考熏蒸陳稟丘曰或問得病連服湯藥發汗汗不出如之何答曰醫經云連發汗汗不出者死病也吾思之可蒸之如蒸中風法熱溫之氣於外迎之不得不汗出也後以問張苗苗云曾有人作事疲極汗出臥單簟中冷得病但苦寒踡諸醫與丸散湯四日之內凡八過發汗汗不出苗令燒地布桃葉蒸之即得大汗於被中就粉傅身使極燥乃起便愈後數以此發汗汗皆出也人性自有難汗者非惟病使其然也蒸之則無不汗出也千金方按經曰陽氣怫鬱在表當解之熏之所謂熏者蓋即蒸也南史載徐文伯治範云其法一與張苗同而崔氏方阮河南蒸法外臺傷寒門引其說最詳又唐書許胤宗傳曰柳太后病風不言名醫治皆不愈脈益沉而噤胤宗曰口不可下藥宜以湯氣熏之令藥入腠理周理即差乃造黃耆防風湯數十斛置於床下氣如煙霧其夜便得語是廩丘所謂蒸中風者而趙虛白風科集驗名方癱風散鎮心散並是遺意也他如陸嚴治血悶殆足稱奇術矣續醫說引仇遠稗史曰新昌徐氏婦病産後暴死但胸膈微熱陸診之曰此血悶也用紅花數十斤以大鍋煮之候湯沸以木桶盛湯將藉病者寢其上薰之湯氣微復進之有頃婦人指動半日遂蘇又崔元亮集驗方治腰腳蒸法亦宜取法須參閲焉出本草牡荊條圖經所引李瀕湖綱目曰蒸法雖妙止宜施之野人云云又本草蔓椒條陶隱居曰可以蒸病出汗也此不舉其法仍附之又得效方曰如用蒸法病得差明年斯時慎莫再作再作或不治矣此蓋系誤記徐治範云預決後二年必死非親驗之言也漬浴澡洗漬浴法所以宣通形表散發邪氣虛邪之傷人初在肌表當以汗解若人肌肉堅厚腠理致密有難取汗者則服藥不能外發須藉湯浴疏其汗空宣導外邪乃可以汗內經所謂其有邪者漬形以為汗是也有因大飲中酒恐毒氣內攻於藏者有服五石發動氣攻於陽者若此之類皆以浴法治之凡欲使邪毒外泄故也聖濟總録按中酒湯漬石發冷水洗浴見千金外臺及徐嗣伯傳並非藥浴之謂今湊合立論者誤矣按經文漬形未審其義玉機真藏論脾風可浴亦莫知何法巢源傷寒候曰病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表洗浴發汗即愈今考古方許仁則有桃柳等三物浴湯見外臺天行病即汗法也聖惠治傳尸骨蒸有沐浴方蓋驅惡風也又療小兒多有用者如千金治傷寒淋浴方七首此不皆汗法治客忤馬通浴方本草治咳嗽生薑沐浴引孫真人嬰孺方治小兒不生肌肉又三歲不能行五參浴湯幼幼新書引小兒直訣治肥體體熱浴體法用烏蛇白礬青黛天麻蠍朱麝桃枝等之類是也又魏桂岩博愛心鑑治痘瘡頂陷有水楊湯用者有功本草引經驗後方小兒疹豆令速出酒沃沸胡荽噴一身是亦漬浴之變法已暖洗生陽宜澡洗而不澡洗則使人陽氣上行陰邪相害不當淋泄而淋泄則使人濕侵皮膚熱生肌體肌內不寒勿暖洗中藏經按本草衍義曰熱湯助陽氣行經絡患風冷氣痹人多以湯泄腳至膝上厚覆使汗出周身然別有藥亦終假湯氣而行也蓋暖洗生陽者得此說而義明矣又本草綱目曰朱真人靈驗篇云有人患風疾數年掘坑令坐坑內解衣以熱湯淋之良久以簟蓋之汗出而愈此亦通經絡之法也時珍常推此意治寒濕加艾煎湯治風虛加五枝按食物本草曰五枝桃柳桑拓槐也或五加煎湯淋洗覺效更速也此說亦有理又考之古方百合病金匱百合洗方卒死壯熱又礬石水煮漬腳中風千金大戟洗湯又方氏家藏方用蛇床子防風等八味淋泄水腫本草引韋宙獨行方水腫從腳起赤小豆煮爛汁漬膝以下又神巧萬全方水氣薰洗法用樟柳赤豆麻黃桑白虛冷御藥院方還童散外固壯陽氣用丁香等十四味水煎少腹已下淋浴又百花散用百花窠等五味水煎淋洗補元陽通血脈又施圓端效方治下元虛冷用椒目桂川烏細辛乾薑水煮泄浴下部之類用淋泄者不一而足又聖惠發背門曰或已潰或未潰毒氣結聚當用藥煮湯淋拓瘡上散其熱毒夫湯水者能蕩滌口滯宣暢血故用湯淋拓也又活人書稱腳氣用湯淋洗者醫之大禁驗之果然導法導水諸以外治內法陽明病自汗出或發汗小便自利者此為津液內竭雖大便硬而無滿痛之苦不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則用蜜煎潤竅滋燥導而利之或土瓜根宣氣通燥或豬膽汁清熱潤燥皆可為引導法擇而用之可也醫宗金鑑按王損庵傷寒準繩曰凡多汗傷津或屢汗不解或尺中脈遲弱元氣素虛人便欲下而不能出者並宜導法但須分津液枯者用蜜導邪熱盛者用膽導濕熱痰飲固結薑汁麻油浸栝樓根導惟下傍流水者導之無益非諸承氣湯攻之不效以實結在內而不在下也至於陰結便閉者宜於蜜導中加薑汁生附子末或削陳醬姜導之凡此皆善於推廣仲景之法者矣此說稍詳然竊以未然何則不論何病津液內竭燥屎至直腸而乾澀不出者蜜煎之潤能從其勢而利導之已土瓜根豬膽汁亦是潤品其理無二實皆是潤竅之法非與中氣有情者如痰飲陰結各異其藥之說殆是紙上之談不善於推廣仲景之法者矣如生薑兌外臺崔氏姜兌法削生薑如小指長二寸鹽塗之內下部中立通蒜導千金治脹滿不通方獨頭蒜燒熟去皮綿裹內下部中氣立通云云之類雖是古方亦不可適用又醫學綱目引田氏曰生下不大便治法先以硬蔥針紝入肛門此自一法蔣自了曰大便結在廣腸蜜煎法豬膽導法最妙若結在大腸中非導法之可能達也用皂礬四兩於淨桶中將滾湯一桶傾入令病人坐淨桶上薰之使藥氣直入穀道良久結糞自化而通矣醫意商按聖濟治傷寒後大便不通並吃轉瀉藥後腹脅轉脹不通利方鹽半斤熬令色變用醋漿水二升煎五七沸下鹽攪勻瀉入盆中看冷暖得所令病人盆中坐淋浴少腹須臾即通又治大小便不通有蓮葉蔥生薑蒸下部方自了豈本於此等方歟又陶節庵殺車槌法治傷寒裡熱服轉藥後用鹽炒麩皮尉其腹上亦本諸聖濟然可謂多事矣又按本草綱目曰按小便不通納藥於竅中亦導法之類也考此法肘後用雌黃曰若小腹滿不得小便方細末雌黃蜜和丸取如棗核大內溺孔中今半寸亦以竹管注陰令痛吹之通千金用蔥葉曰凡尿不在胞中為胞屈僻津液不通以蔥葉除尖頭內陰莖孔中深三寸微用口吹之胞脹津液大通便愈按此方本出都邑師治疾方救急用鹽末外臺引曰主小便不通方取印成鹽七顆搗篩作末用青蔥葉尖盛鹽末開便孔內葉小頭於中吹之令鹽末入孔即通非常之效衛生寶鑑用豬胞原文稍繁今不録本草綱目曰蘄有一妓病轉脬小便不通腹脹如鼓數月垂死一醫用豬脬吹脹以翎管安上插入陰孔捻脬氣吹入即大尿而愈此法載在羅天益衛生寶鑑中知者頗少亦機巧妙術也其他方術不一要拯急之妙策也又按蔣自了著有通醫外治一卷其書分頭面身體諸部以纂內外諸病外治之法大抵不過薄貼淋泄等前款所載數件及吹喉點眼癰腫傷折之治又趙恕軒串雅外編有藥外門分針灸熏點蒸洗尉吸雜法九類其所戢孴猶未該備今仍檢方書特摘以外治內之法略列於下搐鼻用泄頭中郁邪金匱治頭中寒濕內藥鼻中活人書擬以瓜蒂散又外臺治發黃有瓜蒂等末吹鼻出黃水數方又聖惠治風頭痛吹鼻散用瓜蒂麝香等五味曰先含水滿口後搐藥末半字深入鼻中又頭痛門有數方宜閲又用開達壅閉而口噤不能下藥者尤便聖惠治小兒天瘹幼幼新書治小兒急慢驚風有用牛黃等灌鼻內令嚏方又聖濟中風龍腦雙丸口噤灌藥於鼻內又急中風礬蝴蝶散若牙緊不能下藥即鼻中灌之又易簡方卒中口噤用細辛皂角各少許或只用半夏為末以蘆管吹入鼻中俟噴嚏其人少蘇然後進藥又十形三療痰厥條其說稍詳考此術本於金匱治尸厥用菖蒲屑法又用治眼目口齒等疾聖惠治眼睛如針刺疼痛有通頂抽風散又蘭室祕藏治內外障眼有㗜藥麻黃散又楊氏家藏方有治眼疾頑荊散等治喉痹一字散治牙疼失笑散又用發散傷寒治病百法解利傷寒一法可用不臥散解之於兩鼻內㗜之連嚏噴三二十次以衣被蓋覆用此藥時當於暖室中嚏罷以酸辣漿粥投之汗出如洗嚏噴者用吐法也考其方系川芎石膏藜蘆甘草四味又用升提下脫産經治盤腸産以半夏為末搐鼻中腸自上又證治要訣有胎轉胞用搐鼻藥多打噴嚏或用拳打腳心知痛令病人渾身掇起則藏府搖動而胎自反上又用驗疳疾生死聖惠治一切疳有吹鼻散數方有云如嚏多疾輕易療如不嚏者必死又云良久有蟲子出子細看如斷絲此是病根去也塞鼻用通喉閉百一選方治急喉閉開口不得者以黃蠟紙裹巴豆一個如患人鼻孔大小中心切破急以塞鼻氣衝入喉中自破也已覺通利即除去云云嗅煙亦用泄上郁御藥院方龍香散治偏正頭痛用地龍乳香細末摻紙上作紙捻子燒今聞煙氣淡寮方徐介翁熏頭風方於上力加指甲每用一捻向香爐內慢火燒之卻以紙捲筒如牛角狀尖上留一小孔以鼻承之熏時須噙溫水令滿口又趙宜信經驗方治頭風好艾揉為丸小彈子大燒嗅之以鼻中黃水出為度又本草引博濟方治偏頭疼至靈散雄黃細辛研細嗅入蓋此方特不燒煙用升下脫産經治盤腸産大紙捻以麻油潤燈吹滅以煙薰産婦鼻中腸即止又本草綱目引夏子益奇疾方有當歸芎藭燒將口鼻吸烟治産後兩孔長垂方又用治結毒爛壞外科正宗有結毒靈藥方瘍醫大全有祁陽炭麵粉銀硃三味薰法其他近今所用方法多有驗者茲不具録又用治患勞人本草引經驗方用玄參甘松地中封罔音取出燒令其鼻中常聞其香云云蓋此法不審其旨豈取於清肺熱歟欱煙用利肺氣外臺載熏咳法六首其說甚詳宜酌用又用通喉閉本草綱目中風痰厥氣厥中惡喉痹一切急病咽喉不通牙關緊閉以研爛巴豆綿紙包壓取油作撚點燈吹滅熏鼻中或用熱煙刺入喉內即時出涎或惡血便蘇又萆麻子仁研爛紙卷作筒燒煙燻吸即通或只取油作撚尤妙名聖煙筒二方並不載出典當考又用散胃寒聖惠治寒氣攻胃咳癔方右用黑豆二合於瓶子中以熱醋沃之紙封間一小孔子令患人以口吸其氣入咽喉中即定通關用開口噤使藥下咽本草皂莢條引簡要濟衆云如牙關不開用白梅揩齒口開即灌藥又引經驗方治急中風目瞑牙噤無門下藥者用龍腦天南星末揩大牙左右名開關散又聖濟白礬散用白礬鹽花擦之又甘草比中指節於生油內浸炭火炙以物斡開牙關令咬定甘草如人行一里又換後灌藥又和劑雄朱丹牙關不開揩之又衛生十全方用烏梅細辛麝香又本草引談氏方治小兒牙關不開天南星一個煨熱紙裹斜角未要透氣於細處剪雞頭大一竅子透氣於鼻孔中牙關立開是以薰法為通關與上方大異塞耳用截痎瘧聖濟有治勞瘧豆桂丸三因方有塞耳丹並絹裹安耳內又用治上部疾楊氏家藏方治牙疼透關散雄黃定疼膏並塞耳中又聖濟鼻衄劄耳用延胡索又小兒衛生總微論治咽喉腮頰腫悶右以蒜塞耳鼻中又串雅外編頭風插耳黃蠟三兩溶化以白紙闊二寸長五寸在蠟上拖勻真蘄艾揉軟薄攤蠟上箸卷為筒插耳內一頭火點燃煙氣透腦其痛即止左插右右插左至重不過二次摩頂用治眼患聖惠治眼有摩頂膏塗頂油數方又用治風病肘後方風不得語苦酒煮芥子薄頭治小兒天瘹並取於使氣下達聖惠治天瘹備急塗頂膏川烏頭蕓薹末新汲水調塗又用治盤腸産取於升提其脫産經以萆麻子十四粒去谷研如膏貼産婦頭頂中心陽即上即拭去塗囟亦取於下達或用逐風冷小兒直訣用麝蜈牛黃青黛蠍尾薄荷棗肉為膏塗治風冷發搐又聖濟云小兒鼻多涕是腦門為風冷所客細辛用油煎下蠟薄塗腮上又得效方治風邪入腦鼻窒流涕南星飲云仍以大蒜蓽茇末杵作餅用紗襯炙熱貼囟前尉斗火尉透或用治癇掣聖惠治小兒諸癇有固囟大黃膏又治天瘹有釣藤圓或用散外邪和劑急風散用生川烏辰砂生南星治小兒傷風鼻塞清涕酒調塗囟門上不可服之或用療鼻衄口瘡等千金翼萆麻葉油塗炙熱尉腮上尤驗又全嬰方論小兒衄白芨末如萆麻葉塗囟又幼幼新書朱氏家傳治小兒口瘡芍藥大黃宣連末獖豬膽調塗囟門貼眉用升陽陷丹溪心法類集痢門若陽氣下陷者以升陽益胃湯加桔梗醋沃南星用葉梅外貼眉攢極效起泡便止又用泄鬱熱串雅外編小兒重舌巴豆半粒飯黏四五粒共搗為餅如黃豆大貼眉心中間待四圍起泡去之即愈又有截瘧二方塗兩乳用收虛汗萬安方貝母散治男子婦人氣虛盜汗夜臥尤甚漸至羸瘦貝母一種細末每用少許臨臥之時放手心吐津唾調成膏搽塗兩乳上按此方原缺出典當考索又本草綱目引集簡方自汗不止鬱金末臥時調塗於乳上塗背用達鼻中聖濟治鼻衄貼背膏京三稜煨熟細末醋煮麵糊調貼背第五椎上幼幼新書引嬰孺治少小鼻塞羊髓薰陸摩背上又用治背寒攖寧生傳治傷寒汗下後人虛背獨惡寒以理中湯加姜桂藿附大作服外以蓽茇良薑吳榝桂椒諸品大辛熱為末和姜糊為膏厚傅滿背稍干即易半月竟復又聖濟有治寒瘧塗方二首殊覺迂愚仍不録貼臍或兼以灸或兼以尉用通利壅閉外臺本草並有治大小便不通用鹽塗臍方一和苦酒一更艾灸又本草引經驗方大小便不通礬石置臍中又引經驗方治小便淋澀或有血以赤根樓蔥近根截一寸許安臍中上以艾灸七壯又聖濟大便不通用杏仁蔥白鹽研膏塗手心塗臍上又幼幼新書引聚寶方用大蒜鹽花山梔子仁爛搗攤紙花子上貼臍又直指方嘔吐家多大便祕結或用連根蔥白一握漢椒五十粒搗細作餅焙熱和輕粉掩臍續以蔥椒煎湯熏蕩身下蓋此類最夥不可枚舉又衛生家寶治水腫有甘遂大蒜灸法濟生方塗臍膏治水腫小使絶少地龍豬苓針砂各一兩細末擂蔥涎調成膏敷臍約一寸高闊又本事方治結胸灸法陰毒傷寒關格不通亦依此灸之巴豆十四枚黃連七寸和皮上搗細用津唾和成膏填入臍心以艾灸其上腹中有聲其病去矣又馮元成上池雜說曰張碧泉夫人病血蠱腹痛甚已死先大夫令用姜蔥麝香真血竭尉其臍經行而病愈一婦人患血痞張小泉用通利行氣之藥為餅貼臍半日氣泄而散又串雅外編黃疸取水大鯽魚一個搗爛加麝香三分成餅貼臍上用荷葉二三層貼餅上用布縛又用溫補寒虛幼幼新書引莊氏家傳小兒腹痛生薑汁調面塗紙貼臍又楊氏家藏方貼臍散治元藏氣虛浮陽上攻口舌生瘡吳茱萸乾薑木鱉子為末半錢冷水調以紙靨貼臍上又瑞竹堂方治元氣虛冷臍腹冷痛有代灸膏封臍艾二方又萬病回春補益門有彭祖小接命薰臍祕方其說甚審並宜檢又串雅內編斷痢用面燒餅半個作一竅納木鱉仁研泥內乘熱覆在病人臍上一時再換又有寧和堂暖臍膏治瀉痢又外編有緑豆等四味方又用收虛汗本草綱目引集靈方自汗盜汗用五倍子研末津調填臍中縛定一夜即止又楊起簡便方小兒夜啼五倍子末津調填於臍內豈亦取於收斂心神歟又用出疳蟲顱囟經治孩兒疳痢辨蟲顏色定吉凶硃砂丸用硃砂阿魏蝙幅血蟾酥為末口脂調緑豆大填臍中看蟲出來又用截瘧串雅外編胡椒雄黃等末飯丸桐子大硃砂為衣將一丸放臍中塗臍下用通溲便外臺引古今録驗療熱結小便不通滑石屑水和塗少腹及繞陰際又本草引楊氏産乳療小便不通滑石末一升以車前汁和塗臍四畔方四寸熱即易之冬月水和亦得幼幼新書引雞峰方治小便不通大蒜研爛攤紙上臍下帖之又引嬰孺治未滿十日不小便蒲黃水和封橫骨上又醫說引類編載熊彥誠前後不通五日腹脹如鼓一大螺以鹽半匕和殼生搗碎置病者臍下一寸三分用寬帛緊繫之曾末安席砉然暴下又用發陰毒衛生寶鑑陰毒傷寒玉襮肚用川烏細辛等八味為末醋糊調塗臍下綿衣覆之又神效名方治陰毒傷寒用芥末新水調膏藥貼臍上汗出為效此與上方頗相似仍附之塗五心用醒心神幼幼新書引葛氏治小兒中人忤用桂心煮滓千金治少小客忤用灶中黃土蚯蚓屎俱塗五心又本草引鬥門方治小兒未滿月驚著似中風欲死者用硃砂以新汲水濃磨汁塗五心上又用清上熱證治要訣云有內熱熱刑于上焦以致咽疼宜用黃檗黃連大黃研末水調在心與患處此出於桑氏方書塗手心用緩筋急聖惠方治中風口喎巴豆七枚去皮爛研喎左塗右手心喎右塗左手心仍以暖水一盞安向手心須臾即便正洗去藥並頻抽掣中指又魏氏家藏方萆麻二粒去殼細研入生面少許用水調拌稀稠得所云云余與聖惠同又聖濟有追風丸其法相類宜參又用催生本草日華子曰催生萆麻塗掌又用發汗衛生寶鑑治陰毒傷寒手陽丹用憨蔥陳蜂窩手心內握定用手帕緊扎定須臾汗出以綿被覆蓋又串雅內編拿瘧黃丹五錢明礬三錢胡椒一錢五分麝香半錢為末臨發時對日坐定將好米醋調藥末男左女右付手心外將絹帛緊扎待藥力熱方行出汗為度如無日腳下用火又有宣積握丸本事方續集宣積手心握藥便通巴豆乾薑韭子良薑硫黃甘遂檳榔各等分上為末研飯為丸如桐子大桐子字原作圈子今從三法六門用時使椒湯洗手了麻油塗手掌口握藥一粒移時便瀉止即以冷水洗手又醫學綱目引田氏握宣丸治小兒便難燥結或服澀藥腹脹悶亂命在須臾可用此丸不移時大小便自利於上方去乾薑韭子加附子粟米飯和丸如緑豆大又三法六門握宣丸於上方加肉桂附子凡九味用法並與上方同塗足心能引上病而下之故治口瘡閻孝忠方大天南星細末醋調塗又聖濟附子生為末薑汁和勻攤又治下冷口瘡神聖膏吳茱萸末酸醋調熬成膏後入地龍末攪勻每臨臥用蔥椒湯洗足拭乾用藥遍塗兩腳心治赤眼寇平全幼心鑑小兒赤眼黃連末水調貼足心治鼻衄本草引簡要濟衆蒜一枚研泥攤一餅子如錢大厚一豆許左鼻血出貼左腳心右鼻貼右腳如兩鼻即貼兩腳下治虛火丹溪心法虛火附子末塞湧泉在石室祕録云引治者病在下而上引之病在上而下引之也如人虛火沸騰於咽喉口齒間用寒涼之藥入口稍快少頃又甚又用寒涼腹瀉肚痛而上熱益熾欲用熱藥涼飲而病人不信不肯輕治乃用外治之法引之而愈方用附子一個為末米醋調成膏藥貼在湧泉穴上少頃火氣衰又少頃而熱止退又能使藥氣上達故治陰毒聖惠治陰毒作寒用吳茱萸酒勻蒸尉腳心又石室祕録云如人病厥逆之證用吳茱萸一兩為末以面半兩用水調成厚糊一般以布如鍾大攤成膏紙厚半分貼在湧泉穴內則手足不逆矣治中風本事方續集治中風手腳不遂穿山甲二兩川烏頭二兩紅海蛤一兩為末每服半兩用生蔥汁調成膏厚作餅子徑寸半闊左患貼左腳右患貼右腳貼在足心用舊絹片緊扎定於密房中無風處椅子上坐用湯一盆將有藥腳浸於湯中若汗出即急去了藥出汗遍身麻木即輕減漸至無事妙不可言此方三因名趁風膏治痢千金治小兒冷痢搗蒜傅兩足下治霍亂瑣碎録霍亂吐瀉轉筋以大蒜研炒熱傅腳心治妳脾幼幼新書引董氏家傳治小兒妳脾紫河車寒食麵水調塗縛之良久其病大便中下去又有蹈藥利水聖惠治水氣坐臥不得面身體悉浮腫方蔥白七斤和須分作兩塌子先以炭火燒一處淨地令赤即以蔥塌子安在地上令病人脫襪以人扶著蹈蔥上蹲坐即以被衣圍裹勿令透風待汗通小便出黃水蔥冷即止小便多即差又聖濟腳氣用烏頭樟腦為丸於爐子中心踏之又本草引兵部手集腳氣踏赤小豆袋溫外腎用散陰寒神效名方治陰毒傷寒牡蠣乾薑末新水調塗手心握外腎汗出為效經驗祕方同云如不醒人事人與之掬婦人用手掩陰門又陰證略例回生神膏治男女陰毒傷寒外接法牡蠣煉粉乾薑各一錢為細末男病用女唾調手內擦熱緊掩二卵上得汗出愈女病用男唾調手內擦熱緊掩二乳上得汗出愈卵與乳男女之根帶坎離之分也衛生寶鑑回陽丹其方相近用川烏等六味婦人陰中坐藥用導血瘕靈樞水脹篇石瘕下云可導而下先君子曰導謂坐導藥又倉公傳濟北王侍者韓女病臣意診脈曰內寒月事不下也即竄以藥旋下病已考說文竄匿也從鼠在穴中然則竄亦坐藥之謂索隱以為以熏熏之者誤矣又金匱礬石丸治藏堅癖不止中有乾血又千金治月經不通葶藶蜜丸綿裹入三寸每丸一宿易之有汁出止又外臺引素女經療黃瘕皂莢散用皂莢蜀椒細辛療青瘕導藥用戎鹽皂莢細辛並搗細以三角囊大如指長二三寸內陰中又用散陰寒金匱蛇床子散是也又外臺引救急療帶下以灶下黃土水和為泥作彈子大暴乾以火燒熱徹以三年醉漬一丸綿裹內玉門中雲云又蘭室祕藏有坐藥龍鹽膏勝陰丹回陽丹三方云密丸如彈子大綿裹留系在外內丸藥陰戶內日易之又云臍下覺暖為效按以上所引諸方大抵繫於節録用者當照看原文凡此之類或直就患上而為治或在彼者引此而為治往往出人意表其有奇驗者亦復不鮮然今所揭援據率略掛一漏百倘有志之士更類而纂之亦未必無益濟生也如夫吹喉點眼癰腫傷折之治則各有其法百類無窮所以不須表出也
