body:
  text: 卷四汗吐下總説張戴人曰夫病之一物非人身素有之也或自外而入或由內而生皆邪氣也邪氣加諸身速攻之可也速去之可也攬而留之可乎雖愚夫愚婦皆知其不可也及其聞攻則不悅聞補則樂之今之醫者曰當先固其元氣元氣實邪自去世間如此妄人何其多也夫邪之中人輕則傳久而自盡頗甚則傳久而難已更甚則暴死若先論固其元氣以補劑補之真氣未勝而邪已交馳橫騖而不可制矣惟脈脫下虛無邪無積之人始可議補其餘有邪積之人而議補者皆鯀湮洪水之徒也今豫論汗吐下三法先論攻其邪邪去而元氣自復也況豫所論之法諳練日久至精至熟有得無失所以敢為來者言也天之六氣風暑火濕燥寒地之六氣霧露雨雷冰泥人之六味酸苦甘辛鹹淡故天邪發病多在乎上地邪發病多在乎下人邪發病多在乎中此為發病之三也處之者三出之者亦三也諸風寒之邪結摶皮膚之間藏於經絡之內留而不去或發疼痛走注麻痹不仁及四肢腫癢拘攣可汗而出之風痰宿食在膈或上脘可湧而出之寒濕固冷熱客下焦在下之病可泄而出之內經散論諸病非一狀也泛言治法非一階也至真要大論等數篇言運氣所生諸病各斷以酸苦甘辛鹹淡以總括之其言補時見一二然其補非今之所謂補也文具於補論條下如辛補肝咸補心甘補腎酸補脾苦補肺若此之補乃所以發腠理致津液通血氣至其統論諸藥則辛甘淡三味為陽酸苦鹹三味為陰辛甘發散淡滲泄酸苦鹹湧泄發散者歸於汗湧者歸於吐泄者歸於下滲為解表歸於汗泄為利小溲歸於下殊不言補乃知聖人止有三法無第四法也然則聖人不言補乎曰蓋汗下吐以若草木治病者也按若字可疑補者以穀肉果菜養口體者也夫穀肉果菜之屬猶君之德教也汗下吐之屬猶君之刑罰也故曰德教升平之粱肉刑罰治亂之藥石若人無病粱肉而已及其有病當先誅伐有過病之去也粱肉補之如世已治矣刑措而不用豈可以藥石為補哉必欲去大病大瘵非吐汗下末由也已然今之醫者不得盡汗下吐法各立門牆誰肯屈己之高而一問哉且豫之三法能兼衆法用藥之時有按有蹻有揃有導有減有續有止今之醫者不得豫之法皆仰面嗷笑曰吐者瓜蒂而已矣汗者麻黃升麻而已矣下者巴豆牽牛朴消大黃甘遂芫花而已矣既不得其術從而誣之豫固難與之苦辨故作此詮所謂三法可以兼衆法者如引涎漉涎嚏氣追淚凡上行者皆吐法也炙蒸熏泄洗尉烙針刺砭射導引按摩凡解表者皆汗法也催生下乳磨積逐水破經泄氣凡下行者皆下法也以余之法所以該衆法也然豫亦未嘗以此三法遂棄衆法各相其病之所宜而用之以十分率之此三法居其八九而衆所當才一二也儒門事親孫臺石曰張子和治病不離汗吐下三法本療暴病而久病亦可用以奏捷暴病者如傷寒冒邪者汗之及大頭瘟頭面腫脹並熱為寒包喘急難眠諸風濕證一汗可安癰毒初起經曰汗之則瘡已此皆邪隨汗解也如食積痰滯者吐之及喉風乳蛾而頭面頸項大腫點水不入音聲不出命懸須臾慎勿刺破破者立斃惟一吐則腫消索食並乾霍亂絞腸痧類皆賴吐全如里邪實熱者下之及頭面周身火熱熾盛皆可下之痢疾腹痛等證下之即暢經曰痛隨利減脹以利寬是也久病者如風寒久伏肌髓微熱惡風或纍月痎瘧諸寒濕腫脹皆可汗之年遠厲風大汗驅之如積月關格或小便癃閉等患或伏痰滯氣時痛時脹懨懨數年不能發越百藥無功一吐可愈如痢疾始初失下大痛口渴肛門腫閉小便不通粒米不進氣息機微一下霍然至於氣結痰凝蓄血留積必以攻下推陳致新是也可見此三法之妙毋論暴病即久病亦甚神又毋論少壯即衰老亦多奏功今人能以此治暴病而不敢用諸久病又並遇暴病而謬慮虛弱疑畏不用以致病邪深入漸不可救雖然病屬有餘極至困篤用可立起病屬不足亦難行之最宜詳審簡明醫彀翟玉華曰吐下汗三法張子和用之取效甚捷但施於壯健之人則可若虛弱者則不可輕用用雖不可輕用然攻病之法亦不出此其升之舉之提之皆吐之意也其降之抑之行之皆下之意也其清之散之疏之皆汗之意也至於當補者又非專主於增補收攝凡調之養之溫之皆補也去其所害而氣血自生借攻為補亦是一法學者不可不知醫學啓蒙彙編何西池曰子和治病不論何證皆以汗吐下三法取效此有至理存焉蓋萬病非熱則寒寒者氣不運而滯熱者氣亦壅而不運氣不運則熱鬱痰生血停食積種種阻塞於中矣人身氣血貴通而不貴塞非三法何由通乎又去邪即所以補正邪去則正復但以平淡之飲食調之不數日而精神勃發矣故婦人不孕者此法行後即孕陽道和暢也男子亦陽道驟發非其明驗乎丹溪倒倉法實於此得悟後人不明其理而不敢用但以溫補為穩殺人如麻可嘆也醫碥按吐後陽舉宜考第六卷又倒倉法本屬不經前輩有辨駁甚是按內經明言藥補詳開於後卷戴人之議補雖或時勢所然要是一偏之見殊失古聖之意然其用三法變化自在所謂如身之使臂臂之使手者信覺不虛誣其所論説辨核精詣闖仲景之堂奧學者棄其瑕而取其瑜庶為得矣汗下寒熱張景嶽曰發表不遠熱攻裡不遠寒此二句大意全在發攻二字發者逐之外也攻者逐之內也寒邪在表非溫熱之氣不能散故發表不遠熱熱鬱在內非沉寒之物不能除故攻裡者不遠寒然亦有用小柴胡白虎益元之類而取汗愈病者此因表裡俱熱故當涼解非發之謂也又有用四逆理中回陽之類而除痛去積者何也此因陰寒留滯故當溫中非攻之謂也所謂發者開其外之固攻者攻其內之實今昧者但見外感發熱等病不能察人傷於寒而傳為熱者有本寒標熱之義輒用芩連等藥以清其標豈知邪寒在表藥寒在裡以寒得寒使內外合邪遂不可解此發表用寒之害也故凡寒邪在表未散外雖熾熱內無寒證正以火不在裡最忌寒涼此而誤人是不知當表者不可遠熱也又如內傷喘痛脹滿等證多有三陰虧損今人但見此證不辨虛寒遽用硝黃攻裡焉知有假實真虛之病而復伐之則病未去而元氣傷此而誤人是不知當攻者不可遠寒也按此證既非內實不可引為攻裡之例二者之害頗多不得不表出之以為戒質疑録柯韻伯曰發表攻裡乃御邪之長技蓋表證皆因風寒如表藥用寒涼則表熱未退而中寒又起所以表藥必用桂枝發表不遠熱也然此為太陽表熱言耳如陽明少陽之發熱則當用柴芩梔豉之類主之按此言之解熱則可不可引為發表之例里證皆由鬱熱下藥不用苦寒則瘀熱不除而邪無出路所以攻劑必用大黃攻裡不遠寒也然此謂陽明胃熱言耳如惡寒痞硬陽虛陰結者又當以薑附巴豆之頭兼之矣傷寒論翼按發表不遠熱攻裡不遠寒出六元正紀大論而張戴人演之有攻裡發表寒熱殊箋蓋此二句僅言其常至表熱鬱極則有如大青龍湯涼解之法裡寒壅實則有如桂枝加大黃湯及巴豆溫利之法不宜一概而論矣又按戴人箋曰表裡俱病者雖可以熱解表亦可以寒攻裡此仲景之大小柴胡湯雖解表亦兼攻裡最為得體今之用藥者只知用熱藥解表不察里之已病故前所言熱證皆作矣醫者不知罪由已作反謂傷寒變證以誣病人非一日也故劉河間自制通聖散加益元散名為雙解千古之下得仲景之旨者劉河間一人而已此説非是蓋大小柴胡固非兼解表之劑而裡熱兼表必先發表乃是仲景之律詳於第二卷治有先後條如通聖雙解之類則大頭時毒等毒熱壅鬱證特有相適者倘施之傷寒則左右牽制反招其害汪訒庵醫方集解立表裡一門不啻背仲景之法其所舉諸方不必涉表裡強合為類可謂謬矣又戴人治驗中有汗吐下並行者此等手段自存其人非後輩所效顰也汗下遲早張兼善曰或問有言汗不厭早下不厭遲斯言何如豫曰凡汗證固宜早仲景謂不避晨夜者此也按此傷寒例語夫下證須從宜定奪當急則急當緩則緩安可一概而治假如陽明病已有可下之理但為面合赤色其在經之熱猶未斂又如嘔多雖有陽明證謂熱在上焦未全入府皆言不可攻凡此之類固宜遲也若陽明篇中言急下者事不可緩其可遲乎所言從宜定奪是也傷寒選録引劉松峰曰凡人初感寒邪一覺憎寒頭痛身痛身熱脊強便宜用溫散之劑速發其汗斷無不愈之理雖年老及平素虛怯之人不易作汗者覺病即服汗劑其邪亦無不即當時解散者此余屢用而屢效者也遲則寒邪稽留傳變百出而斑黃狂躁等證生矣所以一覺感寒便宜速治若必如難知所説或日午以後感寒必遲至明朝午前服汗劑不亦晚乎假如午後感寒此時雖屬陰分亦宜速治散劑且服之多未有當時即汗者必俟次早藥力既行又逢陽分出汗更易易耳所謂汗無太早者明系預早之早豈早晚之早乎至所謂太晚之説分明解作遲下非早辰夜晚第此言為庸醫不應下而妄下之者説法耳然其言不能無弊也若遇宜急下之證而必執下無太晚之説則陽明胃府勢必被邪火燒至燥裂而不可救矣下劑若必拘以時不亦謬哉早晚二字當易以遲速云汗無太速下無太遲則不煩言而解矣説疫按韓祗和傷寒微旨其可下篇不立湯液惟以早下為太戒見乾隆四庫總目清臣曰蓋為氣質羸弱者言恐非蓋為粗工妄下而發如王海藏此事難知以日候早晚言汗下之例迂拘極甚故戴復庵證治要訣既謂為大綱之論而張景嶽質疑録亦辨其陋皆確論也又按玉函經仲景曰不須汗而強與汗之者奪其津液令人枯竭而死又須汗而不與汗之者使諸毛孔閉塞令人悶絶而死又不須下而強與下之者令人開腸洞泄便溺不禁而死又須下而不與下之者令人心內懊憹脹滿煩亂浮腫而死蓋是汗下之嚴戒也江含徵醫津一筏曰醫者曉得當汗而汗當下而下不難曉得當汗而不能汗當下而不能下為難仲景之可與不可宜詳玩此語為是又羅謙甫衛生寶鑑有汗多亡陽下多亡陰二按張隱菴侶山堂類辨曰一薰一蕕十年遺臭故去邪莫如速也曰汗多亡陽如表邪盛者汗之而解以養陽也曰下多亡陰如里邪實者下之而解以養陰也多者謂其太過也太過不可而況妄行乎汗法大旨程普明曰汗者散法也經云邪在皮毛者汗而發之是也又云體若燔炭汗出而散是也然有當汗不汗誤人者有不當汗而汗誤人者有當汗不可汗而妄汗之誤人者有當汗不可汗而又不可以不汗汗之不得其道以誤人者有當汗而汗之不中其經不辨其藥知發而不知斂以誤人者是不可以不審也何則風寒初客於人也頭痛發熱而惡寒鼻塞聲重而體痛此皮毛受病法當汗之若失時不汗或汗不如法以致腠理閉塞營衛不通病邪深入流傳經絡者有之按皮毛經絡當改表裡字此當汗不汗之過也亦有頭痛發熱與傷寒同而其人倦怠無力鼻不塞聲不重脈來虛弱此內傷元氣不足之證又有勞心好色真陰虧損內熱晡熱脈細數而無力者又有傷食病胸膈滿悶吞酸噯腐日晡潮熱氣口脈緊者又有寒痰厥逆濕淫腳氣按腳氣有宜發表者不可概言內癰外癰瘀血凝積以及風溫濕溫中暑自汗諸證皆有寒熱與外感風寒似同而實異若誤汗之變證百出矣所謂不當汗而汗者此也若夫證在外感應汗之例而其人臍之左右上下或有動氣則不可以汗經云動氣在右不可發汗汗則衄而渴心煩飲水即吐動氣在左不可發汗汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗汗則氣上衝正在心中動氣在下不可發汗汗則無汗心大煩骨節痛目運食入則吐舌不得前又脈沉咽燥病已入里汗之則津液越出大便難而讝語又少陰證但厥無汗而強發之則動血未知從何道出或從耳目或從口鼻出者此為下厥上竭為難治又少陰中寒不可發汗汗則厥逆蜷臥不能自溫也又寸脈弱者不可發汗汗則亡陽尺脈弱者不可發汗汗則亡陰也又諸亡血家不可汗汗則直視額上陷淋家不可汗汗則便血瘡家不可汗汗則痙又傷寒病在少陽不可汗汗則讝妄又壞病虛人及女人經水適來者皆不可汗若妄汗之變證百出矣所謂當汗不可汗而妄汗誤人者此也按此段援經文肆加刪改且經中禁汗之例漏載不少並不知何意夫病不可汗而又不可以不汗則將聽之乎是有道焉傷寒賦云動氣理中去白朮按此不引理中丸加減法者何即於理中湯去朮而加汗藥保元氣而除病氣也又熱邪入里而表未解者仲景有麻黃石膏之例按此語欠當有葛根黃芩黃連之例是清涼解表法也又太陽證脈沉細按經無所徵少陰證反發熱者有麻黃附子細辛之例是溫中解表法也按此説誤又少陽中風用柴胡湯加桂枝按宜云太陽少陰並病用柴胡桂枝湯是和解中兼表法也又陽虛者東垣用補中湯加表藥陰虛者丹溪用芎歸湯加表藥其法精且密矣按益氣加表藥猶有相適如芎歸加表藥恐迂慢無效總而言之凡一切陽虛者皆宜補中發汗一切陰虛者皆宜養陰發汗挾熱者皆宜清涼發汗挾寒者皆宜溫經發汗傷食者則宜消導發汗感重而體實者汗之宜重麻黃湯感輕而體虛者汗之宜輕香蘇散又東南之地不比西北隆冬開花少霜雪人稟常弱腠理空疏凡用汗藥只須對證不必過重豫嘗治傷寒初起專用香蘇散加荊防川芎秦艽蔓荊等藥一劑愈甚則兩服無有不安而麻黃峻劑數十年來不上兩餘可見地土不同用藥迥別其有陰虛陽虛挾寒挾熱兼食而為病者即按前法治之但師古人用藥之意而未嘗盡泥其方隨時隨證酌量處治往往有驗此皆已試之成法而與斯世共白之所以拯災救患者莫切乎此此汗之之道也且三陽之病淺深不同治有次第假如證在太陽而發散陽明已隔一層病在太陽陽明而和解少陽則引賊入門矣假如病在二經而專治一經已遺一經病在三經而偏治一經即遺二經矣假如病在一經而兼治二經或兼治三經則邪過經矣按觀此論則普明蓋不達仲景之旨者矣況太陽無汗麻黃為最太陽有汗桂枝可先葛根專主陽明按亦失仲景之旨柴胡專主少陽皆的當不易之藥至於九味羌活乃兩感熱證三陽三陰並治之法初非為太陽一經設也按此方創於張潔古而陶節庵表章之蓋其去古法遠矣又柴葛解肌湯乃治春溫夏熱之證自里達表其證不惡寒而口渴若新感風寒惡寒而口不渴者非所宜也按此説不必又傷風自汗用桂枝湯傷暑自汗則不可用若誤用之熱邪愈盛而病必增劇若於暑證而妄行發散復傷津液名曰重暍多致不救古人設為白朮防風例以治風設益元散香薷飲以治暑俾不犯三陽禁忌者良有以也又人知發汗退熱之法而不知斂汗退熱之法汗不出則散之汗出多則斂之斂也者非五味酸棗之調其謂致病有因出汗有由治得其宜汗自斂耳譬如風傷衛自汗出者以桂枝湯和營衛祛風邪而汗自止若熱邪傳裡令人汗出者乃熱氣薰蒸如釜中吹煮水氣旁流非虛也急用白虎湯清之若邪已結聚不大便者則用承氣湯下之熱氣退而汗自收矣此與傷暑自汗略同但暑傷氣為虛邪只有清補並行之一法寒傷形為實邪則清熱之外更有攻下止汗之法也復有發散太過遂至汗多亡陽身瞤動欲劈地者宜用真武湯此救逆之良藥與中寒冷汗自出者同類並稱又與熱證汗出者大相徑庭矣其他少陽證頭微汗或盜汗者小柴胡湯水氣證頭汗出者小半夏加茯苓湯按此亦失經旨至於虛人自汗盜汗等證則歸脾補中八珍十全按法而用委曲尋繹各盡其妙而後即安所謂汗之必中其經必得其藥知發而知斂者此也嗟嗟百病起於風寒風寒必先客表汗得其法何病不除汗法一差夭枉隨之矣呈汗豈易言哉醫學心悟按內經曰因其輕而揚之又曰其有邪者漬形以為汗其在皮者汗而發之又曰開鬼門又曰今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也又曰三陽經絡皆受其病而未入於藏者故可汗而已此軒岐之論汗也仲景發表之法不過二端曰桂枝湯諧和營衛以治其表虛邪在肌肉者曰麻黃湯發泄郁陽以治其表實邪迫骨節者就中更有節目桂枝加葛根湯治表虛而邪著筋脈者葛根湯治表實而邪著筋脈者大青龍湯涼發壅實以治表實勢劇者桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯並治表虛失汗纏滯引日者此太陽病之治例也更有直中表寒證而附子湯治其病重陽虛者亦猶桂枝湯之例麻黃附子二湯治其病輕表閉者亦猶麻黃湯之例此少陰病之治例也此諸方主證及制立之旨拙著傷寒論述義既詳辨之今不再贅蓋發汗之法無出於此範圍擴而充之則凡病之系表者皆無不可療仲景治濕家猶於桂麻方中加驅濕之品其義可見已又按晉唐汗方有仲景所不有者皆難適用降至宋人則韓祗和禁用桂枝殆一時之權乎醫壘元戎醫學綱目並有辨宜參南渡以來專用香蘇散正氣散等芳香輕平之藥以治四時傷寒蓋亦系當日之宜施之後世則僅不過發感冒微邪已如陶節庵主張九味羌活湯則一偏之見也又張戴人可汗式論吐法兼汗吐之發汗固屬強責不易輕試焉更有蒸汗法載在第九卷中發汗不用燥藥徐洄溪曰驅邪之法惟發表攻裡二端而已發表所以開其毛孔令邪從汗出也當用至輕至淡芳香清冽之品使邪氣緩緩從皮毛透出無犯中焦無傷津液仲景麻黃桂枝等湯是也然猶恐其營中陰氣為風火所煽而銷耗於內不能滋潤和澤以托邪於外於是又啜薄粥以助胃氣以益津液此服桂枝湯之良法凡發汗之方皆可類推汗之必資於津液如此後世不知凡用發汗之方每每用厚朴葛根按葛根主痙病而本草亦云治消渴實為汗藥中之潤品以為燥藥者誤矣羌活白芷蒼朮豆蔻等溫燥之藥即使其人津液不虧內既為風火所熬又復為燥藥所爍則汗從何生汗不能生則邪無所附而出不但不出邪氣反為燥藥鼓動益復橫肆與正氣相亂邪火四布津液益傷而舌焦唇乾便閉目赤種種火象自生則身愈熱神愈昏惡證百出若再發汗則陽火盛極動其真陰腎水來救元陽從之大汗上泄亡陽之危證生矣輕者亦成痙證遂屬壞證難治故用燥藥發汗而殺人者不知凡幾也此其端開於李東垣其所著書立方皆治濕邪之法與傷寒雜感無涉而後人宗其説以治一切外感之證其害至今益甚不但非古聖之法並誤用東垣之法醫道失傳只此淺近之理尚不知何況深微者乎醫學源流論按岐伯曰人所以汗出者皆生於穀穀生於精觀此則汗之必資於津液益可信矣發汗不可太過徐洄溪曰治病之法不外汗下二端而已下之害人其危立見故醫者病者皆不敢輕投至於汗多亡陽而死者十有二三雖死而人不覺也何則凡人患風寒之疾必相戒以為寧暖無涼病者亦重加覆護醫者亦云服藥必須汗出而解故病人之求得汗人人以為當然也秋冬之時過暖尚無大害至於盛夏初秋天時暴燥衛氣開而易泄更加閉戶重衾復投發散之劑必至大汗不止而陽亡矣又外感之疾汗未出之時必煩悶惡熱及汗大出之後衛氣盡泄必陽衰而畏寒始之暖覆猶屬勉強至此時雖欲不覆而不能愈覆愈汗愈汗愈寒直至汗出如油手足厥冷而病不可為矣其死也神氣甚清亦無病苦病者醫者及旁觀之人皆不解其何故而忽死惟有相顧噩然而已我見甚多不可不察也總之有病之人不可過涼亦不宜太暖無事不可令汗出惟服藥之時宜令小汗仲景服桂枝湯法云服湯已溫覆令微似汗不可如水淋漓此其法也至於亡陽未劇尤可挽回傷寒論中真武理中四逆等法可考若已脫盡無可補救矣又盛暑之時病者或居樓上或臥近灶之所無病之人一立其處汗出如雨患病者必至時時出汗即不亡陽亦必陰竭而死雖無移徙之處必擇一席稍涼之地而處之否則神丹不救也醫學源流論張景嶽曰取汗之法當取於自然不宜急暴但服以湯劑蓋令溫暖使得津津微汗稍令久之則手足稍周偏身通達邪無不散矣若一時逼之致使如淋如洗則急遽間衛氣已達而營氣未周反有不到之處且恐大傷元氣非善法也余嘗見有子病者其父母愛惜之甚欲其速愈且當溫暖之令覆以重被猶恐不足而以身壓其上子因熱極叫呼其父母曰猶未也須再出些方好及許久放起竟致亡陽而斃之是但知汗出何妨而不知汗之殺人此強發之鑑也又有邪本不甚或挾虛年衰感邪等證醫不能察但知表證宜解而發散太過或誤散無效而屢散不已因而即被其害者有之或邪氣雖去遂致胃氣大傷不能飲食而羸憊不振者有之此過汗之戒也凡發汗太過一時將至亡陽或身寒而栗或氣脫昏沉等候速宜煎獨參湯一兩許飲之或甚者以四味回陽飲速為挽回庶可保全否則恐致不救景嶽全書取汗在不緩不急不多不少緩則邪必留連急則邪反不盡汗多則亡其陽汗少則病必不除醫宗金鑑按汗不可過仲景諄諄戒之蓋不啻亡陽其變或不能一定故方中止用桂枝則啜熱稀粥以助藥力有麻黃葛根則不須啜粥其意可見矣且其病重者一日一夜服云云者照之傷寒例則此言其人本有宿癖或血脈燥澀而藥與之相格因致煩郁使其覺病勢加重者須從容施劑以視其安倘誤為藥力不及而匆遽連進則貽戚不鮮矣蓋不止桂枝為然用藥之理往往有如此者不可不察汗藥服法互見第十二卷中又按孫真人千金月令云凡發汗汗遍即止不可令霢霂得汗後以粉摩之不可令自干考之經旨汗出太多者方用粉法今云之不可令自干則拘矣溫粉方見先君子傷寒論輯義拙著述義及傷寒廣要中今不繁載又傷寒總病論云凡發汗須如常覆腰以上厚衣覆腰以下以腰足難取汗故也半身無汗病終不解凡發汗後病證仍存於三日內可二三發汗令腰腳周遍為度龐氏之用心切矣如發汗不徹者其變亦夥治之節度豈可失乎虛家不可大汗孫真人曰諸病發熱惡寒脈浮洪者便宜發汗溫粉粉之勿令遇風當發汗而其人適失血及下大利則不可大汗也數少與桂枝湯使體潤漐漐汗出連日當自解也千金方按外臺祕要引範汪下大字錯戴復庵曰失血家不可發汗淋家不可發汗如此等類豈宜遽用表劑當徐徐解散證治要訣按經中有麻黃證兼虛姑用桂枝者蓋如亡血家淋家等禁汗諸證或有宜於表劑中更設關防者其挾虛寒者如桂枝加附子湯桂枝加芍藥生薑人參湯之類其挾裡熱及血分虛燥者如葛根黃芩黃連湯栝樓桂枝湯及陽旦湯葛根解肌湯之類兼補兼清皆宜酌用矣張景嶽曰凡治傷寒但見脈息微弱及沉細無力者皆不可任意發汗然欲去外邪非汗不可而仲景云脈微弱者不可發汗夫脈弱非陽既不可用寒涼而寒邪在表又不可用攻下然則舍此之外又將何法以治此表邪乎不知溫中即可以散寒而強主即可以逐寇此仲景之意豈不盡露於言表而明悟之者當心會之矣且凡病外感而脈見微弱者其汗最不易出其邪最不易解何也凡以元氣不能托送即發亦無汗邪不易解則愈發愈虛而危亡立至矣夫汗本乎血由乎營也營本乎氣由乎中也未有中氣虛而營能盛者未有營氣虛而汗能達者脈即營之外候脈既微弱元氣可知元氣愈虛邪愈不解所以陽證最嫌陰脈正為此也故治此者但遇脈息微弱正不勝邪等證必須速固根本以杜深入專助中氣以托外邪必使真元漸充則脈必漸盛自微細而至滑大自無力而至有神務令陰脈轉為陽脈陰證轉為陽證斯時也元氣漸充方是正復邪退將汗將解之佳兆景嶽全書又曰夫補者所以補中何以亦能散表蓋陽虛者即氣虛也氣虛於中安能達表非補其氣肌能解乎凡脈之微弱無力或兩寸短小而多寒者即其證也此陽虛傷寒也陰虛者即血虛也血虛於裡安能化液非補其精汗能生乎凡脈之浮芤不實或兩尺無根而多熱者即其證也此陰虛傷寒也然補則補矣仍當酌其劑量譬之飲酒者能飲一勺而與以一升宜乎其至於困也使能飲一斗而與以一合其真蚍蜉之撼大樹耳夫寒中者所以清火何以亦能散表蓋陽亢陰衰者即本虧火盛也水涸於經安能作汗譬之乾鍋赤裂潤自何來但加以水則鬱蒸沛然而氣化四達夫汗自水生亦猶是也如前論言補陽補陰者宜助精氣也此論言以水濟火者宜用寒涼也蓋補者補中之不足濟者制火之有餘凡此者均能解表其功若一而宜寒宜暖其用不侔是有不可不辨同上按經有尺中脈微尺中遲不可發汗之戒而心中悸而煩用小建中湯脈結代用炙甘草湯則景嶽所論不為無理然其單從寒中亦以散邪者殆為難信矣景嶽又分汗法為三曰溫散曰涼散曰平散見類經又立三表法見全書並言假他治以托邪者不是發汗法故不繁引云
