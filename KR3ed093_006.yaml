body:
  text: 卷六吐法三焦為決瀆之官升降沖氣而不息者也病在胸中上焦氣壅必因其高而越之所以去邪實而導正氣也況上脘之病上而未下務在速去不湧而出之則深入腸胃播傳諸經可勝治哉故若宿食有可吐者未入於腸胃者也痰瘧有可吐者停蓄於胸膈者也食毒忤氣可吐者恐其邪久而滋甚也肺癰酒疸可吐者為其胸滿而心悶也大抵胸中邪實攻之不能散達之不能通必以酸苦之藥湧之故得胃氣不傷而病易以愈聖濟總録劉河間曰仲景云傷寒三四日邪氣未傳於裡其邪氣在上用瓜蒂散吐而差豈可俟其汗又云傷寒六七日胸中微痞不欲言懊憹昏眩無下證仲景用梔子豉湯吐之立可按以上不確辨於後又忽然中風不知人事亦不須汗喉中呷咂之聲用稀涎散吐之亦可又有小兒驚風潮搐手足掣縮用驗命散吐之又云風頭痛經云若不吐涎久則瞽目而不治用瓜蒂散吐之三吐而差又暴嗽風涎上壅咽噎不利用茶調散吐之又陽癇久不愈未成癡疒保用導涎散吐之又陰癇用二聖散吐之又膏粱之人食物多食生膾胸中不下化蟲伏於胸中胸膈不快噎食不下用藜蘆散吐之又久病患脅痛諸藥莫能治用獨聖散加蠍梢半錢吐之諸癇不時發作不知人事用半生半熟湯吐之暗風病久不差發過如故用鬱金散吐之痎瘧久不差發寒熱無時用常山散吐之蛟龍瘕痛腹脹如蟲用球糖散吐之人初患傷食或用冷身腹悶亂身熱見食則啘用赤小豆散吐之婦人筋攣骨痛用神應散吐之或曰筋病吐之何為答曰木鬱達之所謂達者令其條達也或又有打撲墜墮先吐之用金花散後下之用承氣湯蓋承者順也偏枯證半身不遂是也用追風散吐之須風后有目疾眼有半明可救之用防風湯吐之小兒上喘潮熱先用蔚金散吐之後用鎮庭散下之立效治顛在病久不已用三聖散吐之後大下之諸風掉搖強直不知人事便可懸豆膏涎出立效胸膈滿悶背痛或臂痛可先用祛風湯吐之後服烏藥散厲風或瘡瘍惡瘡便用二聖散吐之後服苦參丸諸厥氣厥中風不省人事便用神聖散膏鼻內灌之吐出涎立效破傷風牙關緊急角弓反張便與神聖散吐之後汗之下之效三法俱用之吐法者上古高醫用之今庸下之流止看諸方不知治法不識病源即不行聖人之法去聖遠矣可不恐歟保命集又曰若用吐法天氣晴明陰晦無用如病卒暴者不拘於此法吐時辰已午前故內經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣卯辰寅候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熱虀水投之大要辨其虛實實則瓜蒂散虛則梔子豉湯滿加厚朴不可一概用之吐罷可服降火利氣安神定志之劑同上張戴人曰夫吐者人之所畏且順而下之尚猶不樂況逆而上之不悅者多矣然自胸以上大滿大實病如膠粥微丸微散皆兒戲也非吐病安能出仲景之言曰大法春宜吐蓋春時陽氣在上人氣與邪氣亦在上故宜吐也湧吐之藥或丸或散中病則止不必盡劑過則傷人然則四時有急吐者不必直待春時也但仲景言其大法耳今人不得此法遂廢而不行試以名方所記者略數之如仲景傷寒論中以蔥根白豆豉湯以吐頭痛按此方出肘後方實系發汗今為吐藥者可疑梔子厚朴湯以吐懊憹瓜蒂散以吐傷寒六七日因下後腹滿無汗而喘者按此主證似訛如此三方豈有殺人者乎何今議豫好湧者多也又如孫氏千金方風論中數方往往皆效近代本事方中稀涎散治膈實中滿痰厥失音牙關緊閉如喪神守萬全方以鬱金散吐頭痛眩運頭風噁心沐浴風近代普濟方以吐風散追風散吐口噤不開不省人事以皂角散吐涎潮總録方中以常止散吐瘧孫尚方以三聖散吐發狂神驗方吐舌不正補亡篇以遠志去心春分前服之預吐瘟疫此皆前人所用之藥也皆有效者何今之議豫好湧者多也惟養生必用方言如吐其涎令人跛躄校正方已引風門中碧霞丹為證豫不須辨也按本事方及幼幼新書引劉氏家傳亦並辨必用方之謬又雜記九門云或言人有病不可吐人身骨節皆有涎若吐出骨節間涎令人偏枯戴人曰我之藥止是吐腸胃間食積或膜肓間宿沫皆是胃膈中溢出者天下與一理也但病有上下故用藥有逆順耳但內經明言高者越之然名醫録中惟見太倉公華元化徐文伯能明律用之自余無聞乃知此法廢之久矣今豫驟用於千載寂寥之後宜其驚且駭也惜乎黃帝岐伯之書伊摯仲景之論棄為閒物縱有用者指為山野無韻之人豈不謬哉豫之用此吐法非偶然也曾見病之在上者諸醫盡其技而不校余反思之投以湧劑少少用之頗獲徵應既久乃廣訪多求頗臻精妙過則能止少則能加一吐之中變態無窮屢用屢驗以至不疑故凡可吐令條達者非徒木鬱然凡在上者皆宜吐之且仲景之論胸上諸實鬱而痛不能愈使人按之及有涎唾下痢十餘行其脈沉遲寸口脈微滑者此可吐之吐之則止仲景所謂胸上諸實按之及有涎唾者皆邪氣在上也內經曰下利脈遲而滑者內實也寸口脈微滑者上實也皆可吐之王冰曰上盛不已吐而奪之按此引經今無所考仲景曰宿食在上脘當吐之又如宿飲酒積在上脘者亦當吐之在中脘者當下而去之仲景曰病人手足厥冷兩手脈乍結以客氣在胸中心下滿而煩欲食不能食者知病在胸中當吐之余嘗用吐方皆是仲景方中瓜蒂散吐傷寒頭痛用蔥根白豆豉湯以吐雜病頭痛或單瓜蒂名獨聖加茶末少許以吐痰飲食加全蠍梢以吐兩脅肋刺痛濯濯水聲者內經所謂濕在上以苦吐之者其是謂歟按此語亦經所無今人亦有竊豫之法者然終非口授或中或否或湧而不能出或出而不能止豈知上湧之法名曰撩痰撩之一字自有擒縱卷舒頃有一工吐陳下一婦人半月不止涎至數斗命懸須臾倉皇失計求豫解之豫使煎麝香湯下咽立止或問麝香何能止吐豫謂之曰瓜苗聞麝香即死吐者瓜蒂也所以立解如藜蘆吐者不止以蔥白湯解之以石藥吐者不止以甘草貫衆解之諸草木吐者可以麝香解之以本草考之吐藥之苦寒者有豆豉瓜蒂茶末梔子黃連苦參大黃黃芩辛苦而寒者有鬱金常山藜蘆甘苦而寒者有地黃汁苦而溫者有木香遠志厚朴辛苦而溫者有薄荷芫花辛而溫者有谷菁草蔥根鬚辛而寒者有輕粉辛甘而溫者有烏頭附子尖酸而寒者有晉礬緑礬虀汁酸而平者有銅緑甘酸而平者有赤小豆酸而溫者有飯漿酸辛而寒者有膽礬酸而寒者有青鹽白米飲辛鹹而溫者有皂角甘鹹而寒者有滄鹽甘而寒者有牙消甘而微溫且寒者有參蘆頭甘平而熱者有蠍梢凡此三十六味惟常山膽礬瓜蒂有小毒藜蘆芫花輕粉烏附尖有大毒外二十六味皆吐藥之無毒者各對證擢而用之此法宜先小服不湧積漸加之余之撩痰者以叉股雞羽探引不出以虀投之投之不吐再投之且投且探無不出者按雜記九門云凡用吐藥先以虀汁一碗橫截之藥已咽下待少頃其雞翎勿令離口酸苦鹹雖能吐人然不撩何由出也吐至昏眩慎勿驚疑書曰若藥不瞑眩厥疾弗瘳如發頭眩可飲冰水立解如無冰時新汲水亦可按張叔承醫學六要云如頭眩難忍飲童便或自便或涼水一口佳強者可一吐而安弱者可作三次吐之庶無損也吐之次日有頓快者有轉甚者蓋引之而上未平也俟數日當再湧之如覺渴者冰水新水瓜梨柿及涼物皆不禁按雜記九門云戴人常言湧後有頓快者有徐快者有反悶者病未盡也有反熱者不可不下也大抵三日後無不快者凡下不止者以冰水解之凡藥熱則行寒則止矣惟禁貪食過飽硬物乾脯難化之物心火既降中脘沖和陰道必強大禁房勞大憂悲思病人既不自責衆議因而噪之歸罪於吐法起謗其由此也按難記九門云病久否閉忽得湧泄氣血沖和心腎交媾陽事必舉尤切戒房室元氣新至犯之則病再作恐罪於湧泄故性行剛暴好怒喜淫之人不可吐左右多嘈雜之言不可吐病人頗讀醫書實非深解者不可吐主病者不能辨邪正之說不可吐病人無正性妄言妄從反覆不定者不可吐病勢嶇危老弱氣衰者不可吐自吐不止亡陽血虛者不可吐諸吐血嘔血咯血衄血嗽血崩血失血者皆不可吐吐則轉生他病侵成不救反起謗端雖懇切求慎勿強從恐有一失愈令後世不信此法以小不善纍大善也必標本相得彼此相信真知此理不聽浮言審明某經某絡某藏某府某氣某血某邪某病決可吐者然後吐之是豫之所望於後之君子也庶幾不使此道湮微以新傳新耳儒門事親按仲景之於吐啻瓜蒂散一方前人以梔子豉湯為吐劑者謬矣張隱菴張令韶所辨甚當録在先君子傷寒論輯義中又後卷清法下有論當參吐藥莫優於瓜蒂而所治在胃脘以上以湧有形之實其功效之偉固與汗下相侔然經中所舉不過寥寥數條蓋其相適之證不似汗下之多也外臺引範汪瓜蒂散方後曰藥力過時不吐服湯一升助藥力也吐出便可食無復餘毒若服藥過多者益飲冷水解之此戴人用冰之所本也又元人經驗良方苦丁香散治風涎暴作用甜瓜蒂一二錢加輕粉一字以水半合同調勻灌之良久涎自出如涎未出噙砂糖一塊下藥涎即出不損人又曰凡吐能令人眼翻吐時令閉雙目或不省人事令人以手密掩之吐藥服法當與末卷相參張石頑傷寒緒論云南人不可輕用湧吐一吐尚可勝之二吐便致昏困而厥北方質實之人三吐不昏也石臨初傷寒五法附評云用吐法者亦當相人之津液矣並是理之所然也又古方更有用吐諸例以其與經旨不葉茲不繁引且肘後方千金及翼痰飲門中載吐藥數首亦不具録又按皇國八九十年前越前有奧村南山者甚巧吐法其徒永富獨嘯著吐方考狄野臺州著吐方編又有縣某佚其名亦撰有書皆闡揚南山之術其可取者不鮮今摘録於下獨嘯曰吐後氣逆極多用下氣之方可也或三黃湯或承氣湯膈噎勞瘵鼓脹吐之則促命期張子和吐癩余未見其可初學不可吐妊娠産後吐血咳血黴毒血崩亡血虛家暨年過六十者吐後吐血者直止其吐可也吐衃血者往往有之雖吐可也吐鮮血者可大恐瓜蒂越福井産為可它邦所出不中用用之若五分若一錢二錢以上不可與苦瓠穰捻如大豆若七粒若十粒寒鄉無瓜蒂則可代之其形至小研淨無厭翳為佳品藜蘆舶上為可尤多毒用之若二分若三分常山亦貴舶上末用之則若五分若一錢胸有蓄飲外發諸證者腹候堅實則可大吐之喘息初發暨未發者按其腹脈知之腹氣堅實則吐之後服瀉心湯小承氣湯之類數十日灸數千壯五十以里偏枯痰涎滿胸者可吐腹軟者決不可與月事積年不下心下痞硬及淋疾濁證心下痞硬俱諸藥不驗者吐之後再與套劑反胃諸嘔尤可吐口吐大便者吐之後服附子瀉心生薑瀉心半夏瀉心之類數日痿躄初發暨欲發者按其心下痞則吐之後論所宜服藥凡服吐方既吐之時直視搐搦者直可止其吐台州曰瓜蒂者湧劑之聖者也諸湧證輕重瓜蒂什領八九他藥居其二至如常山湧瘧鹽湯湧干霍杜蘅湧瘀血藜蘆湧風痱之類較之瓜蒂力之強弱味之厚薄不啻霄壤然各有相對也湧諸宿疴當待邪之安靜氣象如平人而後下藥若方其熾盛不惟無益恐生他變內經曰其盛可待其衰而已是之謂也其法先湧時一夜與食溫粥令滿意饜飫安臥於閒室以詰旦日出先四下幬幌勿使風寒透室中設炭火兩盆要使和氣頗氤氳暑熱不須設火而令病者服藥靜息安臥二食頃慎勿令轉側轉側便輒吐頃之覺心中憒悶懊憹將吐宜強忍勿吐若早湧出則無益於疾乃方其欲已不能已迫其咽門使病者蹲坐一人向前支額一人從後擁而緊按心下病者自以鵝翎若指刺摘喉中即得快吐則復令偃臥定息頃尋更吐若欲吐不吐者有與砂糖法今不用之但令微搖其體頻與沸湯令其強飲則復更吐且吐且飲大抵一朝湧五六回乃覺心中灑然是為藥力盡也於是卻湯勿與夫湧劑隨湧性力稍衰得熱則相激更盛猶芳蘭得酒再馨也湧畢安臥至日晡所乃與冷粥一杯以和胃氣而後隨證與藥除其餘孽則宿疴悉去矣或有法如此而不出者病重劑輕故也投虀葉溫湯一小合乘其微悶連進沸湯則必吐吐而不快者更下小半之劑未嘗不快吐也或有湧微邪未盡者俟後數日若一月更湧如前法凡下湧劑三五回未嘗不快復者老弱虛家減其半間日湧一二回邪盡為度止後服如卒病輕證則從其緩急須斟酌焉其人當湧而湧則雖令屢大涌之亦無害也破其堅壘而止耳或有湧之不出反悶亂者復更下小半之劑扶持如法則吐若仍弗吐者令人舁之伏臥於冷室高處倒垂其頭以指刺喉斯須乃吐或有湧之不出反大下通者亦頗除郁倘有餘邪再用小半以擲必吐吐痰用四物瓜蒂散方瓜蒂一錢二分愛莫能助赤小豆一錢二分人參五分甘草五分各別搗羅為末分為三用其二日大半用其一曰小半其大半用虀葉一錢豆豉五分以水三合二勺煮取二合六勺以一合三勺攪乘熱頓服其小半調虀豉一合三勺之湯頓服按此方本是千金撩膈散奧村氏云老少不勝瓜蒂者代以一物杜蘅散每旦湧之邪盡為度今用肘後方中杜蘅等三味者為佳以上臺州原文更列舉主證今不録縣某曰凡欲行吐者當以臍下有力為的服藥後端坐霎時乃覆被而伏但不許熟眠眠則失吐故也凡當吐時欲上圊者必要沉靜倘匆忙舉動則必運倒矣凡服藥後僅吐清水一兩次然下利甚者亦為毒去之候勿必強吐而愈凡病實至甚者及上衝甚者及胸下鞭滿倍常者試微吐之察其適否而後作服凡吐後不要用藥以吐盡病故也大率以苓夏利水為主其與下劑不過一日此為法既吐明日猶噁心者大黃甘草湯或佳吐後間有腹痛者多當臍痛至明日炒鹽布裹尉之效即日用尉必激藥氣反益其苦矣凡服藥不吐者法當間二日而再吐倘即日連用則後先相合湧物太過凡吐後禁舟行凡黴毒家勿吐之有害禁吐諸證諸四逆者不可吐之凡諸虛羸者不可吐之凡新産者不可吐之凡腳氣上衝心者不宜吐之凡病者惡寒而不欲近衣不可吐之醫心方引醫門方龐安常曰虛家當吐而不敢吐之宜以枳實散壓氣毒痰水過日毒入胃乃可微下之也諸四逆脈微弱虛細或弦遲雖中滿悶不可吐宜橘皮湯枳實散之耳不可吐而強吐之氣築心即死矣傷寒總病論按橘皮湯即仲景橘皮竹茹湯枳實散枳實細末米飲調二錢日可三四服張叔承曰尺中脈微弱兩寸不滑胸膈不悶不可吐脾胃素虛面色萎黃右寸大而無力不可吐中氣虛而痞脹不能運化不可認為實誤吐禍不旋踵醫學六要
