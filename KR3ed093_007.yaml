body:
  text: 卷七補法大旨夫人之血氣與天地周流不能無盈虛也有盈虛矣不能無損益也治療之宜損者益之不足者補之隨其緩急而已是故有平補有峻補或益其氣或益其精或益其血脈或壯其筋骨以至益髭發駐顏色其治不一要之隨宜適無過不及之患斯為善矣聖濟總録張景嶽曰補方之制補其虛也凡氣虛者宜補其上人參黃耆之屬是也精虛者宜補其下熟地枸杞之屬是也陽虛者宜補而兼暖桂附乾薑之屬是也陰虛者宜補而兼清門冬芍藥生地之屬是也此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又有陽失陰而離者不補陰何以收散亡之氣水失火而敗者不補火何以蘇垂寂之陰此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽升而泉源不竭余故曰以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也故凡陽虛多寒者宜補以甘溫而清潤之品非所宜陰虛多熱者宜補以甘涼而辛燥之類不可用知宜知避則不惟用補而八方之制皆可得而貫通矣景嶽全書又曰用補之法則藏有陰陽藥有宜否宜陽者必先於氣宜陰者必先乎精陽以人參為主而耆朮升柴之類可佐之陰以熟地為主而茱萸山藥歸杞之類可佐之然人參隨熟地則直入三陰熟地隨耆朮亦上歸陽分但用藥當如盤珠勿若刻舟求劍類經程普明曰補者補其虛也經曰不能治其虛安問其餘又曰邪之所湊其氣必虛又曰精氣奪則虛又曰虛者補之補之為義大矣哉然有當補不補誤人者有不當補而補誤人者亦有當補而不分氣血不辨寒熱不識開合不知緩急不分五藏不明根本不深求調攝之方以誤人者是不可不講也何謂當補不補夫虛者損之漸損者虛之積也初時不覺久則病成假如陽虛不補則氣日消陰虛不補則血日耗消且耗焉則天真營衛之氣漸絶而虧損成矣雖欲補之將何及矣又有大虛之證內實不足外似有餘脈浮大而澀面赤火炎身浮頭眩煩躁不寧此為出汗暈脫之機更有精神浮散徹夜不寐者其禍尤速法當養營歸脾輩加斂藥以收攝元陽俾浮散之氣退藏於密庶幾可救復有陰虛火亢氣逆上衝不得眠者法當滋水以制之切忌苦寒瀉火之藥反傷真氣若誤清之去生遠矣古人有言至虛有盛候反瀉含冤者此也此當補不補之誤也然亦有不當補而補者何也病有脈實證實不能任補者固無論矣即其人本體素虛而客邪初至病勢方張若驟補之未免閉門留寇更有大實之證積熱在中脈反細澀神昏體倦甚至憎寒振栗欲著覆衣酷肖虛寒之象而其人必有唇焦口燥便閉溺赤諸證與真虛者相隔天淵倘不明辨精切誤投補劑陋矣古人有言大實有羸狀誤補益疾者此也此不當補而補之之誤也然亦有當補而補之不分氣血不辨寒熱者何也經曰氣主煦之血主濡之氣用四君子湯凡一切補氣藥皆從此出也血用四物湯凡一切補血藥皆從此出也然而少火者生氣之原丹田者出氣之原補氣而不補火者非也不思少火生氣而壯火即食氣譬如傷暑之人四肢無力濕熱成痿不能舉動者火傷氣也人知補火可以益氣而不知清火亦所以益氣補則同而寒熱不同也又如血熱之證宜補血行血以清之血寒之證宜溫經養血以和之立齊治法血熱而吐者謂之陽乘陰熱迫血而妄行也治用四生丸六味湯血寒而吐者謂之陰乘陽如天寒地凍水凝成冰也治用理中湯加當歸醫家常須識此勿令誤也更有去血過多成升斗者無分寒熱皆當補益所謂血脫者益其氣乃陽生陽長之至理蓋有形之血不能速去無形之氣所當急固以無形生有形先天造化本如是耳此氣血寒熱之分也然又有補之而不識開合不知緩急者何也天地之理有合必有開用藥之機有補必有瀉如補中湯用參耆必用陳皮以開之六味湯用熟地即用澤瀉以導之古人用藥補正必兼瀉邪邪去則補自得力又況虛中挾邪正當開其一面戢我人民攻彼賊寇或縱或擒有收有放庶幾賊退民安而國本堅固更須酌其邪正之強弱而用藥多寡得宜方為合法是以古方中有補散並行者參蘇飲益氣湯是也有消補並行者枳朮丸理中丸是也有攻補並行者瀉心湯消石丸是也有溫補並行者治中湯參附湯是也有清補並行者參連飲人參白虎湯是也更有當峻補者有當緩補者有當平補者如極虛之人垂危之病非大劑湯液不能挽回豫嘗用參附煎膏日服數兩而救陽微將脫之證又嘗用參麥煎膏服至數兩而收津液將枯之證亦有無力服參而以耆術代之者隨時處治往往有功至於病邪未盡元氣雖虛不任重補則從容和緩以補之相其機宜循序漸進脈證相安漸為減藥穀肉果菜食養盡之以底於平康其有體質素虛別無大寒大熱之證欲服丸散以葆真元者則用平和之藥調理氣血不敢妄使偏僻之方久而爭勝反有傷也此開合緩急之意也然又有補之而不分五藏者何也夫五藏有正補之法有相生而補之之法難經曰損其肺者益其氣損其心者和其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此正補也又如肺虛者補脾土生金也脾虛者補命門火生土也心虛者補肝木生火也肝虛者補腎水生木也腎虛者補肺金生水也此相生而補之也而豫更有根本之說焉胚胎始兆形骸未成先生兩腎腎者先天之根本也㘞地一聲一事未知先求乳食是脾者後天之根本也然而先天之中有水有火水曰真陰火曰真陽名之曰真則非氣非血而為氣血之母生身生命全賴乎此周子曰無極之真二五之精妙合而凝寂然不動感而遂通隨吾神以為往來者此也古人深知此理用六味滋水八味補火十補斑龍水火兼濟法非不善矣然而以假補真必其真者未曾盡喪庶幾有效若先天祖氣蕩然無存雖有靈芝亦難續命而況庶草乎至於後天根本尤當培養不可忽視經曰安穀則昌絶谷則危又云粥藥入胃則虛者活古人診脈必曰胃氣制方則曰補中又曰歸脾健脾者良有以也夫飲食入胃分布五藏灌溉周身如兵家之糧餉民間之煙火一有不繼兵民離散矣然而因餓致病者固多而因傷致病者亦復不少過嗜肥甘則痰生過嗜醇釀則飲積瓜果乳酥濕從病受發為腫滿瀉利五味偏啖久而增氣皆令夭殃可不慎哉是知脾腎兩藏皆為根本不可偏廢古人或謂補脾不如補腎者以命門之火可生脾土也或謂補腎不如補脾者以飲食之精自能下注於腎也須知脾弱而腎不虛者則補脾為亟腎弱而脾不虛者則補腎為先若脾腎兩虛則並補之藥既補矣更加攝養有方斯為善道諺有之曰藥補不如食補我則曰食補不如精補精補不如神補節飲食惜精神用藥得宜病有不痊焉者寡矣醫學心悟按陰陽應象大論云形不足者溫之以氣精不足者補之以味此補法之大要也張戴人儒門事親以氣味為食補然本篇以藥之氣味辨陰陽則此為藥補明矣朱丹溪格致餘論曰精不足者補之以味何不言氣補曰味陰也氣陽也補精以陰求其本也故補之以味若甘草白朮地黃澤瀉五味子天門冬之類皆味之厚者也經曰虛者補之正此意也上文謂形不足者溫之以氣夫為勞倦所傷氣之虛故不足溫者養也溫存以養使氣自充氣完則形完矣故言溫不言補經曰勞者溫之正此意也此說為得經旨矣蓋所謂形者形氣也精者精血也形氣無質故非氣厚之品不能以升發元陽和煦周身精血有形故非味厚之品不能以濡養真陰滲灌府藏補陽補陰實無出於此矣難經之治損云益其氣云調其營衛云緩其中即溫之以氣也云益其精即補之以味也仲景之治虛勞其自中土乏弱者小建中湯以養其胃而化氣生津是補陽之法也其自下焦衰憊者腎氣丸以滋其腎而培元填精是補陰之法也繇是觀之則用補之理先聖後聖其揆一也蓋經之言補者不一而足張戴人急於立言以為內經止有三法無第四法要不免偏枯之論也又按補脾補腎之辨程氏為得然脾腎兩虛者補脾為急猶是血脫益氣之意邪氣藏府病形篇云諸小者陰陽形氣俱不足勿取以針而調以甘藥也楊上善注云陰陽既竭形氣又微用針必死宜以甘味之藥調其脾氣脾胃氣和即四藏可生也此可以徵焉終始篇九針論亦有甘藥文更考諸家褚氏遺書云補羸女先養血壯脾補弱男則壯脾節色張子剛雞峰普濟方曰孫兆云補腎不如補脾脾胃既壯則能飲食飲食既進能旺營衛營衛既旺滋養骨骸保益精血許學士本事方續集云凡下部腎經虛者不必補之至妙之法有二一則但補脾護胃使進飲食而全穀氣令生氣血王德膚易簡方云五藏皆取氣於胃所謂精氣血氣皆由穀氣而生若用地黃等未見其生血穀氣已先有所損矣孫兆謂補腎不如補脾正謂是也並是宗補脾者也嚴子禮濟生方云古人云補腎不如補脾余謂補脾不若補腎腎氣若壯丹田火經上蒸脾土溫和中焦自治膈開能食矣張景嶽類經云夫胃為五藏六府之海而關則在腎關之為義操北門鎖鑰之柄凡一身元氣消長約束攸賴故許知可云補脾不如補腎者謂救本之道莫先乎此也誠萬古不易之良法按景嶽引許氏蓋出誤憶也並是宗補腎者也又按至真要大論云補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄王啓玄注云治上補上方迅急則上不住而迫下治下補下方緩慢則滋道路而力又微制急方而氣味薄則力與緩等制緩方而氣味厚則勢與急同又危達齊得效方約補法為三等云峻補者烏附天雄薑桂之屬不可無潤補者鹿茸當歸蓯蓉之類安可缺清補則天門冬麥門冬人參地黃之類宜用也又張戴人儒門事親曰論補者蓋有六法平補峻補溫補寒補筋力之補房屋之補以人參黃耆之類為平補以附子硫黃之類為峻補以豆蔻官桂之類為溫補以天門冬五加皮之類為寒補以巴戟蓯蓉之類為筋力之補以石燕海馬起石丹砂之類為房室之補此六者近來之所謂補者也此說本系駁辨補法然亦可備考仍録之又按陳若虛外科正宗云受補者自無痰火內毒之相雜不受補者乃有陰火濕熱之兼攻又謂補而應藥者多生虛而不受補者不治此說實足通百病不止癰疽也參附功用孫臺石曰謹按神農本經人參味甘氣微寒無毒主補五藏安精神定魂魄止驚悸除邪氣明目開心益智附子味辛甘氣大熱有大毒主風寒咳逆邪氣溫中破堅積聚血瘕寒濕踒躄拘攣膝痛不能行步入補劑宜熟溫散寒氣宜生人參補藏府元氣附子益藏府真陽火衰陽弱非此不能回生如久病氣血虛憊一切虛損人參可用如命門火熄中氣日損一切虛寒附子可用先哲用補劑必加附子數分以壯參耆之功力追覆散失之元陽參附之助豈小補哉凡有尫羸虛冷之象亟宜用矣倘有如瘧邪未散之類醫家常執正氣足而邪自避之語專用補法猶如閉門逐盜盜從何出且邪得補而愈盛反助其邪為害匪細此所謂損不足而益有餘如肺熱還傷肺參亦不可概用近醫遇富貴人輒慮其虛不問病之虛實一例從補亦致失誤此與當用不用者等於亡羊皆繇不能洞矚病情故耳簡明醫彀趙羽皇曰萬病莫如虛證最難治經云不能治其虛安問其餘蓋虛之為言空也無也家國空虛非惠養元元錙銖積纍必不能奠安邦本家道豐亨病之虛者亦猶是也故治虛之要溫補為先溫補之功參附為首蓋參者參也與元氣為參贊者也體弱用此恍若陰霾見晛寒谷回春生機勃勃欲露是真起死之靈苗回生之仙草也故不特氣虛宜用即血虛亦宜用內傷宜用即外感亦宜用煩渴由乎火邪得人參而陰精自長腫脹由乎氣壅仗參力而痞悶全消以至食不欲入食反脹或反胃噎膈泄利亡陰灑淅惡寒多汗漏風等證無不賴人參之大力作元氣之藩籬而不知者妄謂肺熱傷肺參能作飽尤屬駭異不知肺金之冤熱非人參不能救援脾虛之滿中非參朮何由健運種種功勳難以枚舉昔賢嘉其功魁群草信不誣耳至附子一味有斬關之能奪旗之勇虞搏謂其能引補氣藥行十二經以追散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫藥達下焦以驅除在裡之冷濕其用亦宏矣哉人止知手足厥冷下利完穀一切陰虛等候而用之此係正治人所易曉然其最妙處反能以熱攻熱故胃陽發露而為口爛舌糜腎陽發露而為面赤吐紅入於滋陰補氣藥中頃刻神清熱退謂其能反本回陽也謂其能壯火益土也世人甘用寒涼畏投溫劑一用參附即妄加詆譭亦知秋冬之氣非所以生萬物者乎若乃強陽已極房術用以興陽外感伏陽陽厥用之狂越譬之服毒自刃此自作之孽豈參附之罪耶古今名醫匯粹盧紹庵曰附子之性走而不守人參黃耆當歸白朮等補劑性味甘緩佐以附子藉其雄壯之勢通行經洛一萬社草按參附功用約而言之人參補陽為主故病不問寒熱其虛甚者皆得相適附子散寒為主故病不論虛實其寒盛者皆得的對世有偏補之徒遇稍虛證則過用參耆補住邪氣或遽與附子以致哄燥為害不細可不戎乎如吳又可徐洄溪輩論人參利害不一其言殆屬過激仍不繁引又按孫趙二家一則云肺熱不可概用一則云肺熱非人參不能救蓋肺熱證有風邪犯肺留著不散切嫌溫補者有內傷葉乾因為虛燥必須潤補者乃孫說似長矣李瀕湖本草綱目王三陽傷寒綱目亦有詳論並宜並考平補形不足者溫之以氣氣為陽天之所以食人者也精不足者補之以味味為陰地之所以食人者也人受天地之中以生陰陽不可偏勝有偏勝斯有不足於是有補養之法然必適平而止不可太過過則復為有餘亦非中道也常人之情知補養為益而不知陰陽欲其平均故言補者必專以金石灸炳為務名曰補之適以燥之也是豈知補虛扶羸之道哉夫男子腎虛水不足也凡補虛多以燥藥是不知腎惡燥也女子陰虛血不足也凡補虛多以陽劑是不知陽勝而陰愈虧也況補上欲其緩補下欲其急五藏之虛羸其補必於母非通乎天地陰陽消息盈虛之道者未易說此聖濟總録程若水曰大抵人之虛多是陰虛火動脾胃衰弱真陰者水也脾胃者土也土雖喜燥然太燥則草木枯槁水雖喜潤然太潤則草木濕爛是以補脾胃補腎之藥務在潤燥得宜隨病加減醫彀黃錦芳曰精不足而以厚味投補是虧已在於精而補不當用以平劑矣氣不足而以輕清投補是虧已在於氣而補亦不當用以平劑矣惟於補氣而於血有損補血而於氣有窒補上而於下有礙補下而於上有虧其症似虛非虛似實非實則不得不擇甘潤和平之劑以進本草求真按王啓玄元和紀用經曰南陽真人張仲景戒人妄服燥烈之藥謂藥勢偏有所助勝克流變則百病生焉按仲景語千金所引少異又曰人若妄服燥烈藥乃憫苗不長而揠之者也又張子剛雞峰普濟方論燥熱之害曰肌肉之虛猶如體之虛輕如馬勃通草蒲梢燈心之屬是也非滋潤黏膩之物以養之不能實也故前古方中鹿角膠阿膠牛乳鹿髓羊肉飴糖酥酪杏仁煎酒蜜人參當歸地黃門冬之類者蓋出此意云云證治要訣辨治勞法云獨用熱藥者猶釜中無水而進火也過用冷藥者猶釜下無火而添水也俱篤論也又俞守約續醫說曰常熟徐氏病中氣不足延王時勉治脈曰此證宜補劑當用參耆譬如築基造屋不可以時日計其成緒須服藥百裹乃可望愈云云蓋是用平補之法已前卷緩急條當參峻補陰陽之氣本自和平過則生患峻補之藥施於倉卒緣陽氣暴衰真氣暴脫或傷寒陰證諸疾急於救療者不可緩也蓋人之稟受有限嗜欲太過疾病橫生固當助陽氣以扶衰弱則峻補諸方經所謂補下治下制以急急則氣味厚者此之謂也聖濟總録馮楚瞻曰虛之甚者補之甚虛之輕者補之輕虛而欲脫者補而還須接所以有補接二字書未講明蓋脫勢一來時時可脫今用大補之劑挽回收攝若藥性少過藥力一緩脫勢便來故峻補之劑必須接續日夜勿間斷也俟元氣漸生於中藥餌方可少緩於外虛病受得淺者根本壯盛者少年血氣未衰者還元必快衰敗者還元自遲必須補足不可中止工夫一到諸候霍然錦囊祕録按陳若虛外科正宗云凡大瘡每日膿出一碗用參必至三錢以此為則況本病出膿日有三碗用參二錢謂之大損小補豈不歸死又外科乃破漏之病最能走泄真氣如損補兩不相敵無以抵當往往至於不救者多矣蓋亦不啻外科凡欲施峻補當須識此意矣補氣補血李東垣曰肺主諸氣氣旺則精自生形自盛血氣以平故曰陽生則陰長此之謂也血不自生須得生陽氣之藥血自旺矣是陽主生也若陰虛單補血血無由而生無陽故也仲景以人參為補血藥其以此歟乃補氣補血之大略也醫學發明按蘭室祕藏益胃升陽湯條文異而意同其云仲景以人參為補血藥者豈據四逆加人參湯證歟李念莪曰補氣用參耆氣主煦之也補血須歸地血主濡之也然久病積虛雖陰血衰涸但以參耆朮草為主者經所謂無陽則陰無以生是以氣藥有生血之功血藥無益氣之理夫氣藥甘溫法天地春生之令而發育萬物況陽氣充則脾土受培轉輸健運由是食入於胃變化精微不特灑陳於六府而氣至抑且和調於五藏而血生故曰氣藥有生血之功也血藥冷潤法天地秋肅之令而凋落萬物且黏滯滋潤之性在上則泥膈而減食在下則滑腸而易泄故曰血藥無益氣之理也每見俗醫療虛熱之證或同知蘗芩連而投之脾土受傷上嘔下泄至死不悟幽潛沉冤悔何及矣本草通玄馮楚瞻曰血少者養血歸地芍藥之類是也氣虛者益氣參耆苓朮之類是也真陰虧者補真陰地茱麥冬之類是也真陽損者補真陽桂附之類是也如飢者與食渴者與水無不響應得宜其血脫補氣者雖謂陽旺能生陰血究竟因當脫勢危迫而補血難期速效故不得已為從權救急之方苟非命在須臾還須對證調補錦囊祕録按朱丹溪曰如氣病補血雖不中病亦無害也血病補氣則血愈虛散散則氣血俱虛是謂誅罰無過也出劉宗厚醫經小學王節齊明醫雜著專宗丹溪主張補陰其說甚屬乖繆虞恆德醫學正傳及俞守約輩則一據東垣極辨節齊之非殆為確核恆德曰惟真陰虛者將為勞極參耆固不可用恐其不能抵當而反益病耳非血虛者之所忌也此為陰虛火亢不受補者而言耳守約曰凡人血病則當用血藥若氣虛血弱又當從氣虛以人參補之可謂片言居要矣又聶久吾活幼心法晰氣血盈虧消長之理曰豫每治便血之虛滑者婦人産後去血過多而大發熱者婦人血虛崩漏而下血不止者俱用參耆姜附為主而佐以血藥與升提藥皆獲奇效安在血病不可補氣乎此說亦佳汪石山醫案附營衛論極回護丹溪然猶辨氣虛補血之弊補要陰陽相濟火來坎戶水到離扃陰陽相應方乃和平陰不足則濟之以水母陽不足則助之以火精陰陽濟等各有攀陵中藏經王安道曰經曰謂寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也屬也者其樞要之所存乎斯旨也王太僕知之故曰益火之原以消陰翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可籲混乎千言萬語之間殆猶和璧之在璞也其珤久湮豈過焉者石之而弗鑿乎余僭得而推衍之夫偏寒偏熱之病其免者固千百之一二而積熱沉寒亦恐未至於數見也然而數見者得非粗工不知求屬之道不能防微杜漸遂致滋蔓難圖以成之歟夫寒之而熱者徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者徒知以熱治寒而不知寒之不衰者由乎真火之不足也不知真水火不足泛以寒熱藥治之非惟藏府習熟藥反見化於其病而有者弗去無者弗至矣故取之陰所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也其指水火也屬猶主也謂心腎也求其屬者言水火不足而求之於心腎也火之原者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心而原為肝水為腎而主為肺也寒亦益心熱亦強腎此太僕達至理於規矩準繩之外而非迂士麴生之可以跂及矣醫經溯洄集按醫壘元戎易老曰益火之源以消陰翳則便溺有節烏附之類是也壯水之主以鎮陽光則渴飲不思蛤蠣之類是也醫學正傳亦舉啓玄語云夫真水衰極之候切不可服烏附等補陽之藥恐反助火邪而爍真陰元陽虛甚之軀亦不可投芎苓等辛散淡滲之劑恐反開腠理而泄真氣兩說並似失啓玄之意焉又醫學心悟有說見次卷清法內宜參補不宜涼藥張景嶽曰虛實之治大抵實能受寒虛能受熱所以補必兼溫瀉必兼涼者蓋涼為秋氣陰主殺也萬物逢之便無生長欲補元氣故非所宜涼且不利於補寒者益可知矣即有火盛氣虛宜補以涼者亦不過因火暫用火去即止終非治虛之法也又或有以苦寒之物謂其能補陰者則內經有曰形不足者溫之以氣精不足者補之以味夫氣味之相宜於人不謂之曰補可也未聞以味苦氣劣而不相宜於人者亦可謂之補也雖內經有曰水位之主其瀉以咸其補以苦等論然此特以五行歲氣之味據理而言耳矧其又云麥羊肉杏薤皆苦之類是則苦而補者也豈若大黃黃蘗之類氣味苦劣若此而謂之能補無是理也嘗聞之王應震曰一點真陽寄坎宮固根鬚用味甘溫甘溫有益寒無補堪笑庸醫錯用功此一言蔽之也不可不察全書俞守約曰黃柏知母世人謂其補腎非也特以腎家火旺兩尺脈盛者用其瀉火則腎亦堅固而無夢遺之患豈誠有補腎之功哉故腎家無火而兩尺微弱或右尺獨旺者皆不宜用黃柏知母能降十二經之火內經所謂強腎之陰熱之猶可者正以其瀉腎之火則腎令方行而熱亦不作矣但凡腎家有熱兩尺脈旺而成諸疾或眼疼或喉痹之類皆宜用之脾胃論云黃柏知母不可久服恐陰氣為害故也東垣豈欺我哉續醫說按李瀨湖本草綱目黃連檗木二條亦謂此意宜相參蓋潔古以知母黃檗為補腎丹溪倡陽有餘陰不足之說自來學者往往偏於滋陰如王節齊為弊最甚前輩有辨駁者有回護者其說頗長茲不繁録禁補諸證病有不可補者一曰瘧疾二曰狂疾三曰水氣四曰腳氣此四疾治得稍愈切不可服暖藥以峻補之如平平補藥亦須於本病上有益乃可醫說引醫余按此說極是但虛瘧或用補中益氣湯然見效絶少水氣有陰陽陰水宜用溫藥嚴子禮濟生方論之又方仁聲泊宅編云凡病唯發背腳氣無補法發背非藥毒即飲食毒腳氣乃風毒風毒在內不可不攻故先當瀉之然發背固有內托治法腳氣則孫真人曰皆由氣實故不得大補亦不得大瀉此言信然方說並叵從矣又按錢仲陽小兒直訣云熱證疏利或解化後無虛證勿溫補熱必隨生此確言也楊仁齊活人總括陶節庵傷寒六書並演論之並録於傷寒廣要中至李無閡傷寒十勸則曰傷寒必須直攻毒氣不可補益又許洪和劑指南曰傷寒後調理者傷寒本無補法不可用大溫藥補之若補甚則再發熱但可用微溫藥調理蓋陰證調理亦宜溫補固不待論但世或有陽證瘥後過慮其虛以補招害者二家之說殆似為其發而張景嶽全書喻西昌寓意草極口詆詰未免矯枉過直也又虞恆德醫學正傳曰丹溪曰諸痛不可用參耆此指氣實者言諸屬虛證身體疼痛者可不用參耆等補氣藥乎學者毋執一
